<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; background: #eee; }
        header { background: #d32f2f; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .haber { background: white; margin: 15px; padding: 15px; border-radius: 5px; border-left: 5px solid #d32f2f; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #222; font-size: 18px; }
        p { color: #555; line-height: 1.5; font-size: 14px; }
    </style>
</head>
<body>
    <header>HIZLI HABER</header>
    <div class="haber">
        <h2>Haber Hattı Yayında!</h2>
        <p>Türkiye'nin en hızlı haber sitesi açıldı. En güncel gelişmelerle karşınızdayız.</p>
    </div>
</body>
</html>
