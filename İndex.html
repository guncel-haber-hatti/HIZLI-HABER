<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Haber - Son Dakika</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        header { background-color: #e30613; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 28px; border-bottom: 4px solid #b3050f; }
        .nav { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #ddd; font-size: 14px; color: #333; }
        .manset { background: #fff; margin: 10px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .manset-resim { background: #333; color: white; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .manset-baslik { padding: 15px; font-size: 22px; font-weight: bold; color: #e30613; }
        .haber-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .kucuk-haber { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .kucuk-haber h3 { font-size: 14px; margin: 0; color: #333; }
        .footer { text-align: center; padding: 20px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<header>HABERTÜRK TASARIMI</header>
<div class="nav">GÜNDEM | EKONOMİ | SPOR | DÜNYA</div>

<div class="manset">
    <div class="manset-resim">ANA MANŞET RESMİ</div>
    <div class="manset-baslik">Son Dakika: Türkiye Ekonomi Paketini Açıklıyor!</div>
</div>

<div class="haber-grid">
    <div class="kucuk-haber">
        <h3>Süper Lig'de Heyecan Dorukta</h3>
    </div>
    <div class="kucuk-haber">
        <h3>Teknoloji Dünyasında Dev Yatırım</h3>
    </div>
    <div class="kucuk-haber">
        <h3>Hava Durumu: Kar Geliyor!</h3>
    </div>
    <div class="kucuk-haber">
        <h3>Dolar Kuru Hareketli</h3>
    </div>
</div>

<div class="footer">© 2026 Hızlı Haber Hattı - Habertürk Stilinde</div>

</body>
</html>
