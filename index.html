<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güncel Haber Hattı</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .news-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .news-title { color: #ce1126; font-size: 22px; margin: 0 0 10px 0; font-weight: bold; }
        .news-meta { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .news-body { font-size: 16px; line-height: 1.6; color: #333; white-space: pre-wrap; }
        b { color: #000; }
    </style>
</head>
<body>

<div class="container" id="news-container">
    </div>

<script>
const newsData = {
    1: { 
        title: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!", 
        meta: "13 EYLÜL 2024 | ÖZEL HABER | FLAŞ", 
        body: `MÜZİK DÜNYASI ŞOKTA! Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor. Henüz 15 yaşında dünya devi Sony Music kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi isim, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.

'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ: Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan sanatçı ile Blok3 tarafı arasındaki uyuşmazlık yargıya taşınmıştı. Ancak taraflar arasındaki hukuki sürecin kesin bir neticeye varmaması ve eser sahipliği üzerindeki karşılıklı iddiaların sonuçsuz kalması, süreci tıkanma noktasına getirdi. "Hakkım teslim edilmedi" diyen sanatçı, ne kendini ne karşı tarafı savunarak sadece emeğini dijitalden çekme kararı aldı.

USTALARIN TEZGAHINDAN ZİRVEYE: O, sadece bir isim değil; stüdyoların görünmez deviydi! Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz ve Malay gibi efsane üstadlarla aynı stüdyoda sabahlayan sanatçı, her projeye tescilli ruhunu kattı.

BİR JENERASYONUN DİJİTAL HAFIZASI SİLİNİYOR:
• 2018 | Zeynep Bastık: Akustik serilerin zirve yaptığı dönemde, vokal mimarisini ve şarkı formlarını bizzat kurguladı.
• 2019 | Hande Ünsal: Pop listelerinde zirve yapan eserlerin hem sözlerini yazdı hem de beatlerini hazırladı.
• 2020 | Derya Bedavacı: Derin melodilerin ve damar bestelerin arkasındaki isim olarak sound kimliğine yön verdi.
• 2021 | Tekir: Yeni nesil dijital devrimde, modern altyapıları bizzat inşa ederek trendleri tasarladı.

BİR DEVRİN SONU: Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı. Artık o şarkılar sadece kulaklarda bir yankı olarak kalacak. 
GELİŞMELERİ AKTARMAYA DEVAM EDECEĞİZ.`
    },
    // Diğer 49 haber buraya aynı formatta eklenebilir...
};

// Haberi ekrana basan fonksiyon
const container = document.getElementById('news-container');
Object.values(newsData).forEach(news => {
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
        <div class="news-meta">${news.meta}</div>
        <h2 class="news-title">${news.title}</h2>
        <div class="news-body">${news.body}</div>
    `;
    container.appendChild(card);
});
</script>

</body>
</html>
