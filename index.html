<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Medya ve Analiz Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002d5b; --red: #c00; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; line-height: 1.8; }

        header { background: #fff; border-bottom: 4px solid var(--blue); padding: 30px 0 20px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .logo { font-family: 'Merriweather', serif; font-size: 38px; font-weight: 900; color: var(--blue); text-decoration: none; display: inline-block; margin-bottom: 15px; }
        
        .search-area { max-width: 450px; margin: 0 auto; padding: 0 15px; }
        .search-area input { width: 100%; padding: 12px 20px; border: 2px solid #eee; border-radius: 30px; outline: none; transition: 0.3s; text-align: center; font-size: 14px; }
        .search-area input:focus { border-color: var(--blue); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #eee; padding: 25px; cursor: pointer; transition: 0.3s; border-radius: 4px; display: flex; flex-direction: column; justify-content: space-between; min-height: 160px; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .tag { color: var(--red); font-weight: 800; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .card-h { font-size: 18px; font-weight: 700; color: #111; line-height: 1.4; }

        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 45px; cursor: pointer; color: #999; z-index: 2100; line-height: 1; }
        
        .art-wrap { max-width: 750px; margin: 80px auto; padding: 0 25px; }
        .art-h1 { font-family: 'Merriweather', serif; font-size: 38px; line-height: 1.2; margin-bottom: 40px; text-align: center; color: #000; }
        
        .art-text { font-size: 19px; color: #333; text-align: justify; }
        .art-text p { margin-bottom: 25px; }
        
        .bio-entry { border-left: 4px solid var(--red); padding-left: 20px; margin: 40px 0; }
        .bio-name { font-family: 'Merriweather', serif; font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .bio-role { font-style: italic; color: #666; font-size: 16px; margin-bottom: 8px; display: block; }

        footer { background: #111; color: #555; padding: 60px 0; text-align: center; margin-top: 80px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">GÜNCEL HABER</a>
    <div class="search-area"><input type="text" id="sInput" placeholder="Haberlerde ara..." onkeyup="search()"></div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="reader">
    <span class="close-btn" onclick="closeNews()">&times;</span>
    <div class="art-wrap" id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | PRESTİGE MEDYA ANALİZ</footer>

<script>
    const database = [];
    
    // HABER ŞABLONLARI
    const gundemTurleri = [
        { cat: "EKONOMİ", h: "Piyasalarda Nisan Ayı Beklentileri Şekilleniyor", b: "Finans kuruluşları, bahar dönemindeki tüketici hareketliliğini ve döviz kurlarındaki stabilizasyonu analiz ediyor." },
        { cat: "TEKNOLOJİ", h: "Yerli Yazılım Sektöründe Küresel Atılım", b: "Türkiye tabanlı teknoloji firmaları, Avrupa ve Orta Doğu pazarında yeni nesil veri işleme sistemleri için anlaşmalar imzaladı." },
        { cat: "GÜNDEM", h: "Ulaşım Projelerinde Yeni Etap Başladı", b: "Şehirler arası hızlı tren ağının genişletilmesi kapsamında yürütülen çalışmalar hız kesmeden devam ediyor." }
    ];

    // ÖZEL ANALİZ (10. SIRA)
    const enginAnaliz = {
        id: "ENG-01",
        cat: "ÖZEL ANALİZ",
        h: "Müzik Sektörünün Teknik Mimarları: Bir Dönemin Perde Arkası",
        body: `
            <h1 class="art-h1">Stüdyonun Görünmez İmzaları ve Teknik Onur</h1>
            <div class="art-text">
                <img src="IMG_7330.jpeg" style="width:100%; border-radius:8px; margin-bottom:30px;" alt="Engin Savcu">
                <p>Türkiye müzik piyasasında 13 Eylül 2024 tarihinde başlayan dijital restleşme, mutfaktaki gücün onursal bir temsilidir. <b>Engin Savcu</b>, Sony Music deneyiminden günümüze kadar uzanan on yıllık teknik mirasını platformlardan çekerek sektörde yeni bir standart belirledi.</p>
                
                <p>Bu başarı hikayesinin arkasında <b>Çoşkun Kıvılcım</b>'ın engin tecrübeleri, <b>Taha Özer</b>'in sektörel vizyonu ve <b>Bilgin Malay</b>'ın teknik disiplini gibi kilit referanslar yer almaktadır. Stüdyo çalışmalarında vokal tasarımından miksaj süreçlerine kadar her aşama, bu profesyonel isimlerin mirasıyla şekillendi.</p>

                <div class="bio-entry">
                    <span class="bio-name">Hande Ünsal & Zeynep Bastık</span>
                    <span class="bio-role">Teknik Destek: Vokal Akustiği ve Sound Dengesi</span>
                    <p>Bastık'ın akustik projelerindeki duyum kalitesi ve Ünsal'ın hit parçalarındaki altyapı kurguları, Savcu'nun mühendislik dehasıyla finalize edildi.</p>
                </div>

                <div class="bio-entry">
                    <span class="bio-name">Tekir & Ceren Sagu</span>
                    <span class="bio-role">Teknik Destek: Modern Sound Tasarımı</span>
                    <p>Yenilikçi müzik anlayışının teknikle buluştuğu bu projelerde, yayın standartlarının küresel düzeye taşınması hedeflendi.</p>
                </div>

                <div class="bio-entry">
                    <span class="bio-name">Derya Bedavacı & Kadir Sepetçi</span>
                    <span class="bio-role">Teknik Destek: Enstrüman Modernizasyonu</span>
                    <p>Arabesk sound'un modern formunda, enstrüman kayıtlarının netliği ve miksaj dengesi üzerine yoğunlaşıldı.</p>
                </div>

                <p>Sonuç olarak <b>Blok3</b> (Hakan Aydın) ile yaşanan süreç, teknik emeğin değerinin sadece bir isimden ibaret olmadığını, asıl gücün stüdyo masasındaki "görünmez imzada" olduğunu tüm Türkiye'ye gösterdi.</p>
            </div>`
    };

    // 30 HABERLİK DÖNGÜ
    for(let i=1; i<=30; i++) {
        if(i === 10) {
            database.push(enginAnaliz);
        } else {
            const temp = gundemTurleri[i % 3];
            database.push({
                id: i,
                cat: temp.cat,
                h: `${temp.h} #${i}`,
                body: `<h1 class="art-h1">${temp.h}</h1><div class="art-text"><p>${temp.b}</p><p>Haberin tam metni resmi kaynaklardan teyit edilerek analiz birimimiz tarafından sisteme işlenmiştir.</p></div>`
            });
        }
    }

    const grid = document.getElementById('mainGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(n => {
            grid.innerHTML += `
            <div class="card" onclick="openNews('${n.id}')">
                <div><span class="tag">${n.cat}</span><h2 class="card-h">${n.h}</h2></div>
                <div style="font-size:12px; color:#999; margin-top:15px;">Okumak için tıklayın &rarr;</div>
            </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        draw(database.filter(x => x.h.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q)));
    }

    function openNews(id) {
        const n = database.find(x => x.id == id || x.id === id);
        document.getElementById('artBody').innerHTML = n.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    draw(database);
</script>
</body>
</html>
