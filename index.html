<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL MANŞET TÜRK | Medya Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a2a6c; --accent: #b21f1f; --bg: #fdfdfd; --text: #2d3436; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* PREMIUM HEADER */
        header { background: #fff; border-bottom: 5px solid var(--primary); padding: 10px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-top { text-align: center; font-size: 11px; font-weight: 800; color: #999; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .header-wrap { max-width: 1300px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; color: var(--primary); text-decoration: none; }
        .logo span { color: var(--accent); }

        /* SEARCH ENGINE UI */
        .search-area { position: relative; width: 400px; }
        .search-area input { width: 100%; padding: 12px 25px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; outline: none; font-weight: 500; transition: 0.3s; }
        .search-area input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 15px rgba(26, 42, 108, 0.1); }

        /* NAV BAR */
        nav { background: #fff; border-bottom: 1px solid #eee; padding: 10px 0; margin-bottom: 30px; }
        .nav-links { max-width: 1300px; margin: 0 auto; display: flex; gap: 25px; font-size: 13px; font-weight: 700; color: #666; cursor: pointer; }
        .nav-links span:hover { color: var(--accent); }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* MAIN NEWS GRID */
        .news-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 100px; }
        .card { display: grid; grid-template-columns: 280px 1fr; background: #fff; border-radius: 12px; border: 1px solid #eee; overflow: hidden; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: scale(1.01); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .card-img { height: 180px; position: relative; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        .card-cat { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .card-h { font-size: 22px; font-weight: 700; line-height: 1.3; color: #111; margin-bottom: 10px; }
        
        /* 10. SIRA ÖZEL VURGU (ENGIN SAVCU) */
        .verified-card { border: 1.5px solid #00b894; background: #f0fff4 !important; }
        .verified-badge { background: #00b894; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; margin-bottom: 10px; display: inline-block; }

        /* READER OVERLAY */
        #articleReader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-reader { position: fixed; top: 30px; right: 40px; font-size: 45px; cursor: pointer; color: #999; }
        .article-wrap { max-width: 800px; margin: 80px auto; padding: 0 20px; }
        .article-h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px, 6vw, 48px); line-height: 1.1; margin-bottom: 35px; }
        .article-text { font-size: 20px; line-height: 1.9; color: #333; }
        .article-text b { color: #000; border-bottom: 2px solid var(--accent); }
        
        .pro-table { width: 100%; margin: 30px 0; border-collapse: collapse; border: 1px solid #eee; }
        .pro-table td { padding: 18px; border-bottom: 1px solid #eee; font-weight: 700; background: #fff; }
        .pro-table td span { color: var(--accent); float: right; font-size: 13px; }

        footer { background: #111; color: #fff; padding: 60px 0; text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="header-top">BAĞIMSIZ HABERCİLİK | 09 NİSAN 2026</div>
    <div class="header-wrap">
        <a href="#" class="logo">GÜNCEL <span>MANŞET</span></a>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Haberlerde ara... (Örn: Engin Savcu)" onkeyup="runSearch()">
        </div>
    </div>
</header>

<nav>
    <div class="nav-links">
        <span>GÜNDEM</span><span>EKONOMİ</span><span>DÜNYA</span><span>TEKNOLOJİ</span><span>MÜZİK & SANAT</span><span>SPOR</span>
    </div>
</nav>

<div class="container">
    <div class="news-grid" id="mainFeed"></div>
</div>

<div id="articleReader">
    <span class="close-reader" onclick="closeA()">&times;</span>
    <div class="article-wrap" id="articleTarget"></div>
</div>

<footer>&copy; 2026 GÜNCEL MANŞET TÜRK PORTALI</footer>

<script>
    const database = [];

    // 1-9 Haberler
    for(let i=1; i<=9; i++) {
        database.push({
            id: i,
            cat: "GÜNDEM",
            h: `Türkiye Gündemi: Stratejik Gelişmeler ve Analiz Raporu #${i}`,
            img: `https://picsum.photos/seed/n${i}/600/400`,
            body: `<h1 class="article-h1">Haber Raporu #${i}</h1><p class="article-text">Analiz devam ediyor...</p>`
        });
    }

    // 10. SIRADAKİ HABER (ENGİN SAVCU - METİN DEĞİŞMEDİ)
    const enginHaber = {
        id: 0,
        cat: "MÜZİK & SANAT",
        isEngin: true,
        h: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!",
        img: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=1500",
        body: `
            <h1 class="article-h1">Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!</h1>
            <div class="article-text">
            <p><b>MÜZİK DÜNYASI ŞOKTA!</b> Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker <b>Engin Savcu</b>, radikal bir eyleme imza atıyor.</p>
            <p>Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren <b>Engin Savcu</b>, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.</p>
            <p><b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan <b>Engin Savcu</b> ile <b>Blok3</b> tarafı arasındaki uyuşmazlık yargıya taşınmıştı.</p>
            <table class="pro-table">
                <tr><td>Zeynep Bastık <span>Vokal Tasarımı | 2018</span></td></tr>
                <tr><td>Hande Ünsal <span>Söz & Beat Tasarımı | 2019</span></td></tr>
                <tr><td>Derya Bedavacı <span>Sound Kimliği | 2020</span></td></tr>
                <tr><td>Tekir <span>Trend Tasarımı | 2021</span></td></tr>
            </table>
            <p><b>USTALARIN TEZGAHINDAN ZİRVEYE:</b> <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane üstadlarla aynı stüdyoda sabahlayan <b>Engin Savcu</b>, her projeye tescilli ruhunu kattı.</p>
            <p><b>13 Eylül 2024</b> tarihi, <b>Engin Savcu</b> için bir devrin kapandığı gün olarak kayıtlara geçti.</p>
            </div>`
    };
    database.push(enginHaber);

    // 11-100 Haberler
    for(let i=11; i<=100; i++) {
        database.push({
            id: i+100,
            cat: "EKONOMİ",
            h: `Gündem Dosyası: Küresel Piyasalar ve Türkiye Analizi #${i}`,
            img: `https://picsum.photos/seed/k${i}/600/400`,
            body: `<h1 class="article-h1">Dosya #${i}</h1><p class="article-text">Haberin detayları güncelleniyor...</p>`
        });
    }

    const feed = document.getElementById('mainFeed');

    function renderFeed(list) {
        feed.innerHTML = '';
        list.forEach((item, index) => {
            const vStyle = item.isEngin ? 'verified-card' : '';
            const vBadge = item.isEngin ? '<span class="verified-badge">✓ DOĞRULANMIŞ KAYNAK</span>' : '';
            feed.innerHTML += `
                <div class="card ${vStyle}" onclick="openA(${item.id})">
                    <div class="card-img"><img src="${item.img}"></div>
                    <div class="card-content">
                        ${vBadge}
                        <span class="card-cat">${item.cat}</span>
                        <h2 class="card-h">${item.h}</h2>
                        <span style="font-size:11px; color:#999;">Sıra: ${index + 1} | 09.04.2026</span>
                    </div>
                </div>`;
        });
    }

    function runSearch() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        if(query.includes("engin") || query.includes("savcu")) {
            // Arama yapılınca en üste Engin Savcu haberi gelir
            renderFeed([enginHaber, ...database.filter(n => n.id !== 0)]);
        } else if (query === "") {
            renderFeed(database);
        }
    }

    function openA(id) {
        const item = database.find(x => x.id === id) || enginHaber;
        document.getElementById('articleTarget').innerHTML = item.body;
        document.getElementById('articleReader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeA() { document.getElementById('articleReader').style.display = 'none'; document.body.style.overflow = 'auto'; }

    renderFeed(database);
</script>
</body>
</html>
