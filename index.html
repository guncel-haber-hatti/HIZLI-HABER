<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güncel Haber Hattı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f4f4; padding: 20px; }
        .container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        /* Haber Kartı */
        .haber-box { 
            background: white; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            overflow: hidden; 
            width: 100%; 
            max-width: 500px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Fotoğraf Alanı - Siyahlık Tamamen Kaldırıldı */
        .foto-alani { width: 100%; height: 250px; background: #eee; overflow: hidden; }
        .foto-alani img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            filter: none !important; 
            opacity: 1 !important;
        }

        .alt-kisim { padding: 15px; text-align: center; background: #fff; border-top: 1px solid #eee; }
        .alt-kisim h3 { margin: 0; color: #333; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="haber-box">
        <div class="foto-alani">
            <img src="image.png" alt="Haber 1">
        </div>
        <div class="alt-kisim">
            <h3>Görsel 1 Başlığı</h3>
        </div>
    </div>

    <div class="haber-box">
        <div class="foto-alani">
            <img src="image.png" alt="Haber 2">
        </div>
        <div class="alt-kisim">
            <h3>Görsel 2 Başlığı</h3>
        </div>
    </div>
</div>

</body>
</html>
