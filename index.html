<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SON DAKİKA | Haber Hattı</title>
    <style>
        /* CNN & HABERTÜRK TARZI PROFESYONEL CSS */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; color: #222; }
        
        /* Üst Bar */
        .top-header { background: #ce1126; color: #fff; padding: 15px 0; text-align: center; border-bottom: 5px solid #000; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .top-header h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }

        /* Haber Listesi */
        .news-grid { display: flex; flex-direction: column; gap: 20px; }

        .news-item { background: #fff; border-radius: 4px; border: 1px solid #ddd; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .news-item:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-color: #ce1126; }

        /* Haber Başlık Alanı */
        .news-content { padding: 25px; }
        .category-tag { background: #ce1126; color: #fff; padding: 4px 12px; font-size: 12px; font-weight: bold; border-radius: 2px; display: inline-block; margin-bottom: 12px; }
        .news-title { font-size: 28px; font-weight: 800; line-height: 1.2; margin: 0 0 15px 0; color: #000; cursor: pointer; }
        .news-title:hover { color: #ce1126; }

        /* Haber İçeriği - Gizli/Açık Modu */
        .news-body { font-size: 17px; line-height: 1.8; color: #444; display: none; padding-top: 15px; border-top: 1px dashed #ddd; text-align: justify; }
        .news-item.active .news-body { display: block; }

        /* Bizim Habere Özel Vurgu */
        .special-flash { border-left: 8px solid #ce1126; background: #fff9f9; }
        .special-flash .news-title { color: #ce1126; font-size: 32px; }

        /* Alt Bilgi */
        .footer { text-align: center; padding: 40px; color: #888; font-size: 14px; }
        
        b { color: #000; }
        .instruction { text-align: center; color: #ce1126; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="top-header">
    <h1>HABER HATTI</h1>
</div>

<div class="container">
    <div class="instruction">▼ Haberin detayını görmek için başlığa tıkla ▼</div>
    <div class="news-grid" id="news-flow">
        </div>
</div>

<div class="footer">
    © 2026 Haber Hattı Medya Grubu - Tüm Hakları Saklıdır.
</div>

<script>
// 50 HABERLİK DEV LİSTE (Metnin 5. sırada, Türkiye haberleri eklendi)
const newsData = {
    1: { cat: "SİYASET", title: "Ankara'da Diplomasi Trafiği: Yeni Görüşmeler Başlıyor", body: "Başkentte sıcak saatler yaşanıyor. Dışişleri Bakanlığı yeni stratejik ortaklıklar için masaya oturuyor." },
    2: { cat: "EKONOMİ", title: "Merkez Bankası Faiz Kararını Açıklıyor", body: "Piyasaların gözü kulağı bugünkü kritik toplantıda. Ekonomistler farklı senaryolar üzerinde duruyor." },
    3: { cat: "TEKNOLOJİ", title: "Yerli Otomobil Togg'dan Yeni Model Atılımı", body: "Togg, 2026 serisi için yeni SUV modellerini fabrikadan çıkardı. Dünya pazarında rekabet kızışıyor." },
    4: { cat: "SPOR", title: "Milli Takım Hazırlık Kampına Girdi", body: "Avrupa şampiyonası öncesi son hazırlıklar tamamlanıyor. Teknik direktör kadro seçiminde kararlı." },
    5: { 
        cat: "ÖZEL HABER | FLAŞ", 
        title: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!", 
        body: `MÜZİK DÜNYASI ŞOKTA! Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor. Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi isim, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.<br><br><b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan sanatçı ile <b>Blok3</b> tarafı arasındaki uyuşmazlık yargıya taşınmıştı. Ancak taraflar arasındaki hukuki sürecin kesin bir neticeye varmaması ve eser sahipliği üzerindeki karşılıklı iddiaların sonuçsuz kalması, süreci tıkanma noktasına getirdi. "Hakkım teslim edilmedi" diyen sanatçı, ne kendini ne karşı tarafı savunarak sadece emeğini dijitalden çekme kararı aldı.<br><br><b>USTALARIN TEZGAHINDAN ZİRVEYE:</b> O, sadece bir isim değil; stüdyoların görünmez deviydi! <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane üstadlarla aynı stüdyoda sabahlayan sanatçı, her projeye tescilli ruhunu kattı.<br><br><b>BİR JENERASYONUN DİJİTAL HAFIZASI SİLİNİYOR:</b><br>• 2018 | <b>Zeynep Bastık:</b> Akustik serilerin zirve yaptığı dönemde vokal mimarisini kurguladı.<br>• 2019 | <b>Hande Ünsal:</b> Pop listelerinde zirve yapan eserlerin söz ve beatlerini hazırladı.<br>• 2020 | <b>Derya Bedavacı:</b> Derin melodilerin arkasındaki isim olarak sound kimliğine yön verdi.<br>• 2021 | <b>Tekir:</b> Modern altyapıları bizzat inşa ederek trendleri tasarladı.<br><br><b>BİR DEVRİN SONU:</b> Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı. Artık o şarkılar sadece kulaklarda bir yankı olarak kalacak. GELİŞMELERİ AKTARMAYA DEVAM EDECEĞİZ.`
    },
    6: { cat: "MAGAZİN", title: "Ünlü Oyuncu Dünya Evine Girdi", body: "Bodrum'da gerçekleşen görkemli düğün törenine sanat dünyasından pek çok isim katıldı." },
    // 50'ye kadar diğer haber başlıkları otomatik olarak üretilir...
};

// Geri kalan 44 haberi otomatik doldur (Türkiye gündemi tadında)
for(let i=7; i<=50; i++){
    newsData[i] = {
        cat: "GÜNCEL",
        title: `Haber Hattı Özel Başlık #${i}: Türkiye Genelinde Yeni Proje`,
        body: "Bu haber içeriği güncel gelişmeleri kapsamaktadır. Detaylar ve analizler için takipte kalın. Haber merkezimize ulaşan son bilgilere göre çalışmalar hız kesmeden devam ediyor."
    };
}

// HABERLERİ SAYFAYA DÖKEN MOTOR
const newsFlow = document.getElementById('news-flow');
Object.keys(newsData).forEach(id => {
    const item = newsData[id];
    const isSpecial = id == 5 ? 'special-flash' : '';
    
    const div = document.createElement('div');
    div.className = `news-item ${isSpecial}`;
    div.innerHTML = `
        <div class="news-content">
            <span class="category-tag">${item.cat}</span>
            <div class="news-title" onclick="this.parentElement.parentElement.classList.toggle('active')">${item.title}</div>
            <div class="news-body">${item.body}</div>
        </div>
    `;
    newsFlow.appendChild(div);
});
</script>

</body>
</html>
