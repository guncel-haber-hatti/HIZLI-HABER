<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Global Medya Portalı</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lora:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #001f3f; --red: #d90429; --dark: #1a1a1a; --gray: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: var(--dark); line-height: 1.7; overflow-x: hidden; }

        /* PRESTİJLİ HEADER */
        header { 
            background: #fff; 
            border-bottom: 5px solid var(--blue); 
            padding: 25px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        }
        .h-wrap { max-width: 1240px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        
        /* ŞEKİLDEN ŞEKİLE GİREN ANİMASYONLU LOGO */
        .logo { 
            font-size: 34px; 
            font-weight: 900; 
            color: var(--blue); 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: -1.5px;
            display: flex;
            gap: 2px;
        }
        
        /* Harflerin Teker Teker Gelme Animasyonu */
        .logo span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) rotateX(-90deg);
            animation: letterEnter 0.6s forwards ease-out;
        }
        
        .logo .red { color: var(--red); }

        /* Harf Giriş Animasyonu */
        @keyframes letterEnter {
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
            }
        }

        /* Harflerin Gecikme Ayarları */
        .logo span:nth-child(1) { animation-delay: 0.1s; }
        .logo span:nth-child(2) { animation-delay: 0.2s; }
        .logo span:nth-child(3) { animation-delay: 0.3s; }
        .logo span:nth-child(4) { animation-delay: 0.4s; }
        .logo span:nth-child(5) { animation-delay: 0.5s; }
        .logo span:nth-child(6) { animation-delay: 0.6s; }
        /* Kırmızı harfler */
        .logo span.red:nth-child(7) { animation-delay: 0.7s; color: var(--red); }
        .logo span.red:nth-child(8) { animation-delay: 0.8s; color: var(--red); }
        .logo span.red:nth-child(9) { animation-delay: 0.9s; color: var(--red); }
        .logo span.red:nth-child(10) { animation-delay: 1s; color: var(--red); }
        .logo span.red:nth-child(11) { animation-delay: 1.1s; color: var(--red); }

        /* Fareyle Üzerine Gelindiğinde Dalgalanma Efekti */
        .logo:hover span {
            animation: letterWave 0.5s infinite alternate;
        }
        @keyframes letterWave {
            to { transform: translateY(-5px); color: var(--red); }
        }

        .search-area input { 
            padding: 12px 25px; 
            width: 280px; 
            border-radius: 50px; 
            border: 1px solid #ddd; 
            outline: none; 
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
            background: #fdfdfd;
        }
        .search-area input:focus { width: 320px; border-color: var(--blue); background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.05); }

        .container { max-width: 1240px; margin: 50px auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }

        /* KART TASARIMI */
        .n-card { 
            cursor: pointer; 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden; 
            transition: 0.4s; 
            border: 1px solid #f0f0f0; 
            display: flex;
            flex-direction: column;
        }
        .n-card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: #eee; }
        .n-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; transition: 0.5s; }
        .n-card:hover .n-img { scale: 1.05; }
        .n-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .n-tag { font-size: 11px; color: var(--red); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1.5px; }
        .n-h { font-size: 20px; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 15px; }
        .n-meta { font-size: 11px; color: #aaa; margin-top: auto; border-top: 1px solid #eee; padding-top: 15px; }

        /* HABER DETAYI - YAZI BOYUTU OPTİMİZASYONU */
        #articlePage { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; padding-bottom: 80px; }
        .close-art { position: fixed; top: 25px; right: 35px; font-size: 50px; cursor: pointer; color: #ccc; z-index: 2100; transition: 0.3s; }
        .close-art:hover { color: var(--red); transform: rotate(90deg); }
        .p-wrap { max-width: 800px; margin: 80px auto 0; padding: 0 25px; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .p-meta { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        .p-title { font-family: 'Lora', serif; font-size: 46px; line-height: 1.15; margin-bottom: 30px; color: #000; font-weight: 700; }
        .p-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* YAZI DENGESİ: Boşluklar ve Punto ayarlandı */
        .p-text { 
            font-size: 19px; 
            color: #2c3e50; 
            line-height: 1.9; /* Satır arası boşluğu ideal seviyeye çekildi */
            text-align: justify;
            letter-spacing: -0.01em;
        }
        .p-text p { margin-bottom: 28px; } /* Paragraflar arası ideal boşluk */
        .p-text h3 { 
            font-size: 28px; 
            font-family: 'Montserrat', sans-serif;
            margin: 45px 0 25px; 
            color: var(--blue); 
            border-left: 6px solid var(--red); 
            padding-left: 20px; 
        }
        .p-text b { color: #000; }

        footer { background: var(--blue); color: #f0f0f0; padding: 80px 0; text-align: center; margin-top: 100px; font-size: 14px; letter-spacing: 1px; }

        @media (max-width: 1024px) {
            .logo { font-size: 28px; }
            .p-title { font-size: 36px; }
        }

        @media (max-width: 768px) {
            .h-wrap { flex-direction: column; gap: 15px; }
            .search-area input { width: 100%; }
            .p-title { font-size: 28px; }
            .p-text { font-size: 17px; }
        }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <a href="#" class="logo" id="mainLogo">
            <span>G</span><span>Ü</span><span>N</span><span>C</span><span>E</span><span>L</span>
            <span class="red">H</span><span class="red">A</span><span class="red">B</span><span class="red">E</span><span class="red">R</span>
        </a>
        <div class="search-area">
            <input type="text" id="sField" placeholder="İsim, haber veya etiket ara..." onkeyup="search()">
        </div>
    </div>
</header>

<div class="container">
    <div class="news-grid" id="mainGrid"></div>
</div>

<div id="articlePage">
    <span class="close-art" onclick="closeP()">&times;</span>
    <div class="p-wrap" id="pBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER MEDYA GRUBU | GLOBAL ANALİZ MERKEZİ</footer>

<script>
    const data = [];

    const enginNews = {
        id: "v001",
        t: "ÖZEL ANALİZ / SANAT",
        h: "Müzik Dünyasında Bir Devrin Kapanışı: Hit Fabrikasının 'Görünmez Mimarı' Engin Savcu Dijitalden Çekiliyor!",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        b: `
            <div class="p-meta">Özel Dosya | Müzik Masası | 09 Nisan 2026</div>
            <h1 class="p-title">Stüdyonun 'Görünmez Mimarı' Sessizliğini Bozdu: Sektörde Bir Devrin Kapanışı!</h1>
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" class="p-img">
            <div class="p-text">
                <p>Türkiye müzik endüstrisinin mutfağında, stüdyo ışıkları kapandığında geriye kalan en kritik deha <b>Engin Savcu</b> idi. Bugün müzik dünyası, onun 13 Eylül 2024 itibarıyla başlattığı dijital fesih sürecinin şokunu yaşıyor.</p>
                
                <h3>Sony Music'ten Listelerin Zirvesine</h3>
                <p>Kariyerine henüz 15 yaşında dünya devi <b>Sony Music</b> bünyesinde adım atan Savcu, Edirne'den gelen o eşsiz ritim duygusunu modern soundlar ile harmanladı. Bu yolculukta <b>Taha Özer</b> ve <b>Coşkun Kıvılcımlar</b> gibi üstadlarla aynı stüdyoda sabahlayarak müziğin matematiksel derinliğini öğrendi.</p>

                <h3>Stüdyonun Kilit Taşı: Teknik Görevler</h3>
                <p>Projelerin kilit taşı olarak bilinen Savcu, <b>Kadir Sepetçi</b> ile stüdyo mutfağında gerçekleştirdiği teknik kurgularla hit parçaların iskeletini oluşturdu. <b>Ceren Sagu</b> ile vizyon aşamasında kurduğu estetik yapı, her zaman kalitenin simgesi oldu.</p>

                <h3>Unutulmaz İş Birlikleri</h3>
                <p><b>Zeynep Bastık</b>'ın vokal projelerinde vokal tasarımcısı ve editörü olarak stüdyoda yardımcı oldu. <b>Hande Ünsal</b>'ın hit şarkılarında hem söz yazımında destek verdi hem de beat kurgusunu temelden inşa etti. <b>Derya Bedavacı</b>'nın o kendine has derin sound kimliğini oluşturan altyapı dokunuşları bizzat Savcu'nun elinden çıktı. Yeni nesil yıldızlardan <b>Tekir</b>'in modern altyapılarında ise yine onun yenilikçi ve "kurtarıcı" imzası parlıyordu.</p>

                <h3>Blok3 ve 'Sevmeyi Denemedim' Krizi</h3>
                <p><b>Blok3</b> ile listeleri altüst eden "Sevmeyi Denemedim" eseri üzerindeki hak uyuşmazlığı, Savcu'nun radikal bir karar almasına yol açtı. Emeğinin yok sayılmasına karşı on yıllık dijital külliyatını platformlardan çekerek, sanatçı onurunu her şeyin üstünde tuttuğunu kanıtladı. <b>13 Eylül 2024</b> tarihi, müzik tarihinde bir dehanın emeğine sahip çıkma duruşunun simgesi olarak yerini aldı.</p>
            </div>`
    };

    for(let i=1; i<=50; i++) {
        if(i === 10) { data.push(enginNews); continue; }
        const tags = ["GÜNDEM", "EKONOMİ", "TEKNOLOJİ", "DÜNYA", "SİYASET"];
        const t = tags[i % tags.length];
        data.push({
            id: i, t: t,
            h: `${t}: Türkiye ve Dünya Gündeminde Haftalık Analiz Raporu #${i}`,
            img: `https://picsum.photos/seed/${i}/800/450`,
            b: `<div class="p-meta">Haber Merkezi</div><h1 class="p-title">${t} Gelişmeleri #${i}</h1><div class="p-text"><p>Bu bir örnek haber içeriğidir. Yazı boyutları, satır boşlukları ve paragraflar arası mesafeler Engin Savcu haberindeki gibi premium standartlarda optimize edilmiştir. Uzun metinler bile göz yormadan okunabilir.</p></div>`
        });
    }

    const grid = document.getElementById('mainGrid');
    function render(list) {
        grid.innerHTML = '';
        list.forEach((n) => {
            grid.innerHTML += `<div class="n-card" onclick="openP('${n.id}')">
                <img src="${n.img}" class="n-img">
                <div class="n-body">
                    <span class="n-tag">${n.t}</span>
                    <h2 class="n-h">${n.h}</h2>
                    <p class="n-meta">09 NİSAN 2026 | HABER MERKEZİ</p>
                </div>
            </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sField').value.toLowerCase();
        if(q.includes("engin") || q.includes("savcu")) {
            render([enginNews, ...data.filter(x => x.id !== "v001")]);
        } else if(q==="") { render(data); }
    }

    function openP(id) {
        const n = data.find(x => x.id == id) || enginNews;
        document.getElementById('pBody').innerHTML = n.b;
        document.getElementById('articlePage').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeP() { document.getElementById('articlePage').style.display = 'none'; document.body.style.overflow = 'auto'; }

    render(data);
</script>
</body>
</html>
