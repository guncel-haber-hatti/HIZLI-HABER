<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Türkiye Haber</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:28px;
font-weight:bold;
text-align:center;
}

nav{
background:#111;
padding:10px;
}

nav a{
color:white;
margin-right:15px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:10px;
}

.article{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.article img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.back{
margin-bottom:20px;
display:inline-block;
cursor:pointer;
color:#c40000;
font-weight:bold;
}

</style>
</head>

<body>

<header>
TÜRKİYE HABER
</header>

<nav>
<a href="#" onclick="home()">Ana Sayfa</a>
</nav>

<div class="container">

<div id="home">

<div class="grid" id="news"></div>

</div>

<div id="articlePage" style="display:none"></div>

</div>

<script>

let news=[

{
title:"Türkiye 2026 Dünya Kupası'na katılma hedefiyle hazırlıklarını sürdürüyor",
img:"https://picsum.photos/600/400?1",
content:`Türkiye milli futbol takımı uzun yıllar sonra Dünya Kupası hedefiyle hazırlıklarını sürdürüyor. 
Takımda genç oyuncuların performansı dikkat çekerken teknik ekip turnuvada grup aşamasını geçmeyi hedefliyor. 
Futbol kamuoyunda ise yeni jenerasyonun Türkiye için büyük başarı getirebileceği konuşuluyor.`
},

{
title:"İstanbul için dev demiryolu projesine milyarlarca dolarlık finansman",
img:"https://picsum.photos/600/400?2",
content:`İstanbul'da planlanan yeni demiryolu hattı için uluslararası finans kuruluşlarından milyarlarca dolarlık destek sağlandı. 
Projenin tamamlanmasıyla hem yolcu taşımacılığı hem de yük taşımacılığı kapasitesinin ciddi şekilde artması bekleniyor. 
Uzmanlara göre proje İstanbul ulaşımında önemli bir dönüşüm yaratabilir.`

},

{
title:"Türkiye'de 5G dönemi başlıyor",
img:"https://picsum.photos/600/400?3",
content:`Türkiye'de yeni nesil mobil teknoloji olan 5G için çalışmalar hız kazandı. 
Yetkililer 5G teknolojisinin özellikle internet hızında büyük artış sağlayacağını ve sanayi, sağlık ve ulaşım alanlarında yeni imkanlar yaratacağını belirtiyor.`

},

{
title:"Ekonomi yönetimi reform yılı mesajı verdi",
img:"https://picsum.photos/600/400?4",
content:`Ekonomi yönetimi 2026 yılı için reform odaklı bir program hazırlanacağını açıkladı. 
Yeni düzenlemelerin yatırım ortamını güçlendirmesi ve ekonomik istikrarı artırması hedefleniyor.`

},

{
title:"Ankara'da siyasi temaslar hız kazandı",
img:"https://picsum.photos/600/400?5",
content:`Başkent Ankara'da siyasi partiler arasında yoğun bir diplomasi trafiği yaşanıyor. 
Farklı partilerin gerçekleştirdiği ziyaretler ve toplantılar gündemin önemli başlıkları arasında yer alıyor.`

}

]

function render(){

let html=""

news.forEach((n,i)=>{

html+=`
<div class="card" onclick="openNews(${i})">
<img src="${n.img}">
<h3>${n.title}</h3>
</div>
`

})

document.getElementById("news").innerHTML=html

}

function openNews(i){

let n=news[i]

document.getElementById("home").style.display="none"

document.getElementById("articlePage").style.display="block"

document.getElementById("articlePage").innerHTML=`

<div class="article">

<div class="back" onclick="home()">← Ana sayfa</div>

<h1>${n.title}</h1>

<img src="${n.img}">

<p>${n.content}</p>

</div>

`

}

function home(){

document.getElementById("articlePage").style.display="none"

document.getElementById("home").style.display="block"

}

render()

</script>

</body>
</html>
