<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Global Medya Grubu</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #001f3f; --silver: #bdc3c7; --deep-dark: #111; --accent-blue: #0074D9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #fdfdfd; color: var(--deep-dark); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* PRESTİJLİ HEADER */
        header { 
            background: #fff; 
            border-bottom: 3px solid var(--main-blue); 
            padding: 20px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
        }
        .h-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }

        /* SÜREKLİ HAREKETLİ AMA AĞIRBAŞLI LOGO */
        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 38px; 
            font-weight: 900; 
            text-decoration: none; 
            color: var(--main-blue);
            display: flex;
            gap: 4px;
            letter-spacing: -1px;
        }

        .logo span {
            display: inline-block;
            transition: 0.5s;
            animation: elegantMorph 4s ease-in-out infinite alternate;
        }

        /* Sürekli Form Değiştiren Profesyonel Animasyon */
        @keyframes elegantMorph {
            0% { transform: scale(1) rotateY(0deg); color: var(--main-blue); filter: brightness(1); }
            50% { transform: scale(1.05) rotateY(15deg); color: var(--accent-blue); filter: brightness(1.2); }
            100% { transform: scale(1) rotateY(-10deg); color: var(--main-blue); filter: brightness(1.1); text-shadow: 0 0 10px rgba(0,116,217,0.2); }
        }

        /* Harflerin kademeli hareketi */
        .logo span:nth-child(even) { animation-delay: 0.5s; }

        .search-area input { 
            padding: 12px 20px; 
            width: 250px; 
            border-radius: 4px; 
            border: 1px solid #ddd; 
            outline: none; 
            font-size: 14px;
            transition: 0.3s;
        }
        .search-area input:focus { border-color: var(--main-blue); width: 300px; box-shadow: 0 0 10px rgba(0,31,63,0.1); }

        /* HABER AKIŞI */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
        
        .card { 
            background: #fff; 
            border: 1px solid #eee; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .img-h { width: 100%; aspect-ratio: 16/9; object-fit: cover; filter: grayscale(20%); transition: 0.3s; }
        .card:hover .img-h { filter: grayscale(0%); }
        .card-body { padding: 25px; }
        .tag { color: var(--accent-blue); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .card-h { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; line-height: 1.2; }

        /* OKUMA PANELİ - TYPOGRAPHY MÜKEMMELİYETİ */
        #article { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close { position: fixed; top: 25px; right: 35px; font-size: 40px; cursor: pointer; color: #888; transition: 0.3s; }
        .close:hover { color: #000; }
        
        .art-wrap { max-width: 800px; margin: 80px auto; padding: 0 30px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .art-title { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1.1; margin-bottom: 30px; color: var(--main-blue); }
        .art-img { width: 100%; border-radius: 2px; margin-bottom: 40px; }
        
        /* OKUNABİLİRLİK AYARLARI */
        .art-text { 
            font-size: 20px; 
            color: #333; 
            line-height: 2.0; /* Yazılar asla iç içe girmez */
            letter-spacing: 0.01em;
            text-align: left;
        }
        .art-text p { margin-bottom: 30px; }
        .art-text h3 { 
            font-size: 28px; 
            margin: 50px 0 20px; 
            color: var(--main-blue); 
            font-family: 'Playfair Display', serif;
        }

        footer { background: var(--main-blue); color: #fff; padding: 60px 0; text-align: center; margin-top: 100px; font-size: 14px; letter-spacing: 2px; }

        @media (max-width: 768px) {
            .art-title { font-size: 32px; }
            .h-wrap { flex-direction: column; gap: 15px; }
            .logo { font-size: 30px; }
        }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <a href="#" class="logo">
            <span>G</span><span>Ü</span><span>N</span><span>C</span><span>E</span><span>L</span>
            <span>H</span><span>A</span><span>B</span><span>E</span><span>R</span>
        </a>
        <div class="search-area"><input type="text" id="sField" placeholder="Haber içeriklerinde ara..." onkeyup="doSearch()"></div>
    </div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="article">
    <span class="close" onclick="closeArt()">&times;</span>
    <div class="art-wrap" id="artContent"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | GLOBAL PRESTİGE</footer>

<script>
    const data = [];

    const enginHaber = {
        id: "E1",
        t: "ANALİZ / MÜZİK",
        h: "Müzik Sektöründe Radikal Karar: Engin Savcu 10 Yıllık Mirasını Geri Çekti!",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        b: `
            <div style="font-weight: 800; color: #888; margin-bottom: 15px; font-size: 12px; letter-spacing: 1px;">ÖZEL HABER | 09 NİSAN 2026</div>
            <h1 class="art-title">Stüdyonun 'Gizli Dehası' Sessizliğini Bozdu: Engin Savcu Resti!</h1>
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" class="art-img">
            <div class="art-text">
                <p>Türkiye müzik endüstrisinin mutfağında, hit parçaların arkasındaki teknik deha <b>Engin Savcu</b>, 13 Eylül 2024 itibarıyla aldığı kararla sektörde yeni bir tartışma başlattı.</p>
                
                <h3>Teknik Başarı ve Sony Music Geçmişi</h3>
                <p>Müzik kariyerine 15 yaşında <b>Sony Music</b> bünyesinde adım atan Savcu, <b>Taha Özer</b> ve <b>Coşkun Kıvılcımlar</b> gibi üstadlarla stüdyoda müziğin matematiğini yeniden inşa etti.</p>

                <h3>Kadir Sepetçi ve Derya Bedavacı İş Birliği</h3>
                <p>Engin Savcu’nun stüdyo vizyonundaki en kritik rollerden biri, <b>Derya Bedavacı</b>’nın sahnelerdeki ve kayıtlardaki vazgeçilmez klarnetçisi <b>Kadir Sepetçi</b> ile olan teknik paslaşmasıydı. Sepetçi'nin klarnet tınılarını modern altyapılarla harmanlayan Savcu, <b>Ceren Sagu</b> ile de estetik çıtayı her zaman en yukarıda tuttu.</p>

                <h3>Görünmez İmzalar: Zeynep Bastık ve Hande Ünsal</h3>
                <p><b>Zeynep Bastık</b>'ın vokal tasarımlarında, <b>Hande Ünsal</b>'ın hitlerinde beat kurgucusu olarak görev alan Savcu; <b>Derya Bedavacı</b> ve <b>Tekir</b> gibi isimlerin projelerinde "kriz çözücü" ve vizyoner kimliğiyle yer aldı.</p>

                <h3>Hak Mücadelesi ve Onur Duruşu</h3>
                <p><b>Blok3</b>'ün "Sevmeyi Denemedim" şarkısı üzerindeki hak uyuşmazlığı sonrası, Savcu 10 yıllık külliyatını dijital platformlardan silerek emek ve onur mücadelesinde geri adım atmayacağını kanıtladı.</p>
            </div>`
    };

    // Diğer haberleri oluştur
    for(let i=1; i<=20; i++) {
        if(i === 1) { data.push(enginHaber); continue; }
        data.push({
            id: i, t: "GÜNDEM", h: `Dünya Gündeminde Bu Hafta: Sektörel Analiz Raporu #${i}`,
            img: `https://picsum.photos/seed/${i+50}/800/450`,
            b: `<h1 class="art-title">Gündem #${i}</h1><div class="art-text"><p>Ferah yazı düzeniyle haber içeriği burada yer alır.</p></div>`
        });
    }

    const grid = document.getElementById('mainGrid');
    function render(list) {
        grid.innerHTML = '';
        list.forEach((n) => {
            grid.innerHTML += `<div class="card" onclick="openArt('${n.id}')">
                <img src="${n.img}" class="img-h">
                <div class="card-body"><span class="tag">${n.t}</span><h2 class="card-h">${n.h}</h2></div>
            </div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('sField').value.toLowerCase();
        if(q.includes("engin") || q.includes("savcu")) render([enginHaber]);
        else if(q==="") render(data);
    }

    function openArt(id) {
        const n = data.find(x => x.id == id) || enginHaber;
        document.getElementById('artContent').innerHTML = n.b;
        document.getElementById('article').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeArt() { document.getElementById('article').style.display = 'none'; document.body.style.overflow = 'auto'; }

    render(data);
</script>
</body>
</html>
