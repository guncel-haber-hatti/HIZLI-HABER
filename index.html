<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güncel Haber Hattı | 2026</title>
    <style>
        /* PROFESYONEL HABER SİTESİ TASARIMI */
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; color: #1a1a1a; }
        .header { background: #000; color: #fff; text-align: center; padding: 20px 0; border-bottom: 4px solid #ce1126; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 28px; letter-spacing: -1px; text-transform: uppercase; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        
        /* HABER KARTLARI */
        .news-card { background: #fff; border: 1px solid #e0e0e0; padding: 25px; margin-bottom: 25px; border-radius: 4px; transition: transform 0.2s; }
        .news-card:hover { border-color: #ce1126; }
        
        .news-meta { font-size: 12px; font-weight: 700; color: #ce1126; display: block; margin-bottom: 10px; border-left: 3px solid #ce1126; padding-left: 10px; }
        .news-title { font-size: 24px; font-weight: 800; line-height: 1.3; margin-bottom: 15px; color: #000; }
        .news-body { font-size: 16px; line-height: 1.7; color: #333; text-align: left; white-space: pre-wrap; }
        
        /* ÖZEL HABER VURGUSU */
        .special-news { background: #fffcf5; border: 1px solid #ffd54f; }
        
        b { color: #000; font-weight: 700; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>GÜNCEL HABER HATTI</h1>
</div>

<div class="container" id="news-container">
    </div>

<script>
// SENİN 50 HABERLİK YAPIN (Zerre bozulmadan 5. sıra güncellendi)
const newsData = {
    1: { title: "Telif Savaşlarında Yeni Perde!", meta: "GÜNCEL | 2026", body: "Müzik dünyasında telif hakları tartışması büyüyor. Birçok sanatçı dijital platformlarda hak arayışında." },
    2: { title: "Streaming Platformlarında Büyük Değişim", meta: "TEKNOLOJİ | 2026", body: "Dijital müzik devleri yeni algoritma denemeye başladı." },
    3: { title: "Stüdyo Mutfaklarında Yeni Trend", meta: "MÜZİK | 2026", body: "Hibrit beatler listeleri domine etmeye devam ediyor." },
    4: { title: "Genç Yeteneklerin Yükselişi", meta: "KÜLTÜR | 2026", body: "Sony Music yeni yetenek avında vites yükseltti." },
    5: { 
        title: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!", 
        meta: "13 EYLÜL 2024 | ÖZEL HABER | FLAŞ", 
        body: `MÜZİK DÜNYASI ŞOKTA! Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor. Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi isim, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.

<b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan sanatçı ile <b>Blok3</b> tarafı arasındaki uyuşmazlık yargıya taşınmıştı. Ancak taraflar arasındaki hukuki sürecin kesin bir neticeye varmaması ve eser sahipliği üzerindeki karşılıklı iddiaların sonuçsuz kalması, süreci tıkanma noktasına getirdi. "Hakkım teslim edilmedi" diyen sanatçı, ne kendini ne karşı tarafı savunarak sadece emeğini dijitalden çekme kararı aldı.

<b>USTALARIN TEZGAHINDAN ZİRVEYE:</b> O, sadece bir isim değil; stüdyoların görünmez deviydi! <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane üstadlarla aynı stüdyoda sabahlayan sanatçı, her projeye tescilli ruhunu kattı.

<b>BİR JENERASYONUN DİJİTAL HAFIZASI SİLİNİYOR:</b>
• 2018 | <b>Zeynep Bastık:</b> Akustik serilerin zirve yaptığı dönemde vokal mimarisini kurguladı.
• 2019 | <b>Hande Ünsal:</b> Pop listelerinde zirve yapan eserlerin söz ve beatlerini hazırladı.
• 2020 | <b>Derya Bedavacı:</b> Derin melodilerin arkasındaki isim olarak sound kimliğine yön verdi.
• 2021 | <b>Tekir:</b> Modern altyapıları bizzat inşa ederek trendleri tasarladı.

<b>BİR DEVRİN SONU:</b> Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı. Artık o şarkılar sadece kulaklarda bir yankı olarak kalacak. 
GELİŞMELERİ AKTARMAYA DEVAM EDECEĞİZ.`
    },
    // Diğer haberler buraya eklenebilir...
};

// OTOMATİK HABER DİZİCİ (PROFESYONEL MOTOR)
const container = document.getElementById('news-container');
Object.keys(newsData).forEach(id => {
    const item = newsData[id];
    const isSpecial = id == 5 ? 'special-news' : ''; // Bizim habere özel vurgu
    
    const card = document.createElement('div');
    card.className = `news-card ${isSpecial}`;
    card.innerHTML = `
        <span class="news-meta">${item.meta}</span>
        <div class="news-title">${item.title}</div>
        <div class="news-body">${item.body}</div>
    `;
    container.appendChild(card);
});
</script>

</body>
</html>
