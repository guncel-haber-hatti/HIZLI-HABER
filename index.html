<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Endüstriyel Analiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002d5b; --red: #c00; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; line-height: 1.8; }

        header { background: #fff; border-bottom: 4px solid var(--blue); padding: 30px 0 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Merriweather', serif; font-size: 38px; font-weight: 900; color: var(--blue); text-decoration: none; display: inline-block; margin-bottom: 15px; }
        
        .search-area { max-width: 450px; margin: 0 auto; }
        .search-area input { width: 100%; padding: 12px 20px; border: 2px solid #eee; border-radius: 30px; outline: none; transition: 0.3s; text-align: center; font-size: 14px; }
        .search-area input:focus { border-color: var(--blue); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #eee; padding: 25px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .tag { color: var(--red); font-weight: 800; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .card-h { font-size: 18px; font-weight: 700; }

        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 45px; cursor: pointer; color: #999; }
        
        .art-wrap { max-width: 750px; margin: 80px auto; padding: 0 25px; }
        .art-h1 { font-family: 'Merriweather', serif; font-size: 38px; line-height: 1.2; margin-bottom: 40px; text-align: center; }
        
        .art-text { font-size: 19px; color: #333; text-align: justify; }
        .art-text p { margin-bottom: 25px; }
        
        /* İSİMLER İÇİN ÖZEL BÖLÜMLER */
        .bio-entry { border-left: 4px solid var(--red); padding-left: 20px; margin: 40px 0; }
        .bio-name { font-family: 'Merriweather', serif; font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .bio-year { font-weight: 700; color: var(--red); font-size: 14px; margin-bottom: 10px; display: block; }
        .bio-role { font-style: italic; color: #666; font-size: 16px; margin-bottom: 8px; display: block; }

        footer { background: #111; color: #555; padding: 60px 0; text-align: center; margin-top: 80px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">GÜNCEL HABER</a>
    <div class="search-area"><input type="text" id="sInput" placeholder="Arama yapın..." onkeyup="search()"></div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="reader">
    <span class="close-btn" onclick="closeNews()">&times;</span>
    <div class="art-wrap" id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER</footer>

<script>
    const database = [];
    const enginHaber = {
        id: "ENG-X",
        cat: "ÖZEL ANALİZ",
        h: "Endüstriyel Müzik Prodüksiyonunda Teknik Miras: 10 Yıllık Bir Analiz",
        body: `
            <h1 class="art-h1">Stüdyonun Görünmez İmzaları: Teknik Bir Retrospektif</h1>
            <div class="art-text">
                <p>Müzik sektörünün dijital dönüşümü, beraberinde hak arayışlarını da getirdi. Sony Music kökenli <b>Engin Savcu</b>, 13 Eylül 2024 itibarıyla başlattığı dijital geri çekilme süreciyle, stüdyodaki emeğin teknik onurunu gündeme taşıdı. İşte bu on yıllık sürecin kilometre taşları:</p>

                <div class="bio-entry">
                    <span class="bio-year">Tanışma Yılı: 2016</span>
                    <span class="bio-name">Kadir Sepetçi & Derya Bedavacı</span>
                    <span class="bio-role">Görev: Enstrüman Modernizasyonu ve Miksaj</span>
                    <p>Profesyonel yolculuğun ilk büyük halkası olan bu iş birliği, klarnet tınılarının dijital dünyada yeni bir kimlik kazanmasıyla başladı. Bedavacı'nın sound yapısında Sepetçi'nin enstrümanı, Savcu'nun teknik dokunuşlarıyla modern bir forma kavuştu.</p>
                </div>

                <div class="bio-entry">
                    <span class="bio-year">Tanışma Yılı: 2018</span>
                    <span class="bio-name">Zeynep Bastık</span>
                    <span class="bio-role">Görev: Vokal Tasarımı ve Akustik Miksaj</span>
                    <p>Bastık'ın akustik projelerindeki ses netliği ve doğal duyum dengesi üzerinde çalışıldı. Savcu, vokal performanslarının dijital platformlardaki karakteristik yapısını şekillendirdi.</p>
                </div>

                <div class="bio-entry">
                    <span class="bio-year">Tanışma Yılı: 2019</span>
                    <span class="bio-name">Hande Ünsal</span>
                    <span class="bio-role">Görev: Beat Kurgusu ve Altyapı Finalizasyonu</span>
                    <p>Ritmik matematiğin ön planda olduğu projelerde, parçanın enerjisini dijital mecralara en yüksek verimle aktaracak teknik altyapı Savcu tarafından inşa edildi.</p>
                </div>

                <div class="bio-entry">
                    <span class="bio-year">Tanışma Yılı: 2021</span>
                    <span class="bio-name">Ceren Sagu & Tekir</span>
                    <span class="bio-role">Görev: Modern Sound Tasarımı ve Kriz Yönetimi</span>
                    <p>Yeni nesil müzik anlayışında Sagu'nun görsel vizyonu teknikle buluşturulurken; Tekir projelerinde finalize edici rol üstlenilerek parçaların dijital yayın standartlarına ulaşması sağlandı.</p>
                </div>

                <h3>Sonuç: Blok3 ve Dijital Rest</h3>
                <p><b>Blok3</b>'ün "Sevmeyi Denemedim" eseriyle tırmanan süreç, Savcu'nun on yıllık emeğini korumak adına tüm külliyatını dijitalden çekmesiyle bir "onur" duruşuna dönüştü.</p>
            </div>`
    };

    for(let i=1; i<=50; i++) {
        if(i === 10) database.push(enginHaber);
        else database.push({id: i, cat: "GÜNCEL", h: "Haber Özet Analizi #" + i, body: "Detaylar..."});
    }

    const grid = document.getElementById('mainGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(n => {
            grid.innerHTML += `<div class="card" onclick="openNews('${n.id}')">
                <span class="tag">${n.cat}</span>
                <h2 class="card-h">${n.h}</h2>
            </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        if(q.includes("engin") || q.includes("en")) {
            draw(database.filter(x => x.body.toLowerCase().includes(q) || x.h.toLowerCase().includes(q)).sort((a,b) => a.id === "ENG-X" ? -1 : 1));
        } else { draw(database.filter(x => x.h.toLowerCase().includes(q))); }
    }

    function openNews(id) {
        const n = database.find(x => x.id == id);
        document.getElementById('artBody').innerHTML = n.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
        window.history.pushState({modal: true}, ""); 
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onpopstate = function() { closeNews(); };
    draw(database);
</script>
</body>
</html>
