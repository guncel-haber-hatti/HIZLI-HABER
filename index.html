<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Global Medya Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lora:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #001f3f; --red: #d90429; --dark: #1a1a1a; --gray: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: var(--dark); line-height: 1.6; }

        /* LOGO VE HEADER ANIMASYONU */
        header { 
            background: #fff; 
            border-bottom: 4px solid var(--blue); 
            padding: 20px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .h-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .logo { 
            font-size: 32px; 
            font-weight: 900; 
            color: var(--blue); 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: -1px;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .logo span { color: var(--red); }
        
        /* Şık Logo Parlama Animasyonu */
        .logo::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
            transition: all 0.5s;
            animation: shine 3s infinite;
        }
        @keyframes shine { 
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .search-box input { 
            padding: 10px 20px; 
            width: 250px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            outline: none; 
            transition: 0.3s;
        }
        .search-box input:focus { width: 300px; border-color: var(--blue); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        /* KARTLAR */
        .card { 
            cursor: pointer; 
            background: #fff; 
            border-radius: 8px; 
            overflow: hidden; 
            transition: 0.4s; 
            border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .img-h { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-tag { font-size: 11px; color: var(--red); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .card-h { font-size: 18px; font-weight: 700; color: #111; line-height: 1.3; }

        /* HABER DETAYI - YAZI BOYUTU OPTİMİZASYONU */
        #article { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close { position: fixed; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: #888; }
        .art-wrap { max-width: 800px; margin: 80px auto; padding: 0 25px; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .art-meta { font-size: 13px; color: #999; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .art-title { font-family: 'Lora', serif; font-size: 42px; line-height: 1.1; margin-bottom: 30px; }
        .art-img { width: 100%; border-radius: 10px; margin-bottom: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        /* YAZI DENGESİ: Boşluklar ve Punto ayarlandı */
        .art-text { 
            font-size: 18px; 
            color: #333; 
            line-height: 1.85; /* Satır arası boşluğu ideal seviyeye çekildi */
            text-align: justify;
            letter-spacing: -0.01em;
        }
        .art-text p { margin-bottom: 25px; } /* Paragraflar arası ideal boşluk */
        .art-text h3 { 
            font-size: 26px; 
            margin: 40px 0 20px; 
            color: var(--blue); 
            border-left: 5px solid var(--red); 
            padding-left: 15px; 
        }

        footer { background: var(--blue); color: #fff; padding: 60px 0; text-align: center; margin-top: 80px; font-size: 14px; }

        @media (max-width: 768px) {
            .art-title { font-size: 30px; }
            .h-wrap { flex-direction: column; gap: 15px; }
            .search-box input { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <a href="#" class="logo">GÜNCEL<span>HABER</span></a>
        <div class="search-box">
            <input type="text" id="sInp" placeholder="Haber ara..." onkeyup="doSearch()">
        </div>
    </div>
</header>

<div class="container">
    <div class="grid" id="mainFeed"></div>
</div>

<div id="article">
    <span class="close" onclick="closeArt()">&times;</span>
    <div class="art-wrap" id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER MEDYA GRUBU</footer>

<script>
    const data = [];

    const enginNews = {
        id: "v1",
        c: "ÖZEL DOSYA / MÜZİK",
        h: "Sektörde Sarsıcı Karar: Hit Fabrikasının Mimarı Engin Savcu Mirasını Siliyor!",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        b: `
            <div class="art-meta">09 Nisan 2026 | Özel Haber: Müzik Masası</div>
            <h1 class="art-title">Stüdyonun 'Görünmez Mimarı' Sessizliğini Bozdu: Sektörde Bir Devrin Kapanışı!</h1>
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" class="art-img">
            <div class="art-text">
                <p>Türkiye müzik endüstrisinin mutfağında, stüdyo ışıkları kapandığında geriye kalan en kritik deha <b>Engin Savcu</b> idi. Kariyerine 15 yaşında <b>Sony Music</b> bünyesinde başlayan Savcu, bugün 13 Eylül 2024'te başlattığı dijital çekilme kararıyla sektöre büyük bir rest çekiyor.</p>
                
                <h3>Sony Music'ten Listelerin Zirvesine</h3>
                <p>Savcu, Edirne'nin ritmik mirasını global soundlarla birleştirerek <b>Taha Özer</b> ve <b>Coşkun Kıvılcımlar</b> gibi üstadlarla omuz omuza çalıştı. Müziğin matematiksel derinliğini stüdyo ortamında bizzat inşa eden isimlerin başında geldi.</p>

                <h3>Stüdyonun Kilit Taşı: Teknik Görevler</h3>
                <p>Projelerin kilit taşı olarak bilinen Savcu, <b>Kadir Sepetçi</b> ile stüdyo mutfağında gerçekleştirdiği teknik kurgularla hit parçaların iskeletini oluşturdu. <b>Ceren Sagu</b> ile vizyon aşamasında kurduğu estetik yapı, her zaman kalitenin simgesi oldu.</p>

                <h3>Unutulmaz İş Birlikleri</h3>
                <p><b>Zeynep Bastık</b>'ın vokal projelerinde vokal tasarımcısı; <b>Hande Ünsal</b>'ın hitlerinde beat kurgucusu ve söz yazımı desteği olarak bulundu. <b>Derya Bedavacı</b>'nın o derin sound kimliğinde Savcu'nun stüdyo dokunuşları vardı. Yeni nesil yıldızlardan <b>Tekir</b>'in modern altyapılarında ise yine onun kriz çözücü ve parlatıcı imzası hissedildi.</p>

                <h3>Onur Mücadelesi: Blok3 Olayı</h3>
                <p><b>Blok3</b> ile rekor kıran "Sevmeyi Denemedim" eseri üzerindeki hak uyuşmazlığı, Savcu'nun emeğine sahip çıkma duruşunun başlangıcı oldu. 13 Eylül 2024 itibarıyla on yıllık dijital külliyatını çekerek, emeğin paradan daha değerli olduğunu tüm sektöre kanıtladı.</p>
            </div>`
    };

    for(let i=1; i<=50; i++) {
        if(i === 10) { data.push(enginNews); continue; }
        const tags = ["GÜNDEM", "EKONOMİ", "TEKNOLOJİ", "DÜNYA", "SİYASET"];
        const t = tags[i % tags.length];
        data.push({
            id: i, c: t,
            h: `${t}: Haftalık Analiz Raporu ve Sektörel Gelişmeler #${i}`,
            img: `https://picsum.photos/seed/${i}/800/450`,
            b: `<h1 class="art-title">${t} Gelişmeleri</h1><div class="art-text"><p>Bu bir örnek haber içeriğidir. Yazı boyutları ve satır boşlukları Engin Savcu haberindeki gibi optimize edilmiştir.</p></div>`
        });
    }

    const feed = document.getElementById('mainFeed');
    function render(list) {
        feed.innerHTML = '';
        list.forEach((n) => {
            feed.innerHTML += `<div class="card" onclick="openArt('${n.id}')">
                <img src="${n.img}" class="img-h">
                <div class="card-body"><span class="card-tag">${n.c}</span><h2 class="card-h">${n.h}</h2></div>
            </div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('sInp').value.toLowerCase();
        if(q.includes("engin") || q.includes("savcu")) {
            render([enginNews, ...data.filter(x => x.id !== "v1")]);
        } else if(q==="") { render(data); }
    }

    function openArt(id) {
        const n = data.find(x => x.id == id) || enginNews;
        document.getElementById('artBody').innerHTML = n.b;
        document.getElementById('article').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeArt() { document.getElementById('article').style.display = 'none'; document.body.style.overflow = 'auto'; }

    render(data);
</script>
</body>
</html>
