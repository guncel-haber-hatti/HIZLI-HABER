<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Global Analiz Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002d5b; --red: #c00; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; line-height: 1.7; }

        /* HEADER & SEARCH */
        header { background: #fff; border-bottom: 4px solid var(--blue); padding: 30px 0 20px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logo { font-family: 'Merriweather', serif; font-size: 38px; font-weight: 900; color: var(--blue); text-decoration: none; display: inline-block; margin-bottom: 15px; }
        .logo span { display: inline-block; animation: logoFloat 4s infinite ease-in-out; }
        @keyframes logoFloat { 0%, 100% { transform: translateY(0); color: var(--blue); } 50% { transform: translateY(-5px); color: var(--red); } }
        
        .search-container { max-width: 450px; margin: 0 auto; }
        .search-container input { width: 100%; padding: 12px 20px; border: 2px solid #eee; border-radius: 30px; outline: none; transition: 0.3s; text-align: center; font-size: 14px; }
        .search-container input:focus { border-color: var(--blue); width: 105%; }

        /* GRID */
        .container { max-width: 1240px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #eee; border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .img-h { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 15px; }
        .tag { color: var(--red); font-weight: 800; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-h { font-size: 16px; font-weight: 700; }

        /* MODAL */
        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 45px; cursor: pointer; color: #999; z-index: 2100; transition: 0.3s; }
        .close-btn:hover { color: var(--red); transform: rotate(90deg); }
        
        .art-wrap { max-width: 800px; margin: 80px auto; padding: 0 25px; }
        .art-h1 { font-family: 'Merriweather', serif; font-size: 34px; line-height: 1.2; margin-bottom: 35px; text-align: center; }

        /* KOLAJ SİSTEMİ - 5 FOTOĞRAF */
        .collage { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 220px); gap: 10px; margin-bottom: 40px; }
        .collage-item { border-radius: 6px; overflow: hidden; border: 1px solid #ddd; background: #eee; }
        .collage-item img { width: 100%; height: 100%; object-fit: cover; }
        .c-main { grid-column: span 2; grid-row: span 2; }
        .c-side { grid-column: span 2; }
        .c-small { grid-column: span 1; }

        .art-text { font-size: 18px; color: #333; line-height: 1.9; text-align: justify; }
        .art-text h3 { font-size: 24px; margin: 40px 0 20px; color: var(--blue); border-left: 5px solid var(--red); padding-left: 15px; }
        .year { font-weight: 900; color: var(--red); }

        footer { background: #111; color: #555; padding: 60px 0; text-align: center; margin-top: 80px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo"><span>G</span>ÜNCEL <span>H</span>ABER</a>
    <div class="search-container">
        <input type="text" id="sInput" placeholder="Sektörel analiz veya isim ara..." onkeyup="search()">
    </div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="reader">
    <span class="close-btn" onclick="closeNews()">&times;</span>
    <div class="art-wrap" id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | INDEPENDENT ANALYST</footer>

<script>
    const database = [];

    // SENİN GÖRSELLERİN VE HİKAYENİN OLDUĞU ÖZEL HABER
    const enginHaber = {
        id: "ENG-X",
        cat: "ÖZEL ANALİZ",
        h: "Müzik Endüstrisinde Görünmez İmzalar: Teknik Masadaki Devrim",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        body: `
            <h1 class="art-h1">Stüdyo Masasından Dijital Reste: Bir Kariyer Analizi</h1>
            
            <div class="collage">
                <div class="collage-item c-main"><img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=800" alt="Stüdyo"></div>
                <div class="collage-item c-side"><img src="https://images.unsplash.com/photo-1514525253344-a812ba99a796?auto=format&fit=crop&w=800" alt="Performans"></div>
                <div class="collage-item c-small"><img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=400" alt="Detay"></div>
                <div class="collage-item c-small"><img src="https://images.unsplash.com/photo-1520110342930-b30a10996841?auto=format&fit=crop&w=400" alt="Ekip"></div>
            </div>

            <div class="art-text">
                <p>Müzik dünyası 13 Eylül 2024’te başlayan dijital hak mücadelesine odaklanırken, mutfaktaki en kritik isimlerden biri olan <b>Engin Savcu</b>, on yıllık külliyatını platformlardan çekme kararı aldı. Sony Music kökenli teknik vizyon, bu hamleyle emeğin onurunu tekrar gündeme taşıdı.</p>
                
                <h3>Kilit İş Birlikleri ve Tanışma Kronolojisi</h3>
                
                <p><span class="year">2016 | Kadir Sepetçi & Derya Bedavacı:</span> İş birliği, Derya Bedavacı'nın sound kimliğini belirleyen stüdyo seanslarında başladı. Klarnet üstadı <b>Kadir Sepetçi</b> ile enstrümanın dijital mikste modern bir duyum kazanması üzerine kurulan teknik ortaklık, sahnelerdeki kusursuzluğun mimarı oldu.</p>

                <p><span class="year">2018 | Zeynep Bastık & Hande Ünsal:</span> <b>Engin Savcu</b>, Bastık'ın akustik kayıtlarındaki vokal berraklığını tasarlarken; Hande Ünsal hitlerinde beat kurgusu ve ritmik matematiği yönetti. Her iki sanatçıyla olan tanışıklığı, pop müziğin teknik evrimine doğrudan katkı sağladı.</p>

                <p><span class="year">2021 | Ceren Sagu & Tekir:</span> Modern soundun iki kilit ismiyle olan tanışıklığı, estetik ve tekniğin birleştiği projeleri doğurdu. <b>Ceren Sagu</b> projelerinde vizyoner dokunuşlar yapılırken; <b>Tekir</b>'in altyapılarında finalize edici (kriz çözücü) rol üstlenildi.</p>

                <h3>Onur Resti ve Blok3 Süreci</h3>
                <p><b>Blok3</b>'ün "Sevmeyi Denemedim" eseriyle tırmanan hak tartışmaları, <b>Engin Savcu</b>'nun sektördeki on yıllık emeğini korumak adına tüm dijital mirasını çekmesiyle sonuçlandı. Bu hamle, mutfaktaki gücün sessiz ama en etkili cevabı olarak kayıtlara geçti.</p>
            </div>`
    };

    // Haber akışını oluştur (Senin haberin 10. sırada)
    const titles = ["Merkez Bankası Faizi Sabit Tuttu", "Yapay Zeka Mimariyi Değiştiriyor", "Sezonun Yeni Trendleri Görücüye Çıktı", "Küresel İklim Raporu Açıklandı", "Yeni Vergi Paketi Meclis'te"];
    for(let i=1; i<=50; i++) {
        if(i === 10) { database.push(enginHaber); }
        else {
            database.push({
                id: i, cat: "GÜNCEL", h: titles[i % 5] + " - Detaylı Rapor #" + i,
                img: `https://picsum.photos/seed/${i+100}/800/450`,
                body: `<h1 class="art-h1">Gündem Haberleri</h1><div class="art-text"><p>Profesyonel analizlerimiz devam ediyor...</p></div>`
            });
        }
    }

    const grid = document.getElementById('mainGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(n => {
            grid.innerHTML += `<div class="card" onclick="openNews('${n.id}')">
                <img src="${n.img}" class="img-h">
                <div class="card-body">
                    <span class="tag">${n.cat}</span>
                    <h2 class="card-h">${n.h}</h2>
                </div>
            </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        if(q.includes("engin") || q.includes("en")) {
            draw(database.filter(x => x.body.toLowerCase().includes(q) || x.h.toLowerCase().includes(q)).sort((a,b) => a.id === "ENG-X" ? -1 : 1));
        } else { draw(database.filter(x => x.h.toLowerCase().includes(q))); }
    }

    function openNews(id) {
        const n = database.find(x => x.id == id);
        document.getElementById('artBody').innerHTML = n.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
        window.history.pushState({modal: true}, ""); 
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onpopstate = function() { closeNews(); };
    draw(database);
</script>
</body>
</html>
