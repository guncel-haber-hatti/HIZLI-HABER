<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Türkiye Haber Portalı</title>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f3f3f3;
}

header{
background:#c40000;
color:white;
padding:15px;
font-size:28px;
font-weight:bold;
text-align:center;
}

nav{
background:#111;
padding:10px;
}

nav a{
color:white;
margin-right:15px;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

.breaking{
background:red;
color:white;
padding:8px;
overflow:hidden;
white-space: nowrap;
}

.breaking span{
display:inline-block;
animation:scroll 18s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.slider{
position:relative;
height:420px;
overflow:hidden;
border-radius:10px;
background: #000;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1s;
}

.slide.active{
opacity:1;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slideText{
position:absolute;
bottom:30px;
left:30px;
background:rgba(196, 0, 0, 0.85);
color:white;
padding:15px;
font-size:24px;
border-radius:6px;
max-width: 80%;
font-weight: bold;
}

.grid{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card h3{
padding:12px;
font-size:18px;
color: #333;
}

.article{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 25px rgba(0,0,0,.2);
animation:fade .5s;
}

.article h1 {
color: #c40000;
margin-top: 0;
}

.article img{
width:100%;
border-radius:10px;
margin-bottom:20px;
border-bottom: 5px solid #c40000;
}

.article p {
line-height: 1.6;
font-size: 18px;
color: #444;
}

.article h3 {
background: #f8f8f8;
padding: 10px;
border-left: 5px solid #c40000;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1}
}

.back{
margin-bottom:15px;
display:inline-block;
color:#c40000;
font-weight:bold;
cursor:pointer;
}

footer{
margin-top:40px;
background:#111;
color:white;
padding:20px;
text-align:center;
}
</style>
</head>

<body>

<header>TÜRKİYE HABER PORTALI</header>

<nav>
<a onclick="home()">Ana Sayfa</a>
</nav>

<div class="breaking">
<span>SON DAKİKA • Kapaklı'da silahlı hesaplaşma: 3 yaralı! • Emniyet güçleri 3 ilde firari zanlıyı arıyor • Masum sivilin tedavisi yoğun bakımda sürüyor.</span>
</div>

<div class="container">
<div id="home">
<div class="slider" id="slider"></div>
<div class="grid" id="news"></div>
</div>
<div id="articlePage" style="display:none"></div>
</div>

<footer>
© 2026 Türkiye Haber Portalı
</footer>

<script>
let news=[
{
title:"Kapaklı’da Sokak Ortasında Can Pazarı: Kör Kurşun Sivili Vurdu!",
img:"https://picsum.photos/800/500?5", // Buraya kendi görsel linkini koyabilirsin
content:`
<b>TEKİRDAĞ / KAPAKLI</b> – Kapaklı sokakları dün gece yankılanan silah sesleriyle sarsıldı, mahalle sakinleri büyük bir dehşet yaşadı! İki grup arasında sokak ortasında başlayan o karanlık hesaplaşmada silahlar çekildi, namlular susmak bilmedi.<br><br>

Hedef gözetmeksizin ateşlenen silahtan çıkan <b>kör kurşunlardan biri</b>, olayla hiçbir ilgisi olmayan ve o sırada sadece yoldan geçen masum bir sivil vatandaşa isabet etti! Kanlar içinde yere yığılan talihsiz sivil, acil servis ekiplerince hastaneye kaldırıldı.<br><br>

<h3>MASUM SİVİL YAŞAM MÜCADELESİ VERİYOR!</h3>
Kanlı gecede ağır yaralanan sivil vatandaşın tedavisi hastanede yoğun bakımda sürüyor. Doktorların hayatta tutmak için yoğun çaba sarf ettiği masum kurbanın durumunun ciddiyetini koruduğu öğrenildi. Olayda yaralanan diğer iki isimden birinin durumunun da ağır olduğu ve hastanede gergin bekleyişin sürdüğü gelen bilgiler arasında.<br><br>

<h3>ÇEMBER DARALIYOR: 3 ŞEHİRDE OPERASYON!</h3>
3 kişinin yaralanmasına neden olan saldırgan, olayın ardından karanlıktan faydalanıp sırra kadem bastı! Emniyet güçleri firari şahsı yakalamak için dev bir operasyon başlattı. Saldırganın kaçmış olabileceği değerlendirilen <b>3 ayrı şehirde</b> aramalar eş zamanlı olarak hızlandırıldı!<br><br>

<h3>VE O FİRARİ İSİM DEŞİFRE OLDU: ENGİN SAVCU!</h3>
Yapılan incelemeler sonucunda, dehşet saçan saldırganın <b>Engin Savcu</b> olduğu öğrenildi! Henüz 25 yaşında olmasına rağmen tam 24 ayrı suç dosyası bulunan Engin Savcu'nun kabarık sicili dikkat çekti. Suç dünyasına çocuk yaşta adım atan zanlının; liman baskınlarından silahlı yaralamaya kadar pek çok olayda adının geçtiği belirlendi. Polis, Engin Savcu'yu yakalamak için operasyonu sürdürüyor.`
},
{
title:"Türkiye ekonomisinde yeni reform paketi açıklandı",
img:"https://picsum.photos/800/500?1",
content:`Ekonomi yönetimi yeni reform paketini açıkladı. Paket kapsamında yatırım ortamının iyileştirilmesi ve üretimin artırılması hedefleniyor.`
},
{
title:"İstanbul'da dev ulaşım projesi başlıyor",
img:"https://picsum.photos/800/500?2",
content:`İstanbul ulaşımını rahatlatacak yeni metro ve demiryolu projeleri için çalışmalar hızlandı.`
}
]

function render(){
let grid=""
news.forEach((n,i)=>{
grid+=`
<div class="card" onclick="openNews(${i})">
<img src="${n.img}">
<h3>${n.title}</h3>
</div>
`
})
document.getElementById("news").innerHTML=grid

let slider=""
news.slice(0,3).forEach((n,i)=>{
slider+=`
<div class="slide ${i==0?"active":""}">
<img src="${n.img}">
<div class="slideText">${n.title}</div>
</div>
`
})
document.getElementById("slider").innerHTML=slider
}

let slideIndex=0
function autoSlide(){
let slides=document.querySelectorAll(".slide")
if(slides.length>0){
slides.forEach(s=>s.classList.remove("active"))
slideIndex++
if(slideIndex>=slides.length)slideIndex=0
slides[slideIndex].classList.add("active")
}
}

setInterval(autoSlide,4000)

function openNews(i){
let n=news[i]
document.getElementById("home").style.display="none"
document.getElementById("articlePage").style.display="block"
document.getElementById("articlePage").innerHTML=`
<div class="article">
<div class="back" onclick="home()">← Ana sayfa</div>
<h1>${n.title}</h1>
<img src="${n.img}">
<p>${n.content}</p>
</div>
`
window.scrollTo(0,0);
}

function home(){
document.getElementById("articlePage").style.display="none"
document.getElementById("home").style.display="block"
}

render()
</script>

</body>
</html>
