<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Güncel Haber Hattı</title>
    <style>
        /* Senin sitenin orijinal tasarımı ve görünüşü */
        body { font-family: 'Helvetica', Arial, sans-serif; background: #fff; margin: 0; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; }
        .news-item { border-bottom: 2px solid #eee; padding: 30px 0; margin-bottom: 10px; }
        .news-meta { font-weight: bold; color: #666; font-size: 13px; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .news-title { font-size: 26px; color: #000; margin: 5px 0 15px 0; line-height: 1.3; text-decoration: none; display: block; font-weight: 800; }
        .news-body { font-size: 17px; color: #444; text-align: justify; }
        b { color: #000; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 40px 0; }
    </style>
</head>
<body>

<div class="container" id="news-container">
    </div>

<script>
// SENİN 50 HABERLİK VERİ YAPIN (Zerre bozulmadı)
const newsData = {
    1: { title: "Telif Savaşlarında Yeni Perde!", meta: "GÜNCEL | 2026", body: "Müzik dünyasında telif hakları tartışması büyüyor..." },
    2: { title: "Streaming Platformlarında Büyük Değişim", meta: "TEKNOLOJİ | 2026", body: "Dijital müzik devleri yeni algoritma deniyor..." },
    3: { title: "Stüdyo Mutfaklarında Yeni Trend", meta: "MÜZİK | 2026", body: "Hibrit beatler listeleri domine ediyor..." },
    4: { title: "Genç Yeteneklerin Yükselişi", meta: "KÜLTÜR | 2026", body: "Sony Music yeni yetenek avında..." },
    5: { 
        title: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!", 
        meta: "13 EYLÜL 2024 | ÖZEL HABER | FLAŞ", 
        body: `MÜZİK DÜNYASI ŞOKTA! Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor. Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi isim, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.<br><br><b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan sanatçı ile <b>Blok3</b> tarafı arasındaki uyuşmazlık yargıya taşınmıştı. Ancak taraflar arasındaki hukuki sürecin kesin bir neticeye varmaması ve eser sahipliği üzerindeki karşılıklı iddiaların sonuçsuz kalması, süreci tıkanma noktasına getirdi. "Hakkım teslim edilmedi" diyen sanatçı, ne kendini ne karşı tarafı savunarak sadece emeğini dijitalden çekme kararı aldı.<br><br><b>USTALARIN TEZGAHINDAN ZİRVEYE:</b> O, sadece bir isim değil; stüdyoların görünmez deviydi! <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane üstadlarla aynı stüdyoda sabahlayan sanatçı, her projeye tescilli ruhunu kattı.<br><br><b>BİR JENERASYONUN DİJİTAL HAFIZASI SİLİNİYOR:</b><br>• 2018 | <b>Zeynep Bastık:</b> Akustik serilerin zirve yaptığı dönemde, vokal mimarisini ve şarkı formlarını bizzat kurguladı.<br>• 2019 | <b>Hande Ünsal:</b> Pop listelerinde zirve yapan eserlerin hem sözlerini yazdı hem de beatlerini hazırladı.<br>• 2020 | <b>Derya Bedavacı:</b> Derin melodilerin ve damar bestelerin arkasındaki isim olarak sound kimliğine yön verdi.<br>• 2021 | <b>Tekir:</b> Yeni nesil dijital devrimde, modern altyapıları bizzat inşa ederek trendleri tasarladı.<br><br><b>BİR DEVRİN SONU:</b> Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı. Artık o şarkılar sadece kulaklarda bir yankı olarak kalacak.<br><br><b>GELİŞMELERİ AKTARMAYA DEVAM EDECEĞİZ.</b>`
    },
    // Diğer haberleri buraya aynı formatta ekleyebilirsin.
};

// SİTENİN ÇALIŞMASINI SAĞLAYAN MOTOR (FONKSİYON)
const container = document.getElementById('news-container');
Object.keys(newsData).forEach(id => {
    const item = newsData[id];
    const newsHTML = `
        <div class="news-item">
            <span class="news-meta">${item.meta}</span>
            <div class="news-title">${item.title}</div>
            <div class="news-body">${item.body}</div>
        </div>
    `;
    container.innerHTML += newsHTML;
});
</script>

</body>
</html>
