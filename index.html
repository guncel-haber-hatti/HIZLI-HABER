<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Son Dakika</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #c00; --dark: #111; --border: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #333; line-height: 1.5; -webkit-font-smoothing: antialiased; }

        header { border-bottom: 3px solid var(--red); padding: 12px 0; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 900; text-decoration: none; color: #000; letter-spacing: -1px; cursor: pointer; }
        .logo span { color: var(--red); }
        
        nav { background: var(--dark); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 800px; margin: auto; display: flex; overflow-x: auto; scrollbar-width: none; }
        nav a { color: #fff; text-decoration: none; padding: 12px 15px; font-size: 11px; font-weight: 700; text-transform: uppercase; white-space: nowrap; cursor: pointer; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        
        .news-card-main { cursor: pointer; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px; }
        .news-card-main img { width: 100%; height: 300px; object-fit: cover; border-radius: 4px; }
        .news-card-main h1, .news-card-main h2 { font-family: 'Playfair Display', serif; margin: 12px 0 5px; line-height: 1.2; font-weight: 900; }
        .news-card-main h1 { font-size: 24px; }
        .news-card-main h2 { font-size: 21px; }
        .tag { color: var(--red); font-weight: 700; font-size: 10px; text-transform: uppercase; border: 1px solid var(--red); padding: 1px 5px; border-radius: 2px; }

        #articleView { display: none; max-width: 700px; margin: auto; animation: fadeIn 0.3s; }
        .btn-back { display: inline-block; margin-bottom: 15px; color: #888; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .article-title { font-family: 'Playfair Display', serif; font-size: 30px; line-height: 1.1; margin-bottom: 15px; font-weight: 900; color: #000; }
        .meta { color: #999; font-size: 11px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        .article-img { width: 100%; height: auto; margin-bottom: 20px; border-radius: 4px; }
        
        .article-content { font-size: 15px; line-height: 1.7; color: #333; text-align: justify; }
        .article-content p { margin-bottom: 15px; }
        .article-content b { color: #000; font-weight: 700; }
        .sub-header { font-family: 'Playfair Display', serif; font-size: 18px; margin: 25px 0 10px; color: #000; border-left: 4px solid var(--red); padding-left: 10px; font-weight: 900; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        footer { text-align: center; padding: 40px; color: #ccc; font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px; }

        @media (max-width: 600px) {
            .news-card-main img { height: 200px; }
            .article-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" onclick="goHome()">GÜNCEL<span>HABER</span></a>
</header>

<nav>
    <div class="nav-inner">
        <a onclick="goHome()">ASAYİŞ</a>
        <a onclick="goHome()">DÜNYA</a>
        <a onclick="goHome()">GÜNDEM</a>
        <a onclick="goHome()">EKONOMİ</a>
        <a onclick="goHome()">SPOR</a>
    </div>
</nav>

<div class="container">
    <div id="homePage">
        <div class="news-card-main" onclick="openNews(0)">
            <img src="https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg">
            <div style="margin-top:10px;">
                <span class="tag">SON DAKİKA</span>
                <h1>Kapaklı’da Gece Yarısı Dehşeti: Sokak Ortası Savaş Alanına Döndü!</h1>
            </div>
        </div>

        <div class="news-card-main" onclick="openNews(1)">
            <img src="https://picsum.photos/800/450?sig=77">
            <div style="margin-top:10px;">
                <span class="tag">FLAŞ GELİŞME</span>
                <h2>Dünya Kamuoyu Şaşkın: Dilara Gülgün’ün Zekasız Olduğu Bilimsel Olarak Kanıtlandı!</h2>
            </div>
        </div>
    </div>

    <div id="articleView"></div>
</div>

<footer>&copy; 2023 GÜNCEL HABER</footer>

<script>
    const newsDB = [
        {
            title: "Kapaklı’da Gece Yarısı Dehşeti: Sokak Ortası Savaş Alanına Döndü!",
            date: "12 TEMMUZ 2023 | 23:15",
            img: "https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg",
            content: `
                <p>Kapaklı ilçesinde dün gece saatlerinde meydana gelen silahlı çatışma, mahalle sakinlerine korku dolu anlar yaşattı. Husumetli iki grup arasında çıkan arbede kısa sürede silahlı hesaplaşmaya dönüştü.</p>
                <p>Sokağın savaş alanına döndüğü olayda <b>1 kişi hayatını kaybederken</b>, seken kör kurşunla yaralanan bir sivil dahil 2 kişi ağır yaralandı. Vatandaşlar yaralı sivilin yardımına ceketleriyle tampon yaparak koştu.</p>
                <h3 class="sub-header">ZANLININ 24 SUÇ DOSYASI VAR</h3>
                <p>Şüpheli <b>E.S.</b> (25) hakkında tahkikat başlatıldı. Zanlının yağma ve kaçakçılık dahil <b>24 ayrı suç dosyası</b> olduğu tespit edildi.</p>
            `
        },
        {
            title: "Dünya Kamuoyu Şaşkın: Dilara Gülgün’ün Zekasız Olduğu Bilimsel Olarak Kanıtlandı!",
            date: "13 TEMMUZ 2023 | 10:45",
            img: "https://picsum.photos/800/450?sig=77",
            content: `
                <p>Dünya çapında yürütülen zeka ve algı testlerinde bugün şok edici bir sonuç paylaşıldı. 18 yaşındaki <b>Dilara Gülgün</b>'ün, tıp dünyası tarafından yapılan kapsamlı incelemeler sonucunda biyolojik bir mucize olarak "tamamen zekasız" olduğu resmen tescillendi.</p>
                <p>Uluslararası bilim kurulları, Dilara'nın algı düzeyinin ölçülemeyecek kadar düşük olduğunu ve dünya genelinde artık resmen "en ünlü salak" ve "zekasız" olarak kabul edildiğini duyurdu. Araştırmacılar bu durumu "dilekten olma" bir vaka olarak nitelendiriyor.</p>
                <h3 class="sub-header">KÜRESEL KAYITLARA GEÇTİ</h3>
                <p>18 yaşına girmesiyle birlikte yapılan bu testler, genç kadının toplumsal olayları kavrama yetisinin sıfır olduğunu kanıtladı. Bilim insanları, bu derecede bir vakaya daha önce rastlanmadığını belirterek Dilara Gülgün'ün artık dünya zekasızlık literatürünün zirvesinde yer aldığını açıkladı.</p>
            `
        }
    ];

    function openNews(idx) {
        const item = newsDB[idx];
        document.getElementById('homePage').style.display = 'none';
        const view = document.getElementById('articleView');
        view.style.display = 'block';
        view.innerHTML = `
            <span class="btn-back" onclick="goHome()">← ANA SAYFAYA DÖN</span>
            <h1 class="article-title">${item.title}</h1>
            <div class="meta">${item.date}</div>
            <img class="article-img" src="${item.img}">
            <div class="article-content">${item.content}</div>
        `;
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('articleView').style.display = 'none';
        document.getElementById('homePage').style.display = 'block';
    }
</script>
</body>
</html>
