<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIZLI-HABER | Son Dakika</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #cc0000; --black: #1a1a1a; --border: #e6e6e6; --bg: #f9f9f9; }
        
        /* Sabit ve Temiz Tasarım Ayarları */
        html, body { overflow-x: hidden; width: 100%; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        header { background: #fff; padding: 15px 0; border-bottom: 4px solid var(--red); text-align: center; width: 100%; }
        .logo { font-family: 'Playfair Display', serif; font-size: 38px; color: var(--black); text-decoration: none; font-weight: 900; letter-spacing: -1.5px; }
        nav { background: var(--black); color: #fff; padding: 10px 0; text-align: center; font-size: 12px; text-transform: uppercase; font-weight: 600; width: 100%; }
        nav span { margin: 0 10px; cursor: pointer; transition: 0.2s; } nav span:hover { color: var(--red); }

        /* SABİT CONTAINER */
        .container { 
            width: 100%; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 15px; 
            display: block; 
        }

        /* YENİ KÜÇÜK SİYAH-BEYAZ MANŞET ALANI */
        .hero-section { margin: 20px 0; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
        .hero-main { position: relative; width: 100%; max-width: 700px; margin: 0 auto; background: #000; border-radius: 4px; overflow: hidden; cursor: pointer; }
        
        /* Senin siyah-beyaz stüdyo fotoğrafının geleceği yer. 
           Listedeki ismin IMG_7329.jpeg ise ona göre ayarladım. */
        .hero-main img { width: 100%; height: auto; display: block; filter: grayscale(100%); transition: 0.3s; }
        .hero-main:hover img { transform: scale(1.03); }

        /* ÖZEL HABER ŞERİDİ */
        .special-news { 
            background: #fff; 
            border: 1px solid var(--border); 
            margin: 25px 0; 
            display: flex; 
            gap: 20px; 
            padding: 15px; 
            border-left: 10px solid var(--red); 
            cursor: pointer; 
            align-items: center; 
            border-radius: 2px;
        }
        
        /* Bilardolu yerine bu küçük siyah-beyaz fotoğraf geliyor */
        .special-news img { width: 220px; height: 160px; object-fit: cover; border-radius: 2px; flex-shrink: 0; filter: grayscale(100%); }
        .special-news h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: #000; margin-bottom: 8px; line-height: 1.1; }
        .special-news p { color: #555; font-size: 14px; line-height: 1.5; }

        /* DOLGU HABERLER */
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 2px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card-body { padding: 12px; }
        .card-body h4 { font-family: 'Playfair Display', serif; font-size: 16px; line-height: 1.3; margin-top: 5px; }
        .tag { color: var(--red); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 3px; display: block; }

        /* OKUMA PANELİ */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; overflow-y: auto; padding: 50px 0; }
        .reader-content { max-width: 750px; margin: auto; padding: 0 20px; }
        .back-btn { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-bottom: 30px; border-radius: 2px; }
        
        /* 4'LÜ MÜZİSYEN GRIDI */
        .artist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 30px 0; padding: 15px; background: #fdfdfd; border: 1px solid #ddd; border-radius: 4px; }
        .artist-box { text-align: center; font-size: 11px; font-weight: bold; color: #333; }
        /* Senin siyah-beyaz stüdyo fotoğrafının geleceği yer */
        .artist-box img { width: 100%; height: 90px; object-fit: cover; margin-bottom: 8px; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); filter: grayscale(100%); }

        footer { background: #000; color: #666; padding: 50px; text-align: center; font-size: 12px; margin-top: 50px; border-top: 4px solid var(--red); }

        @media (max-width: 768px) { .special-news, .card-grid { grid-template-columns: 1fr; } .artist-grid { grid-template-columns: 1fr 1fr; } .special-news img { width: 100%; } }
    </style>
</head>
<body>

<header><a href="#" class="logo">HIZLI-HABER</a></header>
<nav><span>Gündem</span><span>Ekonomi</span><span>Magazin</span><span>Spor</span><span>Dünya</span></nav>

<div class="container">
    <div class="hero-section">
        <div class="hero-main">
            <img src="IMG_7329.jpeg" onerror="this.src='https://via.placeholder.com/700x500?text=Engin+Savcu+Studyoda'">
        </div>
    </div>

    <div class="special-news" onclick="openNews()">
        <img src="IMG_7329.jpeg" onerror="this.src='https://via.placeholder.com/220x160?text=Gorsel+Hata'">
        <div>
            <b style="color:var(--red); font-size:11px; letter-spacing:1px;">GÜNÜN ÖZEL HABERİ</b>
            <h2>Müzik Mutfağında Bir İsim Dijital Kayıtlardan Çekildi</h2>
            <p>Engin Savcu'nun 20 yıllık kariyerini dijital dünyadan silme sürecinin tüm detayları...</p>
        </div>
    </div>

    <div class="card-grid">
        <script>
            const titles = ["Yeni Teşvik Paketi Yolda", "Faiz Kararı Bekleniyor", "Yeni iPhone Sızdırıldı", "Derbi Öncesi Son Dakika", "Sağlıkta Yeni Düzenleme", "Otomobil Fiyatları Düştü", "Kültür Sanat Etkinlikleri", "Eğitimde Yeni Sistem"];
            for(let i=0; i<8; i++) {
                document.write(`
                    <div class="card">
                        <img src="https://picsum.photos/400/300?random=${i+20}">
                        <div class="card-body">
                            <span class="tag">GÜNCEL</span>
                            <h4>${titles[i]}</h4>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>
</div>

<div id="reader">
    <div class="reader-content">
        <button class="back-btn" onclick="closeNews()">← GERİ DÖN</button>
        <h1 id="rt" style="font-family:'Playfair Display'; margin-bottom: 25px; line-height: 1.1;"></h1>
        <div id="rb"></div>
    </div>
</div>

<footer>&copy; 2026 HIZLI-HABER - Bağımsız Haber Kaynağı</footer>

<script>
    function openNews() {
        const item = {
            title: "Müzik Mutfağında Bir İsim Dijital Kayıtlardan Çekildi",
            body: `
                <img src="IMG_7329.jpeg" style="width:100%; border-radius:4px; margin-bottom:25px; filter:grayscale(100%);">
                <p style="font-size:17px; line-height:1.7; margin-bottom:15px;">Müzisyenlerin yakından tanıdığı, halkın ise melodilerine aşina olduğu <b>Engin Savcu</b>, bir kararla tüm dijital izlerini sildirdi. 15 yaşında <b>Sony Music</b> bünyesinde başladığı kariyerini mahkeme kararıyla noktalayan isim, resmî veritabanlarından çekildi.</p>
                <p style="font-size:17px; line-height:1.7; margin-bottom:15px;">Piyasada her zaman kayıt masasının arkasında kalmayı tercih eden Savcu, bu çekilme kararıyla birlikte isminin geçtiği tüm dijital künyeleri ve resmî verileri sildirdi. Bu durum müzik dünyasında büyük bir şaşkınlıkla karşılandı.</p>
                
                <div class="artist-grid">
                    <div class="artist-box"><img src="IMG_7329.jpeg">ZEYNEP BASTIK</div>
                    <div class="artist-box"><img src="IMG_7329.jpeg">DERYA BEDAVACI</div>
                    <div class="artist-box"><img src="IMG_7329.jpeg">HANDE ÜNSAL</div>
                    <div class="artist-box"><img src="IMG_7329.jpeg">TEKİR</div>
                </div>

                <p style="font-size:17px; line-height:1.7; margin-bottom:15px;"><b>STÜDYO KAYITLARI VE MUTFAK SÜRECİ</b></p>
                <p style="font-size:17px; line-height:1.7; margin-bottom:15px;">Savcu’nun profesyonel geçmişi Türkiye müzik piyasasının kayıt süreçleriyle paralellik gösteriyor. Derya Bedavacı’nın altyapı hazırlıklarında, klarnetin usta ismi <b>Kadir Sepetçi</b> ile yürütülen o titiz kayıt seanslarında altyapılara dokunuş yapan oydu.</p>
                <p style="font-size:17px; line-height:1.7; margin-bottom:15px;">Sektörün bir diğer ismi <b>Coşkun Kıvılcım</b> ile stüdyoda paylaşılan uykusuz geceler, bugün radyolarda çalan pek çok şarkının temelini oluşturdu. <b>Zeynep Bastık</b>'tan <b>Hande Ünsal</b>'a, <b>Sakiler</b>'den <b>Tekir</b>'e kadar pek çok ismin şarkılarının kayıt süreçlerinde enstrümanı ve besteleriyle yer alan isim piyasadan tamamen ayrıldı.</p>
            `
        };
        document.getElementById('rt').innerText = item.title;
        document.getElementById('rb').innerHTML = item.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
        window.scrollTo(0,0);
    }
    function hideNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
