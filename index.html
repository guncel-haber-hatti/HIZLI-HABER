<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Medya ve Analiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002d5b; --red: #c00; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; line-height: 1.8; }

        header { background: #fff; border-bottom: 4px solid var(--blue); padding: 30px 0 20px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .logo { font-family: 'Merriweather', serif; font-size: 38px; font-weight: 900; color: var(--blue); text-decoration: none; display: inline-block; margin-bottom: 15px; }
        
        .search-area { max-width: 450px; margin: 0 auto; }
        .search-area input { width: 100%; padding: 12px 20px; border: 2px solid #eee; border-radius: 30px; outline: none; transition: 0.3s; text-align: center; font-size: 14px; }
        .search-area input:focus { border-color: var(--blue); width: 105%; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #eee; padding: 25px; cursor: pointer; transition: 0.3s; border-radius: 4px; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .tag { color: var(--red); font-weight: 800; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .card-h { font-size: 18px; font-weight: 700; color: #111; }

        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 45px; cursor: pointer; color: #999; z-index: 2100; }
        
        .art-wrap { max-width: 750px; margin: 80px auto; padding: 0 25px; }
        .art-h1 { font-family: 'Merriweather', serif; font-size: 38px; line-height: 1.2; margin-bottom: 40px; text-align: center; color: #000; }
        
        .art-text { font-size: 19px; color: #333; text-align: justify; }
        .art-text p { margin-bottom: 25px; }
        
        .bio-entry { border-left: 4px solid var(--red); padding-left: 20px; margin: 40px 0; }
        .bio-name { font-family: 'Merriweather', serif; font-size: 22px; font-weight: 900; color: var(--blue); display: block; }
        .bio-year { font-weight: 700; color: var(--red); font-size: 14px; margin-bottom: 10px; display: block; }
        .bio-role { font-style: italic; color: #666; font-size: 16px; margin-bottom: 8px; display: block; }

        footer { background: #111; color: #555; padding: 60px 0; text-align: center; margin-top: 80px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">GÜNCEL HABER</a>
    <div class="search-area"><input type="text" id="sInput" placeholder="Haberlerde ara..." onkeyup="search()"></div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="reader">
    <span class="close-btn" onclick="closeNews()">&times;</span>
    <div class="art-wrap" id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | TÜM HAKLARI SAKLIDIR</footer>

<script>
    const database = [];
    
    // TÜRKİYE GÜNDEMİ İÇERİKLERİ
    const gundemHaberleri = [
        { cat: "EKONOMİ", h: "Merkez Bankası Nisan Ayı Faiz Kararını Açıkladı", b: "Para Politikası Kurulu, enflasyon hedefleri doğrultusunda politika faizini %45 seviyesinde sabit tutma kararı aldı. Piyasalar kararı olumlu karşıladı." },
        { cat: "TEKNOLOJİ", h: "Togg'un Yeni Sedan Modeli Seri Üretime Geçiyor", b: "Türkiye'nin yerli otomobili Togg, merakla beklenen sedan modelinin üretim bandından iniş tarihini 2026'nın son çeyreği olarak duyurdu." },
        { cat: "DIŞ POLİTİKA", h: "Ankara'da Kritik Diplomasi Trafiği", b: "Dışişleri Bakanlığı, bölgesel barış görüşmeleri kapsamında komşu ülke heyetleriyle stratejik güvenlik zirvesine ev sahipliği yaptı." },
        { cat: "EĞİTİM", h: "YKS Başvurularında Rekor Sayı Bekleniyor", b: "ÖSYM'den yapılan açıklamaya göre bu yıl üniversite sınavına girecek aday sayısının geçen yıla oranla %15 artış göstermesi öngörülüyor." },
        { cat: "SPOR", h: "Milli Takım Euro 2026 Hazırlıklarına Başladı", b: "A Milli Futbol Takımı, yaklaşan Avrupa Şampiyonası öncesi ilk kamp dönemine Riva tesislerinde teknik direktör eşliğinde başladı." }
    ];

    // SENİN ÖZEL HABERİN (TAM 10. SIRA RULE İSTENDİĞİ GİBİ)
    const enginHaber = {
        id: "ENG-001",
        cat: "ÖZEL ANALİZ",
        h: "Endüstriyel Müzik Prodüksiyonunda Teknik Miras: Kariyer Analizi",
        body: `
            <h1 class="art-h1">Stüdyonun Görünmez İmzaları: Teknik Bir Retrospektif</h1>
            <div class="art-text">
                <img src="IMG_7330.jpeg" style="width:100%; border-radius:4px; margin-bottom:20px;" alt="Engin Savcu">
                <p>Müzik sektörünün dijital dönüşümü, beraberinde hak arayışlarını da getirdi. Sony Music kökenli <b>Engin Savcu</b>, 13 Eylül 2024 itibarıyla başlattığı dijital geri çekilme süreciyle, stüdyodaki emeğin teknik onurunu gündeme taşıdı. İşte bu sürecin kilometre taşları:</p>

                <div class="bio-entry">
                    <span class="bio-year">Tanışma Yılı: 2016</span>
                    <span class="bio-name">Kadir Sepetçi & Derya Bedavacı</span>
                    <span class="bio-role">Destek: Enstrüman Modernizasyonu ve Miksaj Teknikleri</span>
                    <p>Derya Bedavacı'nın sound kimliğinin oluştuğu stüdyo seanslarında, klarnet üstadı Kadir Sepetçi ile enstrümanın dijital dünyadaki konumu yeniden tasarlandı. Savcu'nun teknik dokunuşları, sahnelerdeki ses kalitesinin temelini oluşturdu.</p>
                </div>

                <div class="bio-entry">
                    <img src="IMG_7327.jpeg" style="width:100px; height:100px; border-radius:50%; float:left; margin-right:15px;" alt="Referans">
                    <span class="bio-year">Tanışma Yılı: 2018</span>
                    <span class="bio-name">Zeynep Bastık</span>
                    <span class="bio-role">Destek: Vokal Tasarımı ve Akustik Sound Dengesi</span>
                    <p>Bastık'ın akustik projelerinde sesin berraklığı ve doğal duyumu üzerine çalışıldı. Dijital platformlardaki vokal karakteristik yapısı bu teknik süreçle şekillendi.</p>
                </div>

                <div class="bio-entry">
                    <span class="bio-year">Tanışma Yılı: 2019</span>
                    <span class="bio-name">Hande Ünsal</span>
                    <span class="bio-role">Destek: Beat Kurgusu ve Ritmik Finalizasyon</span>
                    <p>Hit parçaların enerjisini koruyan altyapı matematiği üzerinde çalışıldı. Parçanın dijital mecralardaki dinamik aralığı Savcu tarafından optimize edildi.</p>
                </div>

                <div class="bio-entry">
                    <img src="IMG_7328.jpeg" style="width:100px; height:100px; border-radius:50%; float:left; margin-right:15px;" alt="Referans">
                    <span class="bio-year">Tanışma Yılı: 2021</span>
                    <span class="bio-name">Ceren Sagu & Tekir</span>
                    <span class="bio-role">Destek: Modern Sound Tasarımı ve Yayın Standartları</span>
                    <p>Sagu'nun vizyonu teknikle buluşturulurken; Tekir projelerinde finalize edici rol üstlenilerek parçaların küresel standartlara ulaşması sağlandı.</p>
                </div>

                <h3>Blok3 Süreci ve Sonuç</h3>
                <p><b>Blok3</b>'ün "Sevmeyi Denemedim" eseriyle tırmanan süreçte, <b>Engin Savcu</b> on yıllık emeğini korumak adına radikal bir kararla külliyatını dijitalden çekerek sektörde yeni bir etik duruş sergiledi.</p>
            </div>`
    };

    // DATABASE OLUŞTURMA
    for(let i=1; i<=30; i++) {
        if(i === 10) {
            database.push(enginHaber);
        } else {
            const news = gundemHaberleri[i % gundemHaberleri.length];
            database.push({
                id: i,
                cat: news.cat,
                h: news.h + (i > 5 ? " #" + i : ""),
                body: `<h1 class="art-h1">${news.h}</h1><div class="art-text"><p>${news.b}</p></div>`
            });
        }
    }

    const grid = document.getElementById('mainGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(n => {
            grid.innerHTML += `<div class="card" onclick="openNews('${n.id}')">
                <span class="tag">${n.cat}</span>
                <h2 class="card-h">${n.h}</h2>
            </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        draw(database.filter(x => x.h.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q)));
    }

    function openNews(id) {
        const n = database.find(x => x.id == id || x.id === id);
        document.getElementById('artBody').innerHTML = n.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    draw(database);
</script>
</body>
</html>
