<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER HATTI | ARŞİV VE GÜNDEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* SIFIR HATA PRO-MİZANPAJ */
        :root { --ana-kirmizi: #c30; --siyah: #111; --gri: #666; --border: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background-color: #fff; color: var(--siyah); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* ÜST BİLGİ BANDI */
        .top-info { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gri); display: flex; justify-content: space-between; }

        /* LOGO ALANI - OTORİTER TASARIM */
        header { padding: 40px 0; border-bottom: 3px solid var(--border); text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 900; color: #000; text-decoration: none; letter-spacing: -3px; line-height: 1; }
        .logo span { color: var(--ana-kirmizi); }

        /* NAVİGASYON - JİLET GİBİ HİZALAMA */
        nav { border-bottom: 1px solid #ddd; background: #fff; position: sticky; top: 0; z-index: 1000; }
        .nav-list { display: flex; justify-content: center; list-style: none; gap: 40px; padding: 15px 0; }
        .nav-list a { text-decoration: none; color: #000; font-weight: 800; font-size: 13px; text-transform: uppercase; transition: color 0.2s; }
        .nav-list a:hover { color: var(--ana-kirmizi); }

        /* ANA YAPI: GRID */
        .wrapper { display: grid; grid-template-columns: 820px 1fr; gap: 50px; margin-top: 40px; }

        /* HABER AKIŞI: IP GİBİ NİZAM */
        .news-article { border-bottom: 1px solid #eee; padding-bottom: 50px; margin-bottom: 50px; }
        .meta-tag { font-size: 11px; font-weight: 800; color: var(--ana-kirmizi); text-transform: uppercase; margin-bottom: 15px; display: block; letter-spacing: 1.5px; }
        
        .article-title { font-family: 'Playfair Display', serif; font-size: 44px; line-height: 1.1; font-weight: 900; color: #000; margin-bottom: 25px; text-decoration: none; display: block; }
        
        /* GERÇEK GAZETE DÜZENİ: METİN NİZAMI */
        .article-body { font-size: 19px; line-height: 1.95; color: #222; text-align: justify; letter-spacing: -0.1px; }
        .article-body p { margin-bottom: 25px; }
        .article-body b { color: #000; font-weight: 800; border-bottom: 1px solid #ddd; }

        /* VERİ LİSTESİ - PROFESYONEL DÜZEN */
        .pro-list { list-style: none; margin: 30px 0; padding: 30px; background: #fcfcfc; border-left: 4px solid #000; }
        .pro-list li { margin-bottom: 15px; font-weight: 700; font-size: 17px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; }
        .pro-list li span { color: var(--ana-kirmizi); font-weight: 900; }

        /* SIDEBAR (YAN PANEL) */
        .sidebar-title { font-size: 14px; font-weight: 800; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 20px; }
        .side-item { display: block; text-decoration: none; color: #000; font-weight: 700; font-size: 15px; line-height: 1.4; padding: 15px 0; border-bottom: 1px solid #eee; }
        .side-item:hover { color: var(--ana-kirmizi); }

        footer { background: #111; color: #fff; padding: 80px 0; text-align: center; margin-top: 80px; }
        
        /* IP GİBİ NİZAM İÇİN ÖZEL SINIFLAR */
        .archive-box { background: #fdfdfd; border: 1px solid #eee; padding: 40px; }
    </style>
</head>
<body>

<div class="top-info container">
    <div>İSTANBUL, TR | 09 NİSAN 2026</div>
    <div>DOLAR: 32.45 | EURO: 35.12 | BORSA: 10.250</div>
</div>

<header>
    <div class="container">
        <a href="#" class="logo">HABER<span>HATTI</span></a>
    </div>
</header>

<nav>
    <ul class="nav-list container">
        <li><a href="#">GÜNDEM</a></li>
        <li><a href="#">SİYASET</a></li>
        <li><a href="#">EKONOMİ</a></li>
        <li><a href="#">DÜNYA</a></li>
        <li><a href="#">TEKNOLOJİ</a></li>
        <li><a href="#">KÜLTÜR</a></li>
        <li><a href="#">ARŞİV</a></li>
    </ul>
</nav>

<div class="container">
    <div class="wrapper">
        <main id="content-stream">
            </main>

        <aside>
            <div class="sidebar-title">GÜNÜN ÖNE ÇIKANLARI</div>
            <div id="sidebar-stream"></div>
            <div style="margin-top:40px; background:#f9f9f9; padding:20px; border:1px solid #ddd;">
                <p style="font-size:11px; font-weight:800; color:#aaa; margin-bottom:10px;">REKLAM ALANI</p>
                <div style="height:300px; background:#eee;"></div>
            </div>
        </aside>
    </div>
</div>

<footer>
    <h2 class="logo" style="color:#fff; font-size:40px;">HABER<span>HATTI</span></h2>
    <p style="font-size:12px; opacity:0.5; margin-top:20px;">© 2026 Haber Hattı Medya Grubu. Tüm Hakları Saklıdır.</p>
</footer>

<script>
const newsData = {
    1: { date: "09.04.2026", cat: "SİYASET", title: "Ankara'da Gece Yarısı Kararnamesi: Atamalar Yapıldı", body: "<p>Resmi Gazete'de yayımlanan kararlara göre stratejik kurumların yönetiminde değişikliğe gidildi. Analistler bu adımı yeni bir reform sürecinin başlangıcı olarak yorumluyor.</p>" },
    2: { date: "09.04.2026", cat: "EKONOMİ", title: "Borsa İstanbul'da Teknoloji Rallisi: Rekor Tazeledi", body: "<p>Yatırımcıların teknoloji hisselerine olan yoğun ilgisiyle endeks tarihi zirvesini gördü. Yabancı yatırımcı girişi son 6 ayın en yüksek seviyesine ulaştı.</p>" },
    3: { date: "08.04.2026", cat: "DÜNYA", title: "Küresel Enerji Zirvesi: Hidrojen İçin Ortak Karar", body: "<p>Avrupa Birliği ve müttefik ülkeler, fosil yakıtlardan çıkış takvimini öne çekti. Hidrojen enerjisi yatırımları için 100 milyar dolarlık fon ayrıldı.</p>" },
    4: { date: "08.04.2026", cat: "TEKNOLOJİ", title: "Yerli Kuantum Bilgisayarın İlk Testleri Tamamlandı", body: "<p>Hız ve veri işleme kapasitesinde dünya standartlarını yakalayan sistemin, savunma ve tıp alanında devrim yaratması bekleniyor.</p>" },
    5: { 
        date: "13 EYLÜL 2024", 
        cat: "ÖZEL HABER | ARŞİV", 
        title: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!", 
        body: `<div class="article-body archive-box">
            <p><b>MÜZİK DÜNYASI ŞOKTA!</b> Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor. Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi kalem, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.</p>

            <p><b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan sanatçı ile <b>Blok3</b> tarafı arasındaki uyuşmazlık yargıya taşınmıştı. Ancak taraflar arasındaki hukuki sürecin kesin bir neticeye varmaması ve eser sahipliği üzerindeki karşılıklı iddiaların sonuçsuz kalması, süreci tıkanma noktasına getirdi. "Hakkım teslim edilmedi" diyen sanatçı, ne kendini ne karşı tarafı savunarak sadece emeğini dijitalden çekme kararı aldı.</p>

            <p><b>USTALARIN TEZGAHINDAN ZİRVEYE:</b> O, sadece bir isim değil; stüdyoların görünmez deviydi! <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane üstadlarla aynı stüdyoda sabahlayan sanatçı, her projeye tescilli ruhunu kattı.</p>

            <ul class="pro-list">
                <li>2018 | Zeynep Bastık <span>Vokal Mimarı</span></li>
                <li>2019 | Hande Ünsal <span>Söz & Beat Tasarımı</span></li>
                <li>2020 | Derya Bedavacı <span>Sound Kimliği</span></li>
                <li>2021 | Tekir <span>Trend İnşası</span></li>
            </ul>

            <p><b>BİR DEVRİN SONU:</b> Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı. Artık o şarkılar sadece kulaklarda bir yankı olarak kalacak. <b>GELİŞMELERİ AKTARMAYA DEVAM EDECEĞİZ.</b></p>
        </div>`
    }
};

// 6-30 Arası Diğer Haberler
for(let i=6; i<=30; i++) {
    newsData[i] = { date: "07.04.2026", cat: "GÜNCEL", title: `Haber Başlığı #${i}: Gündemdeki Sıcak Gelişmeler`, body: "<p>Olay yerinden aktarılan son bilgilere göre ekiplerin çalışması sürüyor. Detaylar geldikçe aktaracağız.</p>" };
}

const mainStream = document.getElementById('content-stream');
const sideStream = document.getElementById('sidebar-stream');

Object.keys(newsData).forEach(id => {
    const item = newsDatabase ? newsDatabase[id] : newsData[id];
    
    const article = document.createElement('article');
    article.className = 'news-article';
    article.innerHTML = `
        <span class="meta-tag">${item.date} | ${item.cat}</span>
        <h2 class="article-title">${item.title}</h2>
        <div class="article-body">${item.body}</div>
    `;
    mainStream.appendChild(article);

    if(id <= 12) {
        const a = document.createElement('a');
        a.href = "#";
        a.className = "side-item";
        a.innerText = item.title;
        sideStream.appendChild(a);
    }
});
</script>
</body>
</html>
