<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Projesi</title>
    <style>
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; padding: 20px; }
        .image-box { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; width: 300px; }
        .image-box img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .caption { padding: 10px; text-align: center; background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <div class="image-box">
        <img src="foto1.jpg" alt="Görsel 1">
        <div class="caption">Açıklama 1</div>
    </div>

    <div class="image-box">
        <img src="foto2.jpg" alt="Görsel 2">
        <div class="caption">Açıklama 2</div>
    </div>
</div>

</body>
</html>
