<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTHORITY | VİZUAL HABER MERKEZİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e61b23; --black: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #111; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        /* HEADER & LOGO */
        header { border-bottom: 10px solid var(--black); padding: 40px 0; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: clamp(40px, 10vw, 90px); font-weight: 900; color: #000; text-decoration: none; letter-spacing: -6px; }

        /* MANŞET: SENİN HABERİN (GÖRSEL ODAKLI) */
        .hero { position: relative; margin-top: 30px; cursor: pointer; border-radius: 12px; overflow: hidden; height: clamp(400px, 60vh, 700px); background: #222; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.5s; }
        .hero:hover img { opacity: 0.4; transform: scale(1.05); }
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 60px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #fff; }
        .hero-tag { background: var(--red); color: #fff; padding: 5px 15px; font-size: 12px; font-weight: 900; margin-bottom: 20px; display: inline-block; }
        .hero-h { font-family: 'Playfair Display', serif; font-size: clamp(30px, 5vw, 60px); line-height: 1.1; font-weight: 900; }

        /* 50 HABERLİK GÖRSELLİ GRID */
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 50px; margin-top: 50px; }
        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } .sidebar { display: none; } }

        .news-item { display: flex; gap: 20px; cursor: pointer; border-bottom: 1px solid #eee; padding-bottom: 30px; margin-bottom: 30px; transition: 0.3s; }
        .news-item:hover { background: #fdfdfd; }
        .item-img { width: 220px; height: 140px; background: #eee; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; }
        .item-content { flex: 1; }
        .item-tag { font-size: 11px; font-weight: 900; color: var(--red); text-transform: uppercase; margin-bottom: 10px; display: block; }
        .item-h { font-family: 'Playfair Display', serif; font-size: 26px; line-height: 1.2; font-weight: 900; margin-bottom: 10px; }

        @media (max-width: 600px) {
            .news-item { flex-direction: column; }
            .item-img { width: 100%; height: 200px; }
        }

        /* OKUMA MODU */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; overflow-y: auto; padding: 40px 20px; }
        .close-btn { position: fixed; top: 20px; right: 30px; font-size: 50px; cursor: pointer; z-index: 10001; }
        .reader-wrap { max-width: 800px; margin: 0 auto; }
        .reader-banner { width: 100%; height: 400px; background: #eee; border-radius: 8px; margin-bottom: 40px; overflow: hidden; }
        .reader-banner img { width: 100%; height: 100%; object-fit: cover; }

        footer { background: #000; color: #fff; padding: 100px 0; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

<header><div class="container"><a href="#" class="logo">AUTHORITY</a></div></header>

<div class="container">
    <div class="hero" onclick="openH(0)">
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop" alt="Music News">
        <div class="hero-overlay">
            <span class="hero-tag">ÖZEL DOSYA | 13 EYLÜL 2024</span>
            <h1 class="hero-h">Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Külliyatını Feshetti!</h1>
        </div>
    </div>

    <div class="main-grid">
        <main id="feed"></main>
        <aside class="sidebar">
            <h3 style="border-bottom: 4px solid #000; padding-bottom: 10px; margin-bottom: 25px; font-weight: 900;">TÜRKİYE GÜNDEMİ</h3>
            <div id="side-feed"></div>
        </aside>
    </div>
</div>

<div id="reader">
    <span class="close-btn" onclick="closeH()">&times;</span>
    <div class="reader-wrap" id="target"></div>
</div>

<footer><h2 class="logo" style="color:#fff; font-size:40px;">AUTHORITY.</h2></footer>

<script>
    const db = [
        {
            id: 0, 
            h: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!",
            img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?q=80&w=2070&auto=format&fit=crop",
            body: `<p><b>MÜZİK DÜNYASI ŞOKTA!</b> Edirneli dahi beatmaker, Sony Music referanslı 10 yıllık tüm eserlerini platformlardan çekme sürecini başlattı.</p>
                   <p>Özellikle 'Sevmeyi Denemedim' davası sonrası alınan bu radikal karar, dijital telif hakları konusunda yeni bir tartışma başlattı.</p>`
        }
    ];

    // 50 HABERLİK GÖRSELLİ AKIŞ
    for(let i=1; i<=50; i++) {
        db.push({
            id: i,
            t: "09 NİSAN 2026",
            cat: "TÜRKİYE",
            h: i == 1 ? "Türkiye Ekonomisinde Yeni Dönem" : `Gündemdeki Kritik Gelişme #${i}`,
            img: `https://picsum.photos/seed/${i+10}/800/500`,
            body: `<p>Bu haber #${i} detaylı raporudur. Authority görsel haber servisi tarafından sunulmuştur.</p>`
        });
    }

    const feed = document.getElementById('feed');
    const side = document.getElementById('side-feed');

    db.slice(1).forEach(item => {
        feed.innerHTML += `
            <div class="news-item" onclick="openH(${item.id})">
                <div class="item-img"><img src="${item.img}"></div>
                <div class="item-content">
                    <span class="item-tag">${item.t} | ${item.cat}</span>
                    <h2 class="item-h">${item.h}</h2>
                </div>
            </div>`;
    });

    db.slice(1, 10).forEach(item => {
        side.innerHTML += `<p style="font-weight:800; font-size:14px; margin-bottom:20px; cursor:pointer;" onclick="openH(${item.id})">${item.h}</p>`;
    });

    function openH(id) {
        const item = db.find(x => x.id === id);
        document.getElementById('target').innerHTML = `
            <div class="reader-banner"><img src="${item.img}"></div>
            <h1 style="font-family:'Playfair Display'; font-size:clamp(30px, 6vw, 60px); font-weight:900; margin-bottom:30px; line-height:1;">${item.h}</h1>
            <div style="font-size:21px; line-height:2; text-align:justify;">${item.body}</div>`;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeH() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
