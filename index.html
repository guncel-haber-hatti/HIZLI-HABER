<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABER TÜRKİYE | Güncel Haberler</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #cc0000; --black: #111; --border: #eee; --bg: #fcfcfc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; }

        /* Üst Bant */
        .top-info { background: #fff; border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 11px; font-weight: 700; color: #555; }
        .top-inner { max-width: 1100px; margin: auto; display: flex; justify-content: space-between; padding: 0 20px; }

        header { background: #fff; padding: 20px 0; border-bottom: 4px solid var(--red); text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 45px; color: var(--black); text-decoration: none; font-weight: 900; letter-spacing: -2px; }

        nav { background: var(--black); color: #fff; position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1100px; margin: auto; display: flex; gap: 20px; padding: 12px 20px; font-size: 12px; font-weight: 800; text-transform: uppercase; }

        .container { max-width: 1100px; margin: 30px auto; display: grid; grid-template-columns: 1fr 300px; gap: 30px; padding: 0 20px; }

        /* Haber Kartları */
        .hero-box { grid-column: 1 / -1; position: relative; height: 380px; background: #000; border-radius: 4px; overflow: hidden; cursor: pointer; margin-bottom: 20px; }
        .hero-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .hero-text { position: absolute; bottom: 0; left: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #fff; width: 100%; }
        
        .news-card { background: #fff; border: 1px solid var(--border); display: grid; grid-template-columns: 180px 1fr; gap: 20px; padding: 15px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .news-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 4px; }
        .news-info b { color: var(--red); font-size: 11px; text-transform: uppercase; }
        .news-info h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-top: 5px; }

        /* Okuma Ekranı */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; padding: 40px 20px; }
        .reader-inner { max-width: 700px; margin: auto; }
        .close-btn { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; margin-bottom: 20px; }
        .article-body { font-size: 18px; line-height: 1.7; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } .news-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="top-info">
    <div class="top-inner">
        <div>BIST 100: 9.450 | DOLAR: 32.44</div>
        <div>9 NİSAN 2026</div>
    </div>
</div>

<header><a href="#" class="logo">HABER TÜRKİYE</a></header>

<nav><div class="nav-inner"><span>Gündem</span><span>Ekonomi</span><span>Teknoloji</span><span>Spor</span></div></nav>

<div class="container">
    <div class="hero-box" onclick="openNav(101)">
        <img src="https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=1000">
        <div class="hero-text"><h2>Meclis'te Kritik Vergi Paketi Mesaisi Tamamlandı</h2></div>
    </div>

    <main id="main-content">
        </main>

    <aside>
        <div style="background:#fff; padding:20px; border:1px solid #eee;">
            <h3>ÖNE ÇIKANLAR</h3>
            <p style="font-size:13px; margin-top:10px;">• Dijital Lira Testleri Başladı</p>
            <p style="font-size:13px; margin-top:10px;">• Yeni Teşvik Paketi Yolda</p>
        </div>
    </aside>
</div>

<div id="reader">
    <div class="reader-inner">
        <button class="close-btn" onclick="closeNav()">← GERİ DÖN</button>
        <h1 id="title" style="font-family:'Playfair Display'; font-size:35px; margin-bottom:15px;"></h1>
        <div id="meta" style="color:#888; margin-bottom:20px; font-weight:bold;"></div>
        <div id="body" class="article-body"></div>
    </div>
</div>

<script>
    const data = {
        101: { title: "Meclis'te Vergi Mesaisi", meta: "9 NİSAN 2026 | SİYASET", body: "Yeni düzenleme yasalaştı." },
        102: { title: "İstanbul'un Altında Sarnıç", meta: "9 NİSAN 2026 | YAŞAM", body: "Tarihi keşif heyecan yarattı." },
        103: { title: "Dijital Lira Dönemi", meta: "9 NİSAN 2026 | EKONOMİ", body: "Merkez Bankası yeni aşamaya geçti." },
        104: { title: "Yapay Zeka Keşfi", meta: "9 NİSAN 2026 | BİLİM", body: "Antarktika'da yeni göller bulundu." },
        105: { title: "Elektrikli Araç Rekoru", meta: "9 NİSAN 2026 | OTOMOTİV", body: "Satışlar geçen yıla göre %200 arttı." }
    };

    const newsList = [
        { id: 102, img: "https://images.unsplash.com/photo-1569429593410-b498b3fb3387?w=400", cat: "TARİH" },
        { id: 103, img: "https://images.unsplash.com/photo-1621761191319-c6fb62004040?w=400", cat: "EKONOMİ" },
        { id: 104, img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400", cat: "BİLİM" },
        { id: 105, img: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=400", cat: "TEKNOLOJİ" }
    ];

    function loadNews() {
        const main = document.getElementById('main-content');
        newsList.forEach(item => {
            const h = data[item.id];
            main.innerHTML += `
                <div class="news-card" onclick="openNav(${item.id})">
                    <img src="${item.img}">
                    <div class="news-info"><b>${item.cat}</b><h3>${h.title}</h3></div>
                </div>`;
        });
    }

    function openNav(id) {
        const h = data[id];
        document.getElementById('title').innerText = h.title;
        document.getElementById('meta').innerText = h.meta;
        document.getElementById('body').innerText = h.body;
        document.getElementById('reader').style.display = 'block';
    }

    function closeNav() {
        document.getElementById('reader').style.display = 'none';
    }

    window.onload = loadNews;
</script>

</body>
</html>
