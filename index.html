<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>GÜNCEL HABER | Türkiye'nin Haber Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main-red: #cc0000; --dark: #111; --text: #222; --border: #ddd; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #fff; color: var(--text); overflow-x: hidden; }

        header { background: #fff; border-bottom: 5px solid var(--main-red); padding: 10px 0; }
        .logo { text-align: center; font-family: 'Oswald', sans-serif; font-size: 45px; font-weight: 700; text-transform: uppercase; letter-spacing: -2px; cursor: pointer; color: var(--dark); }
        .logo span { color: var(--main-red); }

        nav { background: var(--dark); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-inner { max-width: 1200px; margin: auto; display: flex; justify-content: center; }
        nav a { color: #fff; text-decoration: none; padding: 12px 18px; font-size: 13px; font-weight: 700; text-transform: uppercase; transition: 0.2s; cursor: pointer; }
        nav a:hover { background: var(--main-red); }

        .container { max-width: 1200px; margin: 5px auto; display: grid; grid-template-columns: 850px 1fr; gap: 10px; padding: 0 5px; }

        .headline { position: relative; height: 520px; background: #000; overflow: hidden; cursor: pointer; }
        .headline img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.9; }
        .headline:hover img { transform: scale(1.02); opacity: 1; }
        .headline-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px 25px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: #fff; }
        .tag { background: var(--main-red); color: #fff; padding: 4px 10px; font-size: 12px; font-weight: 900; display: inline-block; margin-bottom: 10px; }
        .headline-info h1 { margin: 0; font-size: 40px; line-height: 1.1; font-weight: 900; letter-spacing: -1px; }

        .side-news { display: flex; flex-direction: column; gap: 5px; }
        .side-card { display: flex; background: #f9f9f9; height: 95px; border: 1px solid var(--border); cursor: pointer; }
        .side-card img { width: 130px; height: 100%; object-fit: cover; }
        .side-card-body { padding: 8px 12px; display: flex; align-items: center; }
        .side-card-body h3 { margin: 0; font-size: 15px; font-weight: 700; line-height: 1.2; }

        .article-wrap { display: none; max-width: 900px; margin: 20px auto; padding: 0 20px; animation: fadeIn 0.4s ease; }
        .btn-back { display: inline-block; margin-bottom: 15px; color: var(--main-red); font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .article-title { font-size: 45px; font-weight: 900; line-height: 1.1; margin-bottom: 20px; color: var(--dark); }
        .article-meta { border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px 0; margin-bottom: 20px; font-size: 13px; color: #666; font-weight: bold; }
        .article-img { width: 100%; margin-bottom: 25px; border-bottom: 6px solid var(--main-red); }
        .article-content { font-size: 20px; line-height: 1.7; color: #333; text-align: justify; }
        .article-content b { color: #000; }
        .article-content h3 { font-size: 26px; border-left: 8px solid var(--main-red); padding-left: 15px; margin: 30px 0 15px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        footer { background: var(--dark); color: #555; text-align: center; padding: 30px; margin-top: 50px; border-top: 5px solid var(--main-red); font-weight: bold; }

        @media (max-width: 1000px) {
            .container { grid-template-columns: 1fr; }
            .headline { height: 350px; }
            .article-title { font-size: 32px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="goHome()">GÜNCEL<span>HABER</span></div>
</header>

<nav>
    <div class="nav-inner">
        <a onclick="goHome()">GÜNDEM</a>
        <a onclick="goHome()">ASAYİŞ</a>
        <a onclick="goHome()">EKONOMİ</a>
        <a onclick="goHome()">SPOR</a>
    </div>
</nav>

<div class="container">
    <div id="homePage" style="display: contents;">
        <div class="headline" id="mainSlot" onclick="openNews(0)"></div>
        <div class="side-news" id="sideSlot"></div>
    </div>
    <div id="articleView" class="article-wrap"></div>
</div>

<footer>
    © 2026 GÜNCEL HABER | TÜRKİYE'NİN HABER MERKEZİ
</footer>

<script>
    const newsDB = [
        {
            title: "Kapaklı’da Kanlı Hesaplaşma: 1 Ölü, 2 Ağır Yaralı!",
            img: "https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg",
            tag: "SON DAKİKA",
            content: `<b>TEKİRDAĞ / KAPAKLI</b> – Kapaklı ilçesinde gece saatlerinde meydana gelen silahlı saldırı, bölgede büyük paniğe yol açtı. Edinilen bilgilere göre, aralarında önceden husumet bulunan şahıslar sokak ortasında karşı karşıya geldi. Taraflar arasında başlayan sözlü tartışmanın kısa sürede kavgaya dönüşmesi üzerine, yanındaki silahı ateşleyen saldırgan dehşet saçtı. Olayda <b>1 kişi hayatını kaybederken</b>, biri yoldan geçen masum bir sivil olmak üzere 2 kişi ağır yaralandı.<br><br>
                <h3>HESAPLAŞMANIN NEDENİ: ALACAK-VERECEK MESELESİ!</h3>
                Emniyet birimlerinden alınan ilk bilgilere göre, kanlı hesaplaşmanın temelinde taraflar arasındaki bir borç anlaşmazlığı yatıyor. İddiaya göre, borcun tahsil edilememesi üzerine çıkan tartışmada gözü dönen saldırgan, hedefindeki 2 kişiye kurşun yağdırdı. Sokak ortasında gerçekleşen bu pervasız saldırı, çevredeki vatandaşlara dehşet dolu anlar yaşattı.<br><br>
                <h3>SOSYAL MEDYADAN UYARMIŞ: "HESAP VAKTİ!"</h3>
                Olayın ardından şüphelinin geçmişine yönelik inceleme başlatan ekipler, çarpıcı detaylara ulaştı. Firari zanlı <b>E.S.</b>'nin, saldırıdan kısa bir süre önce sosyal medya hesapları üzerinden <b>silahlı paylaşımlar</b> yaptığı ve hasımlarına yönelik tehdit içerikli mesajlar yayınladığı iddia edildi. Birçok kez silahlı görseller paylaşarak adeta saldırının sinyalini veren zanlının, paylaşımlarında "hesap vaktinin geldiği" yönünde ifadeler kullandığı öne sürüldü.<br><br>
                <h3>1 KİŞİ OLAY YERİNDE CAN VERDİ</h3>
                Silahların peş peşe ateşlendiği saldırıda, vücuduna çok sayıda mermi isabet eden bir şahıs kanlar içinde yere yığıldı. Olay yerine sevk edilen sağlık ekiplerinin yaptığı kontrollerde, şahsın hayatını kaybettiği belirlendi. Polis ekipleri çevrede geniş güvenlik önlemleri alırken, cenaze otopsi için adli tıp kurumuna kaldırıldı.<br><br>
                <h3>MASUM SİVİL YAŞAM MÜCADELESİ VERİYOR</h3>
                Saldırının en acı bilançosu ise olayla hiçbir ilgisi olmayan masum bir vatandaşın zarar görmesi oldu. O sırada caddeden geçmekte olan sivil bir vatandaş, seken kurşunların hedefi olarak ağır yaralandı. Hastaneye kaldırılan yaralı sivilin durumunun kritik olduğu ve yoğun bakımda yaşam savaşı verdiği öğrenildi.<br><br>
                <h3>FİRARİ ZANLI E.S. HER YERDE ARANIYOR!</h3>
                Emniyet birimleri, 2 kişiye silahlı saldırı düzenleyip kayıplara karışan şüpheliyi yakalamak için geniş çaplı bir çalışma başlattı. Yapılan kimlik tespit çalışmaları sonucunda, tetiği çeken asıl ismin <b>E.S.</b> olduğu kesinleşti. <br><br>
                Henüz 25 yaşında olmasına rağmen suç dosyasında tam <b>24 ayrı kayıt</b> bulunan <b>E.S.</b>’nin; birçok kez <b>silahla yaralama</b>, <b>ruhsatsız silah bulundurma</b> ve yağma gibi suçlardan sabıkalı olduğu ortaya çıktı. Polis, alacak meselesi yüzünden sokağı kan gölüne çeviren firari zanlıyı yakalamak için operasyonlarını sürdürüyor.`
        },
        {
            title: "Merkez Bankası Faizi Sabit Tuttu: Piyasalar Hareketli!",
            img: "https://picsum.photos/400/300?money",
            tag: "EKONOMİ",
            content: "Faiz kararı sonrası döviz piyasalarında denge arayışı sürüyor. Uzmanlar önümüzdeki aylarda volatilite beklentisinin azaldığını belirtiyor."
        },
        {
            title: "Milli Takımda Kadro Revizyonu: Yeni Yıldızlar Kampta!",
            img: "https://picsum.photos/400/300?football",
            tag: "SPOR",
            content: "Euro 2026 hazırlıklarını sürdüren Ay-Yıldızlı ekipte teknik direktör kadroda revizyon sinyali verdi. Genç yetenekler takımla birlikte ilk antrenmanına çıktı."
        }
    ];

    function render() {
        const main = newsDB[0];
        document.getElementById('mainSlot').innerHTML = `
            <img src="${main.img}">
            <div class="headline-info">
                <div class="tag">${main.tag}</div>
                <h1>${main.title}</h1>
            </div>
        `;

        let html = "";
        newsDB.slice(1).forEach((item, index) => {
            html += `
                <div class="side-card" onclick="openNews(${index + 1})">
                    <img src="${item.img}">
                    <div class="side-card-body"><h3>${item.title}</h3></div>
                </div>
            `;
        });
        document.getElementById('sideSlot').innerHTML = html;
    }

    function openNews(idx) {
        const item = newsDB[idx];
        document.getElementById('homePage').style.display = "none";
        const view = document.getElementById('articleView');
        view.style.display = "block";
        view.innerHTML = `
            <div class="btn-back" onclick="goHome()">← ANA SAYFAYA DÖN</div>
            <h1 class="article-title">${item.title}</h1>
            <div class="article-meta">Yayınlanma: 06 Nisan 2026 | Saat: 13:39</div>
            <img class="article-img" src="${item.img}">
            <div class="article-content">${item.content}</div>
        `;
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('articleView').style.display = "none";
        document.getElementById('homePage').style.display = "contents";
    }

    render();
</script>

</body>
</html>
