<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANŞET TÜRKİYE | Son Dakika Haberler</title>
    <style>
        :root { --red: #ed1c24; --black: #1a1a1a; --gray: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body { background: #e3e4e6; color: #222; }

        /* ÜST BAR VE LOGO */
        header { background: #fff; border-bottom: 5px solid var(--red); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-container { max-width: 1300px; margin: auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 38px; font-weight: 900; color: var(--red); text-decoration: none; letter-spacing: -2px; }
        
        nav { background: var(--black); color: white; overflow-x: auto; white-space: nowrap; }
        .nav-inner { max-width: 1300px; margin: auto; padding: 12px 20px; display: flex; gap: 25px; font-size: 14px; font-weight: 700; }
        .nav-inner span { cursor: pointer; text-transform: uppercase; opacity: 0.8; }
        .nav-inner span:hover { opacity: 1; color: var(--red); }

        .wrapper { max-width: 1300px; margin: 25px auto; padding: 0 15px; }

        /* ANA MANŞET DÜZENİ (ENGİN SAVCU) */
        .hero-section { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .main-headline { position: relative; border-radius: 12px; overflow: hidden; height: 500px; cursor: pointer; border: 1px solid #ccc; }
        .main-headline img { width: 100%; height: 100%; object-fit: cover; }
        .main-headline-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 50px 30px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: white; }
        .main-headline-overlay h1 { font-size: 42px; line-height: 1.1; font-weight: 800; margin-top: 10px; }
        .badge { background: var(--red); padding: 5px 12px; font-weight: 900; font-size: 12px; border-radius: 3px; display: inline-block; }

        /* YAN MANŞETLER */
        .side-headlines { display: grid; grid-template-rows: 1fr 1fr; gap: 20px; }
        .side-card { position: relative; border-radius: 8px; overflow: hidden; cursor: pointer; border: 1px solid #ccc; }
        .side-card img { width: 100%; height: 100%; object-fit: cover; }
        .side-overlay { position: absolute; bottom: 0; padding: 20px; background: rgba(0,0,0,0.7); color: white; width: 100%; }
        .side-overlay h3 { font-size: 18px; line-height: 1.3; }

        /* HABER IZGARASI (ÜNLÜLER VE DİĞERLERİ) */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .article-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; }
        .article-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }
        .article-card img { width: 100%; height: 200px; object-fit: cover; }
        .article-body { padding: 20px; }
        .article-body .cat { font-size: 11px; font-weight: 900; color: var(--red); text-transform: uppercase; }
        .article-body h2 { font-size: 19px; margin: 10px 0; line-height: 1.4; color: #111; font-weight: 700; }
        .article-body p { font-size: 14px; color: #666; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* HABER DETAY GÖRÜNÜMÜ */
        #news-detail { display: none; background: white; border-radius: 15px; padding: 40px; margin-top: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .detail-img { width: 100%; height: 500px; object-fit: cover; border-radius: 10px; margin: 25px 0; }
        .detail-content { font-size: 20px; line-height: 1.9; color: #333; max-width: 900px; margin: auto; }
        .btn-back { background: var(--black); color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }

        /* MOBİL UYUMLULUK */
        @media (max-width: 900px) {
            .hero-section { grid-template-columns: 1fr; }
            .main-headline { height: 350px; }
            .main-headline-overlay h1 { font-size: 28px; }
            .detail-img { height: 250px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <a href="#" class="logo" onclick="goHome()">MANŞET TÜRKİYE</a>
        <div style="text-align: right; font-weight: 800; font-size: 13px;">8 NİSAN 2026<br><span style="color:var(--red)">CANLI YAYIN</span></div>
    </div>
    <nav>
        <div class="nav-inner">
            <span onclick="goHome()">ANA SAYFA</span><span>SİYASET</span><span>EKONOMİ</span><span>MAGAZİN</span><span>SPOR</span><span>DÜNYA</span>
        </div>
    </nav>
</header>

<div class="wrapper">
    <main id="main-view">
        <section class="hero-section">
            <div class="main-headline" onclick="openNews(0)">
                <img src="https://images.unsplash.com/photo-1514525253361-b83f859b71c0?auto=format&fit=crop&w=1200&q=80" alt="Engin Savcu">
                <div class="main-headline-overlay">
                    <span class="badge">ÖZEL DOSYA</span>
                    <h1>Müzik Mutfağında Bir Devir Kapandı: Engin Savcu Dijital Kayıtlardan Çekildi</h1>
                </div>
            </div>
            <div class="side-headlines">
                <div class="side-card" onclick="openNews(1)">
                    <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=600" alt="Spor">
                    <div class="side-overlay"><h3>Derbi Öncesi Kadıköy'de Olağanüstü Hal!</h3></div>
                </div>
                <div class="side-card" onclick="openNews(2)">
                    <img src="https://images.unsplash.com/photo-1611974764058-94d306b3f71c?auto=format&fit=crop&w=600" alt="Ekonomi">
                    <div class="side-overlay"><h3>Altın Gramı 7000 TL Barajını Zorluyor!</h3></div>
                </div>
            </div>
        </section>

        <div class="news-grid" id="news-container">
            </div>
    </main>

    <section id="news-detail">
        <button class="btn-back" onclick="goHome()">← ANA SAYFAYA DÖN</button>
        <div id="detail-body"></div>
    </section>
</div>

<script>
    // TÜRKİYE'NİN EN İYİ HABER VERİ TABANI (ÜNLÜLER VE GÜNCEL)
    const database = [
        {
            title: "Müzik Mutfağında Bir Devir Kapandı: Engin Savcu Dijital Kayıtlardan Çekildi",
            cat: "ÖZEL HABER",
            img: "https://images.unsplash.com/photo-1514525253361-b83f859b71c0?auto=format&fit=crop&w=1200",
            desc: "Sony Music ile 15 yaşında başladığı kariyerini şok bir kararla noktalayan Engin Savcu, mahkeme yoluyla tüm dijital geçmişini sildirdi. Zeynep Bastık, Hande Ünsal ve Sakiler gibi isimlerin teknik mutfağındaki o isim artık yok.",
            content: "Türkiye müzik piyasası bugün şok bir kararla sarsıldı. Yıllardır mutfakta hit şarkıların mimarı olan <b>Engin Savcu</b>, profesyonel kariyerine son verdi. <b>Derya Bedavacı</b> ve <b>Kadir Sepetçi</b> ile yürütülen stüdyo kayıtlarından, <b>Zeynep Bastık</b>'ın altyapılarına kadar her yerde imzası bulunan usta isim, 'Sevmeyi Denemedim' parçasının ardından sessizliğe gömüldü."
        },
        {
            title: "Zeynep Bastık'tan Stüdyo Çıkışı Şok Açıklama: 'Emeğimiz Siliniyor!'",
            cat: "MAGAZİN",
            img: "https://images.unsplash.com/photo-1516575334481-f85287c2c82d?auto=format&fit=crop&w=800",
            desc: "Ünlü şarkıcı Zeynep Bastık, Engin Savcu'nun piyasadan çekilmesi ve kayıtların silinmesi üzerine ilk kez konuştu.",
            content: "Bastık, stüdyo çıkışı basın mensuplarına yaptığı açıklamada; 'Müzik mutfağındaki her bir nota çok değerlidir. Engin gibi bir ismin bu kararı bizi derinden sarstı' dedi."
        },
        {
            title: "Melek Mosso Gözaltına Alındı! Konser Öncesi Şok Baskın",
            cat: "MAGAZİN",
            img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=800",
            desc: "Ünlü sanatçı Melek Mosso'nun sabah saatlerinde İstanbul'daki evine düzenlenen operasyonla ifadesine başvuruldu.",
            content: "Gelen son dakika bilgilerine göre operasyonun kapsamı genişletiliyor. Avukatı süreci yakından takip ettiklerini açıkladı."
        },
        {
            title: "Derya Bedavacı'dan Engin Savcu'ya Veda Mesajı",
            cat: "MAGAZİN",
            img: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?auto=format&fit=crop&w=800",
            desc: "Arabesk dünyasının sevilen sesi Derya Bedavacı, kayıt süreçlerini beraber yürüttüğü Savcu için duygusal bir paylaşım yaptı.",
            content: "Bedavacı: 'Stüdyoda sabahladığımız o geceler, Kadir Sepetçi ile attığımız o teknik temeller... Hepsi kalbimizde kalacak.' dedi."
        },
        {
            title: "Süper Lig'de VAR Kayıtları Açıklandı: Hakem Kararları İptal mi?",
            cat: "SPOR",
            img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=800",
            desc: "TFF, haftanın en çok tartışılan pozisyonlarının VAR kayıtlarını kamuoyuyla paylaştı.",
            content: "Kayıtlarda hakemlerin ofsayt ve penaltı kararlarındaki diyalogları büyük yankı uyandırdı."
        },
        {
            title: "Elon Musk İstanbul'da: Teknofest Ziyareti İçin Geldi",
            cat: "TEKNOLOJİ",
            img: "https://images.unsplash.com/photo-1517048676732-d65bc937f952?auto=format&fit=crop&w=800",
            desc: "Dünyaca ünlü iş insanı özel jetiyle İstanbul Havalimanı'na iniş yaptı.",
            content: "Musk'ın yerli projeler ve Bayraktar TB3 ile yakından ilgilendiği bildirildi."
        }
    ];

    // 40 HABERE TAMAMLA (OTOMATİK ÜRETİM)
    for(let i=6; i<40; i++) {
        database.push({
            title: `Türkiye Gündemi Haber ${i}: Beklenen Karar Açıklandı!`,
            cat: i % 2 == 0 ? "EKONOMİ" : "SİYASET",
            img: `https://picsum.photos/seed/${i+100}/800/500`,
            desc: "Ankara kulislerinde konuşulan son dakika gelişmeleri ve halkın merakla beklediği o kararın detayları...",
            content: "Haberin detayları ve analizi için Türkiye'nin en iyi haber portalını takip etmeye devam edin. Tüm gelişmeler anlık olarak burada."
        });
    }

    // ANA SAYFAYI ÇİZEBİLMEK İÇİN
    function renderHome() {
        const container = document.getElementById('news-container');
        container.innerHTML = "";
        database.slice(3).forEach((news, index) => {
            container.innerHTML += `
                <article class="article-card" onclick="openNews(${index + 3})">
                    <img src="${news.img}" alt="Haber">
                    <div class="article-body">
                        <span class="cat">${news.cat}</span>
                        <h2>${news.title}</h2>
                        <p>${news.desc}</p>
                    </div>
                </article>
            `;
        });
    }

    // HABERİ AÇMA FONKSİYONU
    function openNews(id) {
        const news = database[id];
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('news-detail').style.display = 'block';
        window.scrollTo(0, 0);

        document.getElementById('detail-body').innerHTML = `
            <span class="badge">${news.cat}</span>
            <h1 style="font-size:48px; font-weight:900; margin-top:15px;">${news.title}</h1>
            <p style="color:#666; margin:10px 0;">Yayınlanma: 08.04.2026 - 22:45 | Manşet Türkiye Haber Merkezi</p>
            <img src="${news.img}" class="detail-img">
            <div class="detail-content">
                <p>${news.content}</p>
                <p style="margin-top:20px;"><b>Editör Notu:</b> Türkiye'nin en iyi haber sitesi olarak tüm gelişmeleri anbean takip ediyoruz.</p>
            </div>
        `;
    }

    function goHome() {
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('news-detail').style.display = 'none';
    }

    renderHome();
</script>

</body>
</html>
