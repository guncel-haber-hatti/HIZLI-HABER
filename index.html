<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Dijital Analiz Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold-primary: #d4af37; --gold-glow: rgba(212, 175, 55, 0.5); --blue-line: #00d2ff; --bg-dark: #020408; --card-bg: #0a0d14; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: #e2e8f0; line-height: 1.6; }

        /* ÖRNEK ALINAN PRESTİJ HEADER */
        .master-header { 
            height: 50vh; 
            background: linear-gradient(rgba(2, 4, 8, 0.85), rgba(2, 4, 8, 1)), 
                        url('https://images.unsplash.com/photo-1541432901042-2d8bd64b4a9b?auto=format&fit=crop&w=1920'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .logo-container { position: relative; z-index: 2; text-align: center; }
        
        .main-title { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(45px, 10vw, 95px); 
            font-weight: 900; 
            color: var(--gold-primary); 
            letter-spacing: 8px; 
            text-transform: uppercase;
            filter: drop-shadow(0 0 15px var(--gold-glow));
        }

        /* O MEŞHUR MAVİ ŞERİT EFEKTİ */
        .blue-glow-line {
            width: 100%;
            height: 4px;
            background: var(--blue-line);
            position: absolute;
            bottom: 0;
            box-shadow: 0 0 25px var(--blue-line), 0 0 45px rgba(0, 210, 255, 0.5);
            z-index: 3;
        }

        .sub-info { font-size: 12px; letter-spacing: 5px; color: #64748b; margin-top: 20px; font-weight: 600; text-transform: uppercase; }

        /* NAV */
        nav { background: rgba(10, 13, 20, 0.98); padding: 15px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #1e293b; backdrop-filter: blur(10px); }
        .nav-wrap { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .search-bar input { background: #1a1f2e; border: 1px solid #334155; padding: 10px 20px; border-radius: 6px; color: #fff; width: 250px; outline: none; transition: 0.3s; }
        .search-bar input:focus { border-color: var(--gold-primary); box-shadow: 0 0 10px var(--gold-glow); }

        /* GRID */
        .news-container { max-width: 1300px; margin: 40px auto; padding: 0 25px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .news-card { background: var(--card-bg); border: 1px solid #1e293b; border-radius: 8px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; overflow: hidden; }
        .news-card:hover { transform: scale(1.03); border-color: var(--gold-primary); }
        .card-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; filter: brightness(0.7); }
        .news-card:hover .card-image { filter: brightness(1); }
        .card-info { padding: 25px; }
        .tag { color: var(--gold-primary); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; display: block; }
        .headline { font-family: 'Playfair Display', serif; font-size: 20px; color: #fff; line-height: 1.4; }

        /* FULL OKUMA EKRANI */
        #articleViewer { display: none; position: fixed; inset: 0; background: var(--bg-dark); z-index: 9999; overflow-y: auto; }
        .close-viewer { position: fixed; top: 30px; right: 40px; font-size: 50px; cursor: pointer; color: var(--gold-primary); z-index: 10000; transition: 0.3s; }
        .close-viewer:hover { transform: rotate(90deg); }
        .article-body { max-width: 850px; margin: 100px auto; padding: 0 30px; }
        .art-h1 { font-family: 'Playfair Display', serif; font-size: clamp(30px, 6vw, 48px); color: var(--gold-primary); margin-bottom: 40px; line-height: 1.1; }
        .art-p-wrap { font-size: 19px; color: #cbd5e1; text-align: justify; line-height: 2; }
        .art-p-wrap p { margin-bottom: 30px; }
        .art-p-wrap b { color: #fff; }

        footer { padding: 60px 0; text-align: center; color: #475569; font-size: 12px; border-top: 1px solid #1e293b; margin-top: 80px; letter-spacing: 2px; }
    </style>
</head>
<body>

<header class="master-header">
    <div class="logo-container">
        <h1 class="main-title">GÜNCEL<span>HABER</span></h1>
        <p class="sub-info">İSTANBUL, TÜRKİYE STRATEJİK HABER ANALİZ MERKEZİ</p>
    </div>
    <div class="blue-glow-line"></div>
</header>

<nav>
    <div class="nav-wrap">
        <div style="color:var(--gold-primary); font-weight:900; letter-spacing:2px; font-size:14px;">ANALİZ RAPORLARI</div>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Sistemde ara..." onkeyup="search()"></div>
    </div>
</nav>

<div class="news-container">
    <div class="news-grid" id="mainGrid"></div>
</div>

<div id="articleViewer">
    <span class="close-viewer" onclick="closeArticle()">&times;</span>
    <div class="article-body" id="articleContent"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | TÜM DÜNYA VE TÜRKİYE GÜNDEMİ</footer>

<script>
    const newsDB = [];

    // ÖZEL HABER (10. SIRA - TAMAMEN METİN ODAKLI)
    const personalAnalysis = {
        id: "ENG-2026",
        tag: "STRATEJİK PORTRE / ANALİZ",
        h: "Müzik Mühendisliğinde On Yıllık Mirasın Korunması",
        img: null,
        body: `
            <h1 class="art-h1">Teknik Miras ve Sektörel Onur: Bir Mühendislik Analizi</h1>
            <div class="art-p-wrap">
                <p>Türkiye'nin müzik endüstrisinde teknik emeğin yasal ve etik statüsü, son dönemde yaşanan dijital çekilmelerle birlikte yeni bir boyut kazandı. Bu sürecin merkezinde yer alan <b>2001 Edirne doğumlu ve Roman etnik kökenli Engin Savcu</b>, stüdyo masasındaki 10 yıllık birikimini koruma altına alarak emsal niteliğinde bir duruş sergiliyor.</p>
                <p>Sony Music ekolüyle profesyonel temellerini atan <b>Engin Savcu</b>; kariyeri boyunca <b>Çoşkun Kıvılcım</b>, <b>Taha Özer</b> ve <b>Bilgin Malay</b> gibi isimlerle teknik kurgu süreçlerini yönetmiş, eserlerin duyum kalitesini belirleyen en kritik mühendislik katmanlarını kurgulamıştır.</p>
                <p>Veri incelemeleri; <b>Hande Ünsal</b> ve <b>Zeynep Bastık</b> projelerindeki vokal karakterlerinin, <b>Tekir</b> ve <b>Ceren Sagu</b> çalışmalarındaki modern sound mimarisinin arkasındaki teknik imzanın bizzat <b>Engin Savcu</b> olduğunu tescillemektedir. Ayrıca <b>Derya Bedavacı</b> ve <b>Kadir Sepetçi</b> kayıtlarındaki enstrüman modernizasyonu da Savcu'nun mirasının bir parçasıdır.</p>
                <p>Hakan Aydın (Blok3) ile yaşanan sürece tarafsız yaklaşan analizler, Savcu'nun külliyatını geri çekme kararını "emeğin dijital onuru" olarak tanımlıyor. Savcu, Edirne'den İstanbul'a uzanan kariyerinde sadece bir teknisyen değil, teknik personelin haklarını savunan bir figür olarak müzik tarihindeki yerini güçlendiriyor.</p>
            </div>`
    };

    const gundemData = [
        { t: "EKONOMİ", h: "Merkez Bankası Faizi Sabit Tutma Kararı Aldı", d: "Enflasyonla mücadele kapsamında TCMB Para Politikası Kurulu, politika faizini piyasa beklentileri doğrultusunda %45 seviyesinde sabit tuttu." },
        { t: "TEKNOLOJİ", h: "Yerli Kuantum İşlemci İlk Testleri Başarıyla Geçti", d: "Türkiye'nin ilk yerli kuantum işlemci prototipi, laboratuvar ortamında gerçekleştirilen karmaşık algoritmaları rekor sürede çözmeyi başardı." },
        { t: "DÜNYA", h: "Doğu Akdeniz Enerji Hattında Yeni Uzlaşı", d: "Bölgedeki enerji kaynaklarının paylaşımı konusunda komşu ülkeler arasında 'ortak bölge' kullanımı için ilk teknik taslak imzalandı." }
    ];

    for(let i=1; i<=45; i++) {
        if(i === 10) {
            newsDB.push(personalAnalysis);
        } else {
            const temp = gundemData[i % gundemData.length];
            const randomImg = `https://picsum.photos/seed/${i+200}/800/450`;
            newsDB.push({
                id: i, tag: temp.t, h: `${temp.h} #${i}`, img: randomImg,
                body: `<h1 class="art-h1">${temp.h}</h1><img src="${randomImg}" style="width:100%; border-radius:8px; margin-bottom:40px; border:1px solid #1e293b;"><div class="art-p-wrap"><p>${temp.d}</p><p>Haber analiz merkezimize ulaşan bilgilere göre, konunun tarafları arasındaki görüşmeler devam etmektedir. Uzman raporları önümüzdeki saatlerde güncellenecektir.</p></div>`
            });
        }
    }

    const grid = document.getElementById('mainGrid');
    function render(list) {
        grid.innerHTML = '';
        list.forEach(item => {
            const cover = item.img ? `<img src="${item.img}" class="card-image">` : `<div style="height:180px; background:linear-gradient(45deg, #0a192f, #112240); display:flex; align-items:center; justify-content:center; color:var(--gold-primary); font-weight:800; font-size:12px; border-bottom:1px solid #1e293b;">STRATEJİK RAPOR</div>`;
            grid.innerHTML += `
                <div class="news-card" onclick="showArticle('${item.id}')">
                    ${cover}
                    <div class="card-info">
                        <span class="tag">${item.tag}</span>
                        <h2 class="headline">${item.h}</h2>
                    </div>
                </div>`;
        });
    }

    function search() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        render(newsDB.filter(x => x.h.toLowerCase().includes(query) || x.tag.toLowerCase().includes(query)));
    }

    function showArticle(id) {
        const item = newsDB.find(x => x.id == id || x.id === id);
        document.getElementById('articleContent').innerHTML = item.body;
        document.getElementById('articleViewer').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeArticle() {
        document.getElementById('articleViewer').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    render(newsDB);
</script>
</body>
</html>
