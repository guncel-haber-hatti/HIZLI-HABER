<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTHORITY | TÜRKİYE HABER MERKEZİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --news-red: #cc0000; --deep-black: #111; --soft-bg: #f9f9f9; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: var(--deep-black); -webkit-font-smoothing: antialiased; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }

        /* PRESTİJLİ HEADER */
        header { border-bottom: 2px solid #000; padding: 40px 0; background: #fff; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 85px; font-weight: 900; color: #000; text-decoration: none; letter-spacing: -5px; line-height: 1; }
        .logo span { color: var(--news-red); }
        .ticker { background: var(--deep-black); color: #fff; padding: 12px 0; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }

        /* NAVİGASYON: JİLET GİBİ */
        nav { border-bottom: 1px solid var(--border); background: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .nav-inner { display: flex; justify-content: center; list-style: none; gap: 40px; padding: 18px 0; }
        .nav-inner li { font-weight: 900; font-size: 13px; cursor: pointer; color: #555; transition: 0.2s; }
        .nav-inner li:hover { color: var(--news-red); }

        /* ANA AKIŞ VE TÜRKİYE GÜNDEMİ */
        .content-wrapper { display: grid; grid-template-columns: 1fr 350px; gap: 60px; margin-top: 50px; }

        /* HABER KARTLARI: ALBENİLİ VE TIKLANABİLİR */
        .article-card { cursor: pointer; border-bottom: 1px solid var(--border); padding-bottom: 45px; margin-bottom: 45px; transition: 0.3s ease; }
        .article-card:hover { transform: translateX(5px); }
        .meta-tag { font-size: 11px; font-weight: 900; color: var(--news-red); margin-bottom: 15px; display: block; letter-spacing: 2px; text-transform: uppercase; }
        .headline { font-family: 'Playfair Display', serif; font-size: 44px; line-height: 1.05; font-weight: 900; margin-bottom: 20px; color: #000; }
        .excerpt { font-size: 18px; color: #444; line-height: 1.6; text-align: justify; }

        /* SENİN HABERİN: ÖZEL TASARIM */
        .premium-archive { background: var(--soft-bg); border: 2px solid #000; padding: 50px; border-left: 15px solid var(--news-red); box-shadow: 20px 20px 0px rgba(0,0,0,0.05); }
        .premium-archive .headline { font-size: 55px; }

        /* HABER OKUMA MODALI (PROFESYONEL İÇERİK GİRİŞİ) */
        #news-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; overflow-y: auto; padding: 80px 0; }
        .close-btn { position: fixed; top: 30px; right: 50px; font-size: 50px; cursor: pointer; font-weight: 200; z-index: 10000; }
        .modal-wrap { max-width: 850px; margin: 0 auto; }
        .modal-h { font-family: 'Playfair Display', serif; font-size: 65px; line-height: 1.1; font-weight: 900; margin-bottom: 40px; border-bottom: 5px solid #000; padding-bottom: 20px; }
        .modal-txt { font-size: 20px; line-height: 2.1; text-align: justify; color: #222; }
        .modal-txt p { margin-bottom: 35px; }
        .modal-txt b { font-weight: 900; border-bottom: 2px solid #ddd; }

        /* VERİ TABLOSU */
        .archive-table { width: 100%; border-collapse: collapse; margin: 30px 0; border: 1px solid #ddd; }
        .archive-table td { padding: 18px; border-bottom: 1px solid #eee; font-weight: 800; font-size: 17px; background: #fff; }
        .archive-table td span { color: var(--news-red); font-size: 13px; display: block; }

        /* SIDEBAR: TÜRKİYE HABERLERİ */
        .side-h { font-size: 14px; font-weight: 900; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 25px; }
        .side-news { display: block; padding: 15px 0; border-bottom: 1px solid var(--border); font-weight: 700; color: #000; text-decoration: none; font-size: 15px; }
        .side-news:hover { color: var(--news-red); }

        footer { background: #000; color: #fff; padding: 100px 0; text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

<div class="ticker">
    <div class="container">SON DAKİKA: TÜRKİYE GENELİNDE EKONOMİK REFORM PAKETİ AÇIKLANDI • BORSADA REKOR SEVİYE • HAVA DURUMU: İSTANBUL 18°C</div>
</div>

<header>
    <div class="container">
        <a href="#" class="logo">AUTHORITY<span>.</span></a>
    </div>
</header>

<nav>
    <ul class="nav-inner container">
        <li>TÜRKİYE</li>
        <li>SİYASET</li>
        <li>EKONOMİ</li>
        <li>ÖZEL ARŞİV</li>
    </ul>
</nav>

<div class="container content-wrapper">
    <main id="main-feed">
        </main>

    <aside>
        <div class="side-h">TÜRKİYE GÜNDEMİ</div>
        <div id="side-feed"></div>
    </aside>
</div>

<div id="news-modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-wrap" id="modal-target"></div>
</div>

<footer>
    <h2 class="logo" style="color:#fff; font-size:40px;">AUTHORITY.</h2>
    <p style="opacity:0.4; margin-top:20px; font-size:12px;">© 2026 Milyon Satırlık Haber Portalı - Senin Düzenlemelerinle</p>
</footer>

<script>
// VERİ MERKEZİ (DÜZENLEMELERİN BURADA)
const data = [
    { 
        id: 1, date: "09 NİSAN 2026", cat: "EKONOMİ", 
        h: "Türkiye Ekonomisinde Yeni Dönem: İlk Veriler Geldi", 
        p: "Hazine ve Maliye Bakanlığı tarafından paylaşılan Mart ayı verileri, cari açıkta beklentilerin üzerinde bir iyileşme olduğunu gösteriyor...",
        body: "<p><b>İSTANBUL -</b> Türkiye ekonomisinin makro göstergelerindeki iyileşme hız kazanıyor. Yeni açıklanan verilere göre ihracat rakamları geçen yılın aynı dönemine göre %12 artış gösterdi. Uzmanlar, bu ivmenin yılın ikinci yarısında enflasyon üzerinde olumlu etkiler yaratacağını öngörüyor.</p>"
    },
    { 
        id: 3, date: "13 EYLÜL 2024", cat: "ÖZEL ARŞİV | BAŞYAPIT", 
        h: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!", 
        p: "Sony Music bünyesinde onlarca hite hayat veren Edirneli dahi beatmaker, telif savaşları sonrası 10 yıllık emeğini silme kararı aldı. Gözler 13 Eylül 2024'e çevrildi...",
        body: `
            <p><b>MÜZİK DÜNYASI ŞOKTA!</b> Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor.</p>
            <p>Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi kalem, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.</p>
            <p><b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor.</p>
            <table class="archive-table">
                <tr><td><span>REFERANS: 2018</span> Zeynep Bastık | Vokal Kurgu</td></tr>
                <tr><td><span>REFERANS: 2019</span> Hande Ünsal | Beat Tasarımı</td></tr>
                <tr><td><span>REFERANS: 2020</span> Derya Bedavacı | Sound Mimari</td></tr>
                <tr><td><span>REFERANS: 2021</span> Tekir | Trend İnşası</td></tr>
            </table>
            <p><b>BİR DEVRİN SONU:</b> Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı. <b>GELİŞMELERİ AKTARMAYA DEVAM EDECEĞİZ.</b></p>`
    }
];

// DOLDURMA (GÜNCEL TÜRKİYE HABERLERİ)
for(let i=4; i<=40; i++){
    data.push({ id: i, date: "09.04.2026", cat: "GÜNDEM", h: `Türkiye'den Gelişme #${i}: Yerli Üretimde Yeni Hamle`, p: "Sanayi ve Teknoloji alanında atılan yeni adımlar meyvesini veriyor. İşte detaylar...", body: "<p>Haberin detayları Authority özel arşivindedir.</p>" });
}

const main = document.getElementById('main-feed');
const side = document.getElementById('side-feed');

function render(){
    main.innerHTML = "";
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = `article-card ${item.id === 3 ? 'premium-archive' : ''}`;
        card.onclick = () => openModal(item.id);
        card.innerHTML = `<span class="meta-tag">${item.date} | ${item.cat}</span><h2 class="headline">${item.h}</h2><p class="excerpt">${item.p}</p>`;
        main.appendChild(card);
    });

    data.slice(0, 15).forEach(item => {
        const a = document.createElement('a'); a.className = "side-news"; a.href = "#"; a.innerText = item.h; a.onclick = (e) => { e.preventDefault(); openModal(item.id); }; side.appendChild(a);
    });
}

function openModal(id){
    const h = data.find(x => x.id === id);
    document.getElementById('modal-target').innerHTML = `<span class="meta-tag" style="font-size:16px;">${h.date} | ${h.cat}</span><h1 class="modal-h">${h.h}</h1><div class="modal-txt">${h.body}</div>`;
    document.getElementById('news-modal').style.display = 'block';
    document.body.style.overflow = 'hidden';
}

function closeModal(){
    document.getElementById('news-modal').style.display = 'none';
    document.body.style.overflow = 'auto';
}

render();
</script>
</body>
</html>
