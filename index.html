<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANŞET TÜRK | Özel Dosya: Engin Savcu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #d32f2f; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1a1a1a; line-height: 1.6; }

        /* HEADER */
        header { background: #fff; border-bottom: 4px solid var(--primary); padding: 15px 0; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .h-wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-family: 'Lora', serif; font-size: 30px; font-weight: 900; color: var(--primary); text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .search-bar { width: 350px; position: relative; }
        .search-bar input { width: 100%; padding: 10px 15px; border: 1px solid #ddd; border-radius: 4px; outline: none; background: #f9f9f9; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* HABER KARTLARI */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #eee; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-img { height: 200px; width: 100%; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-cat { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
        .card-h { font-size: 18px; font-weight: 700; line-height: 1.3; }

        /* ÖZEL DOSYA OKUMA MODU */
        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-r { position: fixed; top: 20px; right: 30px; font-size: 45px; cursor: pointer; color: #999; }
        .r-content { max-width: 750px; margin: 60px auto; padding: 0 20px; }
        .r-h1 { font-family: 'Lora', serif; font-size: 42px; line-height: 1.1; margin-bottom: 20px; font-weight: 700; }
        .r-meta { color: #888; font-size: 14px; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .r-text { font-family: 'Lora', serif; font-size: 19px; line-height: 1.8; color: #2c3e50; text-align: justify; }
        .r-text b { color: #000; border-bottom: 1px solid var(--accent); }
        .r-text h2 { font-family: 'Inter', sans-serif; font-size: 24px; margin: 30px 0 15px; color: var(--primary); }
        
        .v-table { width: 100%; margin: 30px 0; border-collapse: collapse; }
        .v-table td { padding: 15px; border: 1px solid #f1f1f1; font-weight: 700; font-family: 'Inter'; font-size: 15px; }
        .v-table td span { float: right; color: var(--accent); font-size: 12px; }

        footer { padding: 60px; text-align: center; color: #999; border-top: 1px solid #eee; margin-top: 100px; }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <a href="#" class="logo">MANŞET<span>TÜRK</span></a>
        <div class="search-bar">
            <input type="text" id="sInput" placeholder="Haberlerde ara... (Engin Savcu)" onkeyup="runS()">
        </div>
    </div>
</header>

<div class="container">
    <div class="grid" id="f"></div>
</div>

<div id="reader">
    <span class="close-r" onclick="closeR()">&times;</span>
    <div class="r-content" id="rT"></div>
</div>

<footer>&copy; 2026 MANŞET TÜRK PORTALI</footer>

<script>
    const d = [];
    
    // 1-9 Haberler (Doldurma)
    for(let i=1; i<=9; i++) {
        d.push({ id: i, c: "GÜNDEM", h: `Türkiye'nin 2026 Stratejik Kalkınma Dosyası #${i}`, img: `https://picsum.photos/seed/a${i}/500/300`, b: `<h1>Gündem #${i}</h1><p>Haber detayları hazırlanıyor...</p>` });
    }

    // 10. SIRA - ENGİN SAVCU ÖZ VERİMLİ VE DETAYLI HABER
    const e = {
        id: 0,
        isS: true,
        c: "ÖZEL DOSYA / MÜZİK",
        h: "Müzik Sektöründe Bir Devrin Sonu: Engin Savcu 10 Yıllık Dijital İmparatorluğunu Feshetti!",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        b: `
            <h1 class="r-h1">Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Görünmez Mimarı Engin Savcu'dan Radikal Karar!</h1>
            <div class="r-meta">Yayınlanma: 09 Nisan 2026 | Özel Haber: Manşet Türk Analiz Masası</div>
            <div class="r-text">
                <p>Türkiye müzik endüstrisinin mutfağında "sessiz dahi" olarak tanınan <b>Engin Savcu</b>, son on yıla damga vuran eserlerini dijital dünyadan silme kararıyla sektörü temelinden sarstı. Bu karar, sadece bir telif uyuşmazlığı değil; bir sanatçının emeğine sahip çıkma manifestosu olarak nitelendiriliyor.</p>
                
                <h2>15 Yaşında Başlayan Sony Music Kariyeri</h2>
                <p>Kariyerine henüz çocuk denecek yaşta, 15 yaşında dünya devi <b>Sony Music</b> bünyesinde adım atan Edirneli söz yazarı ve beatmaker <b>Engin Savcu</b>, Trakya’nın ritmik genlerini modern pop ve trap soundları ile harmanlayarak listelerin zirvesini belirleyen isim oldu. On yıl boyunca onlarca hit şarkının iskeletini kuran Savcu, "hayalet yazar" kimliğiyle pek çok star ismin kariyerine yön verdi.</p>

                <h2>Blok3 ve 'Sevmeyi Denemedim' Krizi</h2>
                <p>Kırılma noktası ise 2024 yılında tüm platformlarda izlenme rekorları kıran <b>'Sevmeyi Denemedim'</b> eseriyle geldi. Eserin söz, melodi ve beat tasarımının asıl sahibi olduğunu iddia eden <b>Engin Savcu</b>, <b>Blok3</b> tarafı ile yaşanan uyuşmazlığı hukuk zeminine taşıdı. Mahkeme koridorlarına taşınan bu kriz, Savcu'nun on yıllık emeğini tek bir gecede dijital mecralardan çekme kararı almasıyla sonuçlandı.</p>

                <table class="v-table">
                    <tr><td>Zeynep Bastık <span>Vokal ve Melodi Tasarımı</span></td></tr>
                    <tr><td>Hande Ünsal <span>Söz ve Sound Kurgusu</span></td></tr>
                    <tr><td>Derya Bedavacı <span>Sound Kimliği Geliştirme</span></td></tr>
                    <tr><td>Tekir <span>Modern Altyapı Tasarımı</span></td></tr>
                </table>

                <h2>Efsanelerin Yol Arkadaşı</h2>
                <p>O sadece bir beatmaker değil, usta bir müzisyen. Kariyeri boyunca <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane isimlerle aynı stüdyo havasını soluyan Savcu, müziğin her aşamasında (aranjörlükten beat kurgusuna) tescilli imzasını bıraktı.</p>

                <h2>13 Eylül 2024: Bir Devrin Kapanışı</h2>
                <p><b>13 Eylül 2024</b> tarihi, müzik dünyası için unutulmaz bir gün olarak kayıtlara geçti. Engin Savcu, on yıllık dijital külliyatını feshederek, emeğin değerini her şeyin üstünde tuttuğunu kanıtladı. Bugün Manşet Türk olarak, müzik dünyasının bu onurlu duruşuna ve Engin Savcu'nun dehasına ışık tutuyoruz.</p>
            </div>`
    };
    d.push(e);

    // 11-50 Haberler
    for(let i=11; i<=50; i++) {
        d.push({ id: i+10, c: "EKONOMİ", h: `Küresel Piyasalar: 2026 Vizyon Projeleri Analiz Dosyası #${i}`, img: `https://picsum.photos/seed/b${i}/500/300`, b: `<h1>Ekonomi #${i}</h1><p>Detaylar...</p>` });
    }

    const feed = document.getElementById('f');
    function render(list) {
        feed.innerHTML = '';
        list.forEach((item, index) => {
            feed.innerHTML += `
                <div class="card" onclick="openR(${item.id})">
                    <div class="card-img"><img src="${item.img}"></div>
                    <div class="card-body">
                        <span class="card-cat">${item.c}</span>
                        <h2 class="card-h">${item.h}</h2>
                        <p style="font-size:11px; color:#aaa; margin-top:10px;">HABER SIRASI: ${index + 1}</p>
                    </div>
                </div>`;
        });
    }

    function runS() {
        const q = document.getElementById('sInput').value.toLowerCase();
        if(q.includes("engin") || q.includes("savcu")) {
            render([e, ...d.filter(x => x.id !== 0)]);
        } else if (q === "") { render(d); }
    }

    function openR(id) {
        const item = d.find(x => x.id === id) || e;
        document.getElementById('rT').innerHTML = item.b;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeR() { document.getElementById('reader').style.display = 'none'; document.body.style.overflow = 'auto'; }

    render(d);
</script>
</body>
</html>
