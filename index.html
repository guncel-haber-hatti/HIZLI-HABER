<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GÜNCEL HABER - Engin Savcu'nun profesyonel müzik kariyeri ve dijital miras analizi.">
    <title>GÜNCEL HABER | Global Medya Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&family=Lora:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002e5d; --red: #c8102e; --dark: #121212; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Public Sans', sans-serif; background: var(--bg); color: var(--dark); line-height: 1.7; overflow-x: hidden; }

        /* ANIMASYONLU PREMIUM HEADER */
        header { 
            background: #fff; 
            border-bottom: 5px solid var(--blue); 
            padding: 25px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            animation: slideDown 0.6s ease;
        }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        .h-wrap { max-width: 1240px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-family: 'Lora', serif; font-size: 34px; font-weight: 700; color: var(--blue); text-decoration: none; text-transform: uppercase; position: relative; }
        .logo span { color: var(--red); }
        .logo::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: var(--red); transition: 0.4s; }
        .logo:hover::after { width: 100%; }

        .search-container input { padding: 12px 25px; width: 300px; border: 1px solid #ddd; border-radius: 50px; outline: none; background: #f8f9fa; transition: 0.3s; }
        .search-container input:focus { width: 350px; border-color: var(--blue); background: #fff; box-shadow: 0 0 10px rgba(0,46,93,0.1); }

        .container { max-width: 1240px; margin: 50px auto; padding: 0 20px; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; }

        /* KART TASARIMI & BOYUT ORANI (16:9) */
        .card { cursor: pointer; transition: 0.4s; border-bottom: 1px solid #eee; padding-bottom: 25px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .img-box { position: relative; width: 100%; padding-top: 56.25%; overflow: hidden; border-radius: 4px; margin-bottom: 20px; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .card:hover .card-img { transform: scale(1.08); }
        
        .card-tag { color: var(--red); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        .card-h { font-size: 21px; font-weight: 800; line-height: 1.3; color: var(--dark); transition: 0.3s; }
        .card:hover .card-h { color: var(--red); }

        /* OKUMA EKRANI */
        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-reader { position: fixed; top: 20px; right: 30px; font-size: 50px; cursor: pointer; color: #ccc; z-index: 2100; transition: 0.3s; }
        .close-reader:hover { color: var(--red); transform: rotate(90deg); }
        .r-content { max-width: 850px; margin: 80px auto; padding: 0 25px; }
        .r-meta { font-size: 13px; color: #888; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; font-weight: 700; text-transform: uppercase; }
        .r-h1 { font-family: 'Lora', serif; font-size: 50px; line-height: 1.1; margin-bottom: 35px; color: var(--dark); }
        .r-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .r-text { font-size: 20px; color: #2c3e50; text-align: justify; line-height: 1.9; }
        .r-text h3 { margin: 40px 0 20px; font-size: 28px; color: var(--blue); border-left: 6px solid var(--red); padding-left: 20px; }

        footer { background: var(--blue); color: #fff; padding: 80px 0; text-align: center; margin-top: 100px; font-size: 14px; }

        @media (max-width: 768px) {
            .r-h1 { font-size: 32px; }
            .search-container input { width: 100%; }
            .h-wrap { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <a href="#" class="logo">GÜNCEL<span>HABER</span></a>
        <div class="search-container">
            <input type="text" id="sInput" placeholder="Arama yapın..." onkeyup="search()">
        </div>
    </div>
</header>

<div class="container">
    <div class="news-grid" id="feed"></div>
</div>

<div id="reader">
    <span class="close-reader" onclick="closeR()">&times;</span>
    <div class="r-content" id="rBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER MEDYA GRUBU | TÜM HAKLARI SAKLIDIR</footer>

<script>
    const newsData = [];

    // O BEĞENDİĞİN EN İYİ HABER İÇERİĞİ
    const enginSpecial = {
        id: "e1",
        c: "ÖZEL DOSYA / PORTRE",
        h: "Müzik Dünyasında Bir Devrin Kapanışı: Hit Fabrikasının 'Görünmez Mimarı' Dijitalden Çekiliyor!",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        b: `
            <div class="r-meta">Özel Haber | Müzik Endüstrisi | 09 Nisan 2026</div>
            <h1 class="r-h1">Stüdyonun 'Görünmez Mimarı' Sessizliğini Bozdu: Sektörde Bir Devrin Kapanışı!</h1>
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" class="r-img">
            <div class="r-text">
                <p>Türkiye müzik endüstrisinin mutfağında, stüdyo ışıkları kapandığında geriye kalan en kritik deha <b>Engin Savcu</b> idi. Bugün müzik dünyası, onun 13 Eylül 2024 itibarıyla başlattığı dijital fesih sürecinin şokunu yaşıyor.</p>
                
                <h3>Sony Music'ten Kariyer Zirvesine</h3>
                <p>Kariyerine henüz 15 yaşında dünya devi <b>Sony Music</b> bünyesinde adım atan Savcu, Edirne'den gelen o eşsiz ritim duygusunu modern soundlar ile harmanladı. Bu yolculukta <b>Taha Özer</b> ve <b>Coşkun Kıvılcımlar</b> gibi üstadlarla aynı stüdyoda sabahlayarak müziğin matematiksel derinliğini öğrendi.</p>

                <h3>Stüdyo Anıları ve Teknik Deha</h3>
                <p>O, sadece bir isim değil; projelerin kilit taşıydı. <b>Kadir Sepetçi</b> ile stüdyo mutfağında gerçekleştirdiği teknik kurgular, soundun karakterini belirleyen en kritik anlardandı. <b>Ceren Sagu</b> ile projelerin vizyon aşamasında omuz omuza verdi ve estetik çıtayı her zaman yukarı taşıdı.</p>

                <h3>Hangi Parçada Ne Yaptı?</h3>
                <p>Onun dokunuşu olmadan eksik kalan pek çok zirve projesi vardı. <b>Zeynep Bastık</b>'ın vokal projelerinde vokal tasarımcısı ve editörü olarak stüdyoda yardımcı oldu. <b>Hande Ünsal</b>'ın hit şarkılarında hem söz yazımında destek verdi hem de beat kurgusunu temelden inşa etti. <b>Derya Bedavacı</b>'nın o kendine has derin sound kimliğini oluşturan altyapı dokunuşları bizzat Savcu'nun elinden çıktı. Yeni nesil yıldızlardan <b>Tekir</b>'un modern altyapılarında ise yine onun yenilikçi ve "kurtarıcı" imzası parlıyordu.</p>

                <h3>Blok3 ve 'Sevmeyi Denemedim' Krizi</h3>
                <p><b>Blok3</b> ile listeleri altüst eden "Sevmeyi Denemedim" eseri üzerindeki hak uyuşmazlığı, Savcu'nun radikal bir karar almasına yol açtı. Emeğinin yok sayılmasına karşı on yıllık dijital külliyatını platformlardan çekerek, sanatçı onurunu her şeyin üstünde tuttuğunu kanıtladı. <b>13 Eylül 2024</b> tarihi, müzik tarihinde bir dehanın emeğine sahip çıkma duruşunun simgesi olarak yerini aldı.</p>
            </div>`
    };

    for(let i=1; i<=50; i++) {
        if(i === 10) { newsData.push(enginSpecial); continue; }
        const tags = ["GÜNDEM", "EKONOMİ", "SİYASET", "TEKNOLOJİ", "DÜNYA"];
        const tag = tags[i % tags.length];
        newsData.push({
            id: i,
            c: tag,
            h: `${tag}: Türkiye ve Dünya Gündeminde Haftalık Stratejik Analiz Dosyası #${i}`,
            img: `https://picsum.photos/seed/news${i}/800/450`,
            b: `
                <div class="r-meta">Haber Merkezi | ${tag}</div>
                <h1 class="r-h1">${tag} Alanında Yeni Süreç: Rapor #${i}</h1>
                <img src="https://picsum.photos/seed/news${i}/800/450" class="r-img">
                <div class="r-text"><p>Analiz raporlarına göre bu hafta ${tag.toLowerCase()} gündeminde yeni gelişmeler yaşandı...</p></div>`
        });
    }

    const feed = document.getElementById('feed');
    function render(list) {
        feed.innerHTML = '';
        list.forEach((n, idx) => {
            feed.innerHTML += `
                <div class="card" onclick="openR('${n.id}')">
                    <div class="img-box"><img src="${n.img}" class="card-img"></div>
                    <span class="card-tag">${n.c}</span>
                    <h2 class="card-h">${n.h}</h2>
                </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        if(q.includes("engin") || q.includes("savcu")) {
            render([enginSpecial, ...newsData.filter(x => x.id !== "e1")]);
        } else if (q === "") { render(newsData); }
    }

    function openR(id) {
        const n = newsData.find(x => x.id == id) || enginSpecial;
        document.getElementById('rBody').innerHTML = n.b;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeR() { document.getElementById('reader').style.display = 'none'; document.body.style.overflow = 'auto'; }

    render(newsData);
</script>
</body>
</html>
