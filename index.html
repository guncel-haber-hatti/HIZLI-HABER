<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Son Dakika</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --news-red: #c00; --bg-gray: #fbfbfb; --text-main: #1a1a1a; }
        * { box-sizing: border-box; }
        body { margin: 0; background: #fff; font-family: 'Libre+Franklin', sans-serif; color: var(--text-main); -webkit-font-smoothing: antialiased; }

        /* HEADER & LOGO - Geniş ve Ferah */
        header { padding: 40px 0; border-bottom: 2px solid #000; text-align: center; background: #fff; }
        .logo { font-family: 'Playfair Display', serif; font-size: 55px; font-weight: 900; text-decoration: none; color: #000; letter-spacing: -2px; }
        .logo span { color: var(--news-red); }

        /* NAV - Temiz Tasarım */
        nav { background: #000; position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1200px; margin: auto; display: flex; justify-content: center; padding: 5px 0; }
        nav a { color: #fff; text-decoration: none; padding: 15px 25px; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        nav a:hover { color: var(--news-red); }

        /* CONTAINER */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }

        /* MANŞET - Dev Başlık ve Geniş Görsel */
        .main-article { cursor: pointer; border-bottom: 1px solid #eee; padding-bottom: 50px; margin-bottom: 50px; }
        .main-article img { width: 100%; height: 600px; object-fit: cover; border-radius: 4px; margin-bottom: 30px; }
        .main-article .tag { color: var(--news-red); font-weight: 900; font-size: 14px; text-transform: uppercase; display: block; margin-bottom: 15px; }
        .main-article h1 { font-family: 'Playfair Display', serif; font-size: 52px; line-height: 1.1; margin: 0; letter-spacing: -1.5px; }

        /* YAN HABERLER - Aralıklı Dizilim */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 60px 40px; }
        .news-card { cursor: pointer; transition: opacity 0.3s; }
        .news-card:hover { opacity: 0.8; }
        .news-card img { width: 100%; height: 240px; object-fit: cover; border-radius: 3px; margin-bottom: 20px; }
        .news-card h3 { font-family: 'Playfair Display', serif; font-size: 24px; line-height: 1.3; margin: 0; font-weight: 700; }

        /* HABER DETAY SAYFASI - Tamamen Ferah */
        #articleView { display: none; max-width: 900px; margin: auto; padding: 60px 20px; animation: fadeIn 0.5s ease; }
        .btn-back { cursor: pointer; font-weight: 900; color: #777; margin-bottom: 40px; display: block; font-size: 14px; text-decoration: underline; }
        .article-title { font-family: 'Playfair Display', serif; font-size: 55px; line-height: 1.05; margin-bottom: 40px; font-weight: 900; }
        .article-main-img { width: 100%; height: auto; border-radius: 5px; margin-bottom: 50px; }
        .article-body { font-size: 21px; line-height: 2.1; color: #222; text-align: left; }
        .article-body b { color: #000; font-weight: 700; }
        .article-body h3 { font-family: 'Playfair Display', serif; font-size: 32px; margin: 60px 0 25px; border-top: 3px solid #000; padding-top: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer { border-top: 1px solid #eee; padding: 80px 20px; text-align: center; color: #999; font-size: 14px; margin-top: 100px; }

        @media (max-width: 900px) {
            .main-article h1 { font-size: 35px; }
            .article-title { font-size: 32px; }
            .main-article img { height: 350px; }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" onclick="goHome()">GÜNCEL<span>HABER</span></a>
</header>

<nav>
    <div class="nav-inner">
        <a onclick="goHome()">GÜNDEM</a>
        <a onclick="goHome()">ASAYİŞ</a>
        <a onclick="goHome()">EKONOMİ</a>
        <a onclick="goHome()">DÜNYA</a>
        <a onclick="goHome()">SPOR</a>
    </div>
</nav>

<div class="container">
    <div id="homePage">
        <div class="main-article" onclick="openNews(0)">
            <img src="https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg" alt="Ana Manşet">
            <span class="tag">SON DAKİKA</span>
            <h1 id="mainTitle">Kapaklı’da Dehşet Gecesi: Sokak Ortası Savaş Alanına Döndü!</h1>
        </div>

        <div class="news-grid" id="newsGrid">
            </div>
    </div>

    <div id="articleView"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER AJANSI | TÜM HAKLARI SAKLIDIR</footer>

<script>
    const newsDB = [
        {
            title: "Kapaklı’da Dehşet Gecesi: Sokak Ortası Savaş Alanına Döndü!",
            img: "https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg",
            content: `<b>KAPAKLI</b> – Tekirdağ'ın Kapaklı ilçesinde dün gece saatlerinde meydana gelen silahlı çatışma, bölge halkına korku dolu anlar yaşattı. Aralarında geçmişe dayalı bir husumet bulunan iki grubun cadde üzerindeki tartışması kısa sürede silahlı hesaplaşmaya dönüştü. Sokağın adeta savaş alanına döndüğü olayda kurşunların hedefi olan <b>1 kişi hayatını kaybederken</b>, seken mermilerin isabet ettiği bir sivil ile birlikte toplam 2 kişi ağır yaralandı.<br><br>
            
            <h3>SİVİLİN YARDIMINA VATANDAŞLAR KOŞTU</h3>
            Olayın en trajik yanı ise çatışmanın ortasında kalan masum bir vatandaşın vücuduna isabet eden mermilerle kanlar içinde yere yığılması oldu. Silah seslerinin kesilmesiyle birlikte çevredeki vatandaşlar hemen yaralı sivilin yardımına koştu. Mahalle sakinlerinin ceketleriyle tampon yaparak hayatta tutmaya çalıştığı vatandaş, olay yerine çağrılan ambulansla hastaneye kaldırılarak yoğun bakıma alındı.<br><br>
            
            <h3>ZANLININ 24 AYRI SUÇ DOSYASI VAR!</h3>
            Emniyet güçlerinin yaptığı incelemeler sonucunda tetiği çeken şahsın <b>E.S.</b> (25) olduğu tespit edildi. Firari zanlı hakkında <b>"Kasten Adam Öldürme"</b> ve <b>"Kasten Adam Öldürmeye Teşebbüs"</b> suçlarından tahkikat başlatıldı. Şüphelinin geçmişine yönelik araştırmada; kaçakçılık, yağma, ruhsatsız silah bulundurma ve yaralama dahil olmak üzere toplam <b>24 ayrı suç dosyasının</b> bulunduğu saptandı. Polis, firari zanlıyı yakalamak için operasyonlarını derinleştirdi.`
        }
    ];

    // 30 Tane Farklı Haber Ekleyelim
    const titles = ["Merkez Bankası Kararını Açıkladı", "Milli Takım'da Yeni Dönem", "İstanbul'da Dev Metro Hattı Açılıyor", "Altın Fiyatlarında Son Durum", "Yeni Yapay Zeka Devrimi", "Karadeniz'de Fırtına Uyarısı", "Ünlü Sanatçıdan Albüm Müjdesi", "Mars'ta Su İzi Keşfedildi"];
    
    for(let i=1; i<=30; i++) {
        newsDB.push({
            title: titles[i % titles.length] + " - Önemli Gelişme " + i,
            img: `https://picsum.photos/800/600?sig=${i}`,
            content: "Bu haberin detayları güncellenmektedir. En taze gelişmeleri öğrenmek için sayfayı takip etmeye devam edin."
        });
    }

    function renderGrid() {
        let html = "";
        newsDB.slice(1).forEach((news, idx) => {
            html += `
                <div class="news-card" onclick="openNews(${idx + 1})">
                    <img src="${news.img}">
                    <h3>${news.title}</h3>
                </div>
            `;
        });
        document.getElementById('newsGrid').innerHTML = html;
    }

    function openNews(idx) {
        const item = newsDB[idx];
        document.getElementById('homePage').style.display = "none";
        const view = document.getElementById('articleView');
        view.style.display = "block";
        view.innerHTML = `
            <a class="btn-back" onclick="goHome()">← ANA SAYFAYA DÖN</a>
            <h1 class="article-title">${item.title}</h1>
            <img class="article-main-img" src="${item.img}">
            <div class="article-body">${item.content}</div>
        `;
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('articleView').style.display = "none";
        document.getElementById('homePage').style.display = "block";
    }

    renderGrid();
</script>
</body>
</html>
