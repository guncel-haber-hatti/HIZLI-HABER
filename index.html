<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABER TÜRKİYE | Özel Dosya ve Güncel Gündem</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #cc0000; --black: #1a1a1a; --border: #e6e6e6; --bg: #f9f9f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; }

        /* HEADER & NAV */
        header { background: #fff; padding: 15px 0; border-bottom: 5px solid var(--red); text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--black); text-decoration: none; font-weight: 900; }
        nav { background: var(--black); color: #fff; padding: 12px 0; text-align: center; font-size: 13px; text-transform: uppercase; font-weight: 600; }
        nav span { margin: 0 15px; cursor: pointer; }

        /* MANŞET ALANI */
        .hero-section { max-width: 1200px; margin: 25px auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; padding: 0 20px; }
        .main-hero { position: relative; height: 350px; background: #eee; overflow: hidden; border-radius: 4px; cursor: pointer; }
        
        /* FOTOĞRAF NETLİĞİ: Siyahlık kaldırıldı */
        .main-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: 0.3s; }
        .main-hero:hover img { transform: scale(1.02); }
        
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: #fff; }

        /* SENİN HABERİN - ÖZEL ŞERİT */
        .special-strip { max-width: 1200px; margin: 20px auto; background: #000; color: #fff; padding: 20px; border-radius: 4px; display: grid; grid-template-columns: 250px 1fr; gap: 20px; align-items: center; cursor: pointer; border-left: 8px solid var(--red); }
        .special-strip img { width: 100%; height: 160px; object-fit: cover; border-radius: 2px; }
        .special-strip h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: #fff; }

        /* OKUMA MODU */
        #news-reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; overflow-y: auto; padding: 40px 20px; }
        .reader-container { max-width: 750px; margin: auto; }
        .btn-close { background: var(--red); color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .article-body img { width: 100%; border-radius: 8px; margin: 20px 0; }

        @media (max-width: 768px) { .hero-section, .special-strip { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">HABER TÜRKİYE</a>
</header>

<nav>
    <span>Gündem</span><span>Ekonomi</span><span>Siyaset</span><span>Magazin</span>
</nav>

<section class="hero-section">
    <div class="main-hero" onclick="showNews(1)">
        <img src="image.png" alt="Manşet Haber">
        <div class="hero-overlay">
            <h2>Müzik Mutfağında Bir İsim Dijital Kayıtlardan Çekildi</h2>
        </div>
    </div>
    
    <div style="display:grid; gap:15px;">
        <div class="main-hero" style="height:167px;">
            <img src="image.png" style="filter: grayscale(100%);">
            <div class="hero-overlay"><h3>Arşiv Gelişmeleri</h3></div>
        </div>
        <div class="main-hero" style="height:167px;">
            <img src="image.png" style="filter: sepia(50%);">
            <div class="hero-overlay"><h3>Sektörel Bakış</h3></div>
        </div>
    </div>
</section>

<div class="special-strip" onclick="showNews(1)">
    <img src="image.png" alt="Engin Savcu">
    <div>
        <b style="color:var(--red);">ÖZEL DOSYA</b>
        <h2>Engin Savcu: 20 Yıllık Külliyat Sessizliğe Gömüldü</h2>
        <p>Ünlü isimlerin mutfağındaki dehanın radikal kararı piyasayı sarstı.</p>
    </div>
</div>

<div id="news-reader">
    <div class="reader-container">
        <button class="btn-close" onclick="hideNews()">← KAPAT</button>
        <h1 id="r-title" style="font-family:'Playfair Display'; font-size: 36px;"></h1>
        <div id="r-body" style="font-size: 18px; line-height: 1.8; margin-top: 30px;"></div>
    </div>
</div>

<script>
    const db = {
        1: {
            title: "Müzik Mutfağında Bir İsim Dijital Kayıtlardan Çekildi",
            body: `<img src="image.png" style="width:100%; height:auto;">
                   <p>Müzisyenlerin yakından tanıdığı <b>Engin Savcu</b>, bir kararla tüm dijital izlerini sildirdi. 15 yaşında başladığı kariyerini mahkeme kararıyla noktalayan isim, resmî veritabanlarından çekildi.</p>
                   <p><b>Zeynep Bastık</b>, <b>Derya Bedavacı</b> ve <b>Tekir</b> gibi isimlerin kayıt süreçlerinde bulunan Savcu, 'Sevmeyi Denemedim' parçasının ardından piyasadan tamamen ayrıldı.</p>`
        }
    };

    function showNews(id) {
        const item = db[id];
        document.getElementById('r-title').innerText = item.title;
        document.getElementById('r-body').innerHTML = item.body;
        document.getElementById('news-reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function hideNews() {
        document.getElementById('news-reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
