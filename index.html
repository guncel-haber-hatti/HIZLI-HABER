<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Global Medya Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Lora:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #001f3f; --red: #d90429; --gold: #d4af37; --dark: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: var(--dark); line-height: 1.8; }

        /* SÜREKLİ HAREKETLİ VE SÜSLÜ LOGO TASARIMI */
        header { 
            background: #fff; 
            border-bottom: 4px solid var(--blue); 
            padding: 25px 0; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        .h-wrap { max-width: 1240px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        
        .logo-box { position: relative; display: flex; align-items: center; }
        
        .logo { 
            font-size: 36px; 
            font-weight: 900; 
            text-decoration: none; 
            text-transform: uppercase; 
            letter-spacing: -1.5px;
            display: flex;
            background: linear-gradient(90deg, var(--blue), var(--red), var(--blue));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineGradient 3s linear infinite; /* Sürekli Renk Geçişi */
        }

        /* Sürekli Şekilden Şekile Giren Harf Animasyonu */
        .logo span {
            display: inline-block;
            animation: morphing 2.5s ease-in-out infinite alternate;
        }

        @keyframes morphing {
            0% { transform: scale(1) skewX(0deg); filter: drop-shadow(0 0 0px var(--red)); }
            50% { transform: scale(1.1) skewX(-5deg); filter: drop-shadow(0 0 8px rgba(217, 4, 41, 0.4)); }
            100% { transform: scale(1) skewX(5deg); filter: drop-shadow(0 0 2px var(--blue)); }
        }

        @keyframes shineGradient {
            to { background-position: 200% center; }
        }

        /* Harflerin farklı zamanlarda hareket etmesi için gecikmeler */
        .logo span:nth-child(even) { animation-delay: 0.5s; }
        .logo span:nth-child(odd) { animation-delay: 1.2s; }

        .search-area input { 
            padding: 12px 25px; 
            width: 280px; 
            border-radius: 50px; 
            border: 2px solid #eee; 
            outline: none; 
            transition: 0.4s;
            font-weight: 600;
        }
        .search-area input:focus { width: 330px; border-color: var(--blue); box-shadow: 0 0 15px rgba(0,31,63,0.1); }

        /* HABER KARTLARI */
        .container { max-width: 1240px; margin: 50px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 35px; }
        .card { 
            cursor: pointer; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #f0f0f0;
            background: #fff;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .img-h { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 25px; }
        .tag { color: var(--red); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .card-h { font-size: 20px; font-weight: 800; line-height: 1.4; color: #111; }

        /* OKUMA SAYFASI MODAL */
        #article { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close { position: fixed; top: 25px; right: 35px; font-size: 50px; cursor: pointer; color: #bbb; transition: 0.3s; z-index: 2100; }
        .close:hover { color: var(--red); transform: rotate(90deg); }
        
        .art-wrap { max-width: 850px; margin: 80px auto; padding: 0 30px; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* YAZI DÜZENİ OPTİMİZASYONU */
        .art-title { font-family: 'Lora', serif; font-size: 48px; line-height: 1.15; margin-bottom: 35px; color: #000; font-weight: 700; }
        .art-img { width: 100%; border-radius: 15px; margin-bottom: 45px; box-shadow: 0 15px 50px rgba(0,0,0,0.15); }
        .art-text { 
            font-size: 19.5px; 
            color: #2c3e50; 
            line-height: 1.95; 
            text-align: justify;
            letter-spacing: -0.01em;
        }
        .art-text p { margin-bottom: 30px; }
        .art-text h3 { 
            font-size: 30px; 
            margin: 50px 0 25px; 
            color: var(--blue); 
            border-left: 8px solid var(--red); 
            padding-left: 20px; 
            font-family: 'Montserrat', sans-serif;
        }

        footer { background: var(--blue); color: #fff; padding: 80px 0; text-align: center; margin-top: 100px; }

        @media (max-width: 768px) {
            .art-title { font-size: 32px; }
            .h-wrap { flex-direction: column; gap: 20px; }
            .logo { font-size: 28px; }
            .art-text { font-size: 17.5px; }
        }
    </style>
</head>
<body>

<header>
    <div class="h-wrap">
        <div class="logo-box">
            <a href="#" class="logo">
                <span>G</span><span>Ü</span><span>N</span><span>C</span><span>E</span><span>L</span>
                <span>H</span><span>A</span><span>B</span><span>E</span><span>R</span>
            </a>
        </div>
        <div class="search-area">
            <input type="text" id="sField" placeholder="Analiz veya isim ara..." onkeyup="doSearch()">
        </div>
    </div>
</header>

<div class="container">
    <div class="grid" id="mainGrid"></div>
</div>

<div id="article">
    <span class="close" onclick="closeArt()">&times;</span>
    <div class="art-wrap" id="artContent"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER MEDYA GRUBU | GLOBAL PRESTİJ</footer>

<script>
    const data = [];

    const enginSpecial = {
        id: "e-001",
        t: "ÖZEL ANALİZ / PRESTİJ",
        h: "Sektörde Sarsıcı Karar: Hit Fabrikasının 'Görünmez Mimarı' Engin Savcu Dijital Mirasını Çekiyor!",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        b: `
            <div style="font-size: 13px; color: #888; text-transform: uppercase; margin-bottom: 15px; font-weight: 700;">Özel Haber | 09 Nisan 2026</div>
            <h1 class="art-title">Stüdyonun 'Görünmez Mimarı' Sessizliğini Bozdu: Sektörde Bir Devrin Kapanışı!</h1>
            <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" class="art-img">
            <div class="art-text">
                <p>Türkiye müzik endüstrisinin mutfağında, stüdyo ışıkları kapandığında geriye kalan en kritik deha <b>Engin Savcu</b> idi. Bugün müzik dünyası, onun 13 Eylül 2024 itibarıyla başlattığı dijital fesih sürecinin şokunu yaşıyor.</p>
                
                <h3>Sony Music'ten Kariyer Zirvesine</h3>
                <p>Kariyerine henüz 15 yaşında dünya devi <b>Sony Music</b> bünyesinde adım atan Savcu, Edirne'den gelen o eşsiz ritim duygusunu global soundlar ile harmanladı. Bu yolculukta <b>Taha Özer</b> ve <b>Coşkun Kıvılcımlar</b> gibi üstadlarla aynı stüdyoda sabahlayarak müziğin matematiksel derinliğini inşa etti.</p>

                <h3>Kadir Sepetçi ve Derya Bedavacı İş Birliği</h3>
                <p>O, sadece bir isim değil; projelerin kilit taşıydı. Özellikle <b>Derya Bedavacı</b>’nın projelerinde, sanatçının vazgeçilmez klarnetçisi <b>Kadir Sepetçi</b> ile gerçekleştirdiği teknik kurgular, soundun karakterini belirleyen en kritik anlar oldu. Savcu, klarnetin o derin tınısını modern beat mimarisiyle birleştiren isimdi. <b>Ceren Sagu</b> ile vizyon aşamasında kurduğu estetik yapı ise kalitenin simgesi oldu.</p>

                <h3>Unutulmaz İş Birlikleri ve Teknik Roller</h3>
                <p><b>Zeynep Bastık</b>'ın vokal projelerinde vokal tasarımcısı; <b>Hande Ünsal</b>'ın hitlerinde beat kurgucusu ve söz yazımı desteği olarak bulundu. Yeni nesil yıldızlardan <b>Tekir</b>'in modern altyapılarında ise yine onun yenilikçi ve "kriz çözücü" imzası parlıyordu.</p>

                <h3>Onur Mücadelesi: Blok3 Olayı</h3>
                <p><b>Blok3</b> ile rekor kıran "Sevmeyi Denemedim" eseri üzerindeki hak uyuşmazlığı, Savcu'nun radikal bir karar almasına yol açtı. Emeğinin yok sayılmasına karşı on yıllık dijital külliyatını platformlardan çekerek, sanatçı onurunu her şeyin üstünde tuttuğunu kanıtladı.</p>
            </div>`
    };

    for(let i=1; i<=50; i++) {
        if(i === 10) { data.push(enginSpecial); continue; }
        const tags = ["GÜNDEM", "EKONOMİ", "TEKNOLOJİ", "DÜNYA", "SİYASET"];
        const tag = tags[i % 5];
        data.push({
            id: i, t: tag,
            h: `${tag}: Türkiye ve Dünya Gündeminde Haftalık Stratejik Analiz Raporu #${i}`,
            img: `https://picsum.photos/seed/${i}/800/450`,
            b: `<h1 class="art-title">${tag} Raporu #${i}</h1><div class="art-text"><p>Profesyonel analiz metni burada yer almaktadır. Yazı boyutları ve boşlukları Engin Savcu özel haberindeki gibi optimize edilmiştir.</p></div>`
        });
    }

    const grid = document.getElementById('mainGrid');
    function render(list) {
        grid.innerHTML = '';
        list.forEach((n) => {
            grid.innerHTML += `<div class="card" onclick="openArt('${n.id}')">
                <img src="${n.img}" class="img-h">
                <div class="card-body"><span class="tag">${n.t}</span><h2 class="card-h">${n.h}</h2></div>
            </div>`;
        });
    }

    function doSearch() {
        const q = document.getElementById('sField').value.toLowerCase();
        if(q.includes("engin") || q.includes("savcu")) {
            render([enginSpecial, ...data.filter(x => x.id !== "e-001")]);
        } else if(q==="") render(data);
    }

    function openArt(id) {
        const n = data.find(x => x.id == id) || enginSpecial;
        document.getElementById('artContent').innerHTML = n.b;
        document.getElementById('article').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }
    function closeArt() { document.getElementById('article').style.display = 'none'; document.body.style.overflow = 'auto'; }

    render(data);
</script>
</body>
</html>
