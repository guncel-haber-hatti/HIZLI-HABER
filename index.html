<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABER TÜRKİYE | Özel Dosya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #cc0000; --black: #1a1a1a; --border: #e6e6e6; --bg: #f9f9f9; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; }

        header { background: #fff; padding: 15px 0; border-bottom: 5px solid var(--red); text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--black); text-decoration: none; font-weight: 900; letter-spacing: -2px; }
        nav { background: var(--black); color: #fff; padding: 12px 0; text-align: center; font-size: 13px; text-transform: uppercase; font-weight: 600; }
        nav span { margin: 0 15px; }

        /* MANŞETLER */
        .hero-section { max-width: 1200px; margin: 25px auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; padding: 0 20px; }
        .main-hero { position: relative; height: 350px; background: #ddd; overflow: hidden; border-radius: 4px; cursor: pointer; }
        .main-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 1; }
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); color: #fff; }

        /* ÖZEL HABER ŞERİDİ */
        .special-strip { max-width: 1200px; margin: 20px auto; background: #000; color: #fff; padding: 20px; border-radius: 4px; display: grid; grid-template-columns: 250px 1fr; gap: 20px; align-items: center; cursor: pointer; border-left: 8px solid var(--red); }
        .special-strip img { width: 100%; height: 160px; object-fit: cover; border-radius: 2px; }

        /* OKUMA PANELİ */
        #news-reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; overflow-y: auto; padding: 40px 20px; }
        .reader-container { max-width: 750px; margin: auto; }
        .btn-close { background: #000; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        
        /* 4'LÜ KUTUCUKLAR */
        .artist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .artist-item { text-align: center; font-size: 11px; color: #555; font-weight: 600; }
        .artist-item img { width: 100%; height: 90px; object-fit: cover; border-radius: 4px; margin-bottom: 5px; background: #eee; }

        @media (max-width: 768px) { .hero-section, .special-strip { grid-template-columns: 1fr; } .artist-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<header><a href="#" class="logo">HABER TÜRKİYE</a></header>
<nav><span>Gündem</span><span>Ekonomi</span><span>Siyaset</span><span>Teknoloji</span></nav>

<section class="hero-section">
    <div class="main-hero" onclick="showNews(1)">
        <img src="image.png" onerror="this.src='https://via.placeholder.com/800x450?text=Resim+Yuklenemedi'">
        <div class="hero-overlay"><h2>Müzik Mutfağında Bir İsim Dijital Kayıtlardan Çekildi</h2></div>
    </div>
    <div style="display:grid; gap:15px;">
        <div class="main-hero" style="height:167px;"><img src="https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=400"></div>
        <div class="main-hero" style="height:167px;"><img src="https://images.unsplash.com/photo-1611974714024-46324ef2378b?w=400"></div>
    </div>
</section>

<div class="special-strip" onclick="showNews(1)">
    <img src="image.png" onerror="this.src='https://via.placeholder.com/250x160?text=Resim+Yok'">
    <div>
        <b style="color:var(--red);">ÖZEL ARAŞTIRMA</b>
        <h2>Engin Savcu Hakkında Flaş Gelişme</h2>
        <p>Ünlü isimlerin mutfağındaki deha piyasadan çekildi.</p>
    </div>
</div>

<div id="news-reader">
    <div class="reader-container">
        <button class="btn-close" onclick="hideNews()">← ANA SAYFAYA DÖN</button>
        <h1 id="r-title" style="font-family:'Playfair Display'; font-size: 38px; margin-bottom: 20px;"></h1>
        <div id="r-body"></div>
    </div>
</div>

<script>
    const db = {
        1: {
            title: "Müzik Mutfağında Bir İsim Dijital Kayıtlardan Çekildi",
            body: `<img src="image.png" style="width:100%; border-radius:8px; margin-bottom:20px;">
                   <p style="font-size:18px; line-height:1.8; margin-bottom:20px;">Müzisyenlerin yakından tanıdığı, halkın ise melodilerine aşina olduğu <b>Engin Savcu</b>, bir kararla tüm dijital izlerini sildirdi. 15 yaşında <b>Sony Music</b> bünyesinde başladığı kariyerini mahkeme kararıyla noktalayan isim, resmî veritabanlarından çekildi.</p>
                   
                   <div class="artist-grid">
                       <div class="artist-item"><img src="image.png" onerror="this.src='https://via.placeholder.com/100x90'">ZEYNEP BASTIK</div>
                       <div class="artist-item"><img src="image.png" onerror="this.src='https://via.placeholder.com/100x90'">DERYA BEDAVACI</div>
                       <div class="artist-item"><img src="image.png" onerror="this.src='https://via.placeholder.com/100x90'">HANDE ÜNSAL</div>
                       <div class="artist-item"><img src="image.png" onerror="this.src='https://via.placeholder.com/100x90'">TEKİR</div>
                   </div>

                   <p style="font-size:18px; line-height:1.8; margin-bottom:20px;">Savcu’nun profesyonel geçmişi Türkiye müzik piyasasının kayıt süreçleriyle paralellik gösteriyor. <b>Derya Bedavacı</b>, <b>Zeynep Bastık</b> ve <b>Tekir</b> gibi pek çok ismin şarkılarının kayıt süreçlerinde enstrümanı ve besteleriyle yer alan isim; piyasadan tamamen ayrıldı.</p>`
        }
    };

    function showNews(id) {
        const item = db[id];
        document.getElementById('r-title').innerText = item.title;
        document.getElementById('r-body').innerHTML = item.body;
        document.getElementById('news-reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
        window.scrollTo(0,0);
    }

    function hideNews() {
        document.getElementById('news-reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
