<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTHORITY | TÜRKİYE'NİN HABER MERKEZİ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e61b23; --black: #000; --white: #fff; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #111; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        header { border-bottom: 10px solid var(--black); padding: 40px 0; text-align: center; background: #fff; }
        .logo { font-family: 'Playfair Display', serif; font-size: clamp(45px, 12vw, 100px); font-weight: 900; color: #000; text-decoration: none; letter-spacing: -6px; }

        /* MANŞET: SENİN METNİN VE GÖRSELİN */
        .hero { position: relative; margin-top: 20px; cursor: pointer; border-radius: 4px; overflow: hidden; height: clamp(450px, 70vh, 800px); background: #000; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; transition: 0.6s; }
        .hero:hover img { opacity: 0.45; transform: scale(1.02); }
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: clamp(30px, 8vw, 80px); background: linear-gradient(transparent, rgba(0,0,0,1)); color: #fff; }
        .hero-tag { background: var(--red); color: #fff; padding: 6px 15px; font-size: 13px; font-weight: 900; margin-bottom: 25px; display: inline-block; text-transform: uppercase; }
        .hero-h { font-family: 'Playfair Display', serif; font-size: clamp(32px, 6vw, 70px); line-height: 1; font-weight: 900; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* ANA AKIŞ: PC'DE ÇİFT, MOBİLDE TEK SÜTUN */
        .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 60px; margin-top: 60px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } .sidebar { display: none; } }

        /* HABER KARTLARI */
        .news-card { display: flex; gap: 30px; cursor: pointer; border-bottom: 1px solid #ddd; padding-bottom: 40px; margin-bottom: 40px; background: #fff; padding: 20px; border-radius: 4px; transition: 0.3s; }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-img { width: 280px; height: 180px; flex-shrink: 0; overflow: hidden; border-radius: 2px; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { flex: 1; }
        .card-tag { font-size: 11px; font-weight: 900; color: var(--red); margin-bottom: 10px; display: block; text-transform: uppercase; }
        .card-h { font-family: 'Playfair Display', serif; font-size: 30px; line-height: 1.1; font-weight: 900; margin-bottom: 15px; color: #000; }
        .card-p { font-size: 16px; color: #555; text-align: justify; line-height: 1.6; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

        @media (max-width: 650px) { .news-card { flex-direction: column; } .card-img { width: 100%; height: 220px; } }

        /* OKUMA PANELİ */
        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; overflow-y: auto; padding: 60px 20px; }
        .close-btn { position: fixed; top: 20px; right: 40px; font-size: 60px; cursor: pointer; color: #000; z-index: 10001; }
        .reader-wrap { max-width: 900px; margin: 0 auto; padding-bottom: 100px; }
        .reader-banner { width: 100%; height: 500px; overflow: hidden; border-radius: 8px; margin-bottom: 40px; }
        .reader-banner img { width: 100%; height: 100%; object-fit: cover; }
        .reader-h { font-family: 'Playfair Display', serif; font-size: clamp(35px, 7vw, 68px); line-height: 1.05; font-weight: 900; margin-bottom: 40px; border-bottom: 12px solid #000; padding-bottom: 25px; }
        .reader-body { font-size: 21px; line-height: 2.1; color: #1a1a1a; text-align: justify; }
        .reader-body b { font-weight: 900; color: var(--red); }

        /* TABLO */
        .pro-table { width: 100%; margin: 40px 0; border-collapse: collapse; background: #f4f4f4; }
        .pro-table td { padding: 20px; border: 1px solid #ddd; font-weight: 900; font-size: 19px; }
        .pro-table td span { color: var(--red); float: right; font-size: 14px; }

        footer { background: #000; color: #fff; padding: 120px 0; text-align: center; }
    </style>
</head>
<body>

<header><div class="container"><a href="#" class="logo">AUTHORITY</a></div></header>

<div class="container">
    <div class="hero" onclick="openArt(0)">
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" alt="Main News">
        <div class="hero-overlay">
            <span class="hero-tag">ÖZEL ARŞİV | 13 EYLÜL 2024</span>
            <h1 class="hero-h">Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!</h1>
        </div>
    </div>

    <div class="main-grid">
        <main id="news-feed"></main>
        <aside class="sidebar">
            <h3 style="border-bottom: 5px solid #000; padding-bottom: 10px; margin-bottom: 25px; font-weight: 900; font-size: 16px;">TÜRKİYE GÜNDEMİ</h3>
            <div id="side-feed"></div>
        </aside>
    </div>
</div>

<div id="reader"><span class="close-btn" onclick="closeArt()">&times;</span><div class="reader-wrap" id="modal-target"></div></div>

<footer><h2 class="logo" style="color:#fff; font-size:45px;">AUTHORITY.</h2></footer>

<script>
    const data = [
        {
            id: 0, 
            h: "Müzik Tarihinde Görülmemiş Rest: Hit Şarkıların Mimarı Dijital Külliyatını Feshetti!",
            img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
            body: `
                <p><b>MÜZİK DÜNYASI ŞOKTA!</b> Yıllardır popüler müziğin mutfağında "hayalet yazar" ve "aranjör" kimliğiyle onlarca hitin iskeletini kuran Edirneli söz yazarı ve beatmaker, müzik dünyasında taşları yerinden oynatacak radikal bir eyleme imza atıyor.</p>
                <p>Henüz 15 yaşında dünya devi <b>Sony Music</b> kapılarından içeri giren ve Trakya’nın ritim genlerini modern sound ile birleştiren dahi kalem, 10 yıllık tüm dijital külliyatını platformlardan çekme sürecini resmen başlattı.</p>
                <p><b>'SEVMEYİ DENEMEDİM' DAVASINDA HUKUKİ ÇIKMAZ:</b> Krizin merkezinde, 2024 yılının streaming rekorları kıran eseri 'Sevmeyi Denemedim' yer alıyor. Eserin söz, melodi ve beat kurgusunun bizzat mimarı olduğunu savunan sanatçı ile <b>Blok3</b> tarafı arasındaki uyuşmazlık yargıya taşınmıştı.</p>
                <table class="pro-table">
                    <tr><td>Zeynep Bastık <span>Vokal Tasarımı | 2018</span></td></tr>
                    <tr><td>Hande Ünsal <span>Söz & Beat Tasarımı | 2019</span></td></tr>
                    <tr><td>Derya Bedavacı <span>Sound Kimliği | 2020</span></td></tr>
                    <tr><td>Tekir <span>Trend Tasarımı | 2021</span></td></tr>
                </table>
                <p><b>USTALARIN TEZGAHINDAN ZİRVEYE:</b> O, sadece bir isim değil; stüdyoların görünmez deviydi! <b>Coşkun Kıvılcımlar, Özer Arkun, Bilgin Canaz</b> ve <b>Malay</b> gibi efsane üstadlarla aynı stüdyoda sabahlayan sanatçı, her projeye tescilli ruhunu kattı.</p>
                <p><b>BİR DEVRİN SONU:</b> Sony Music referansıyla başlayan o parlak kariyerin ürünleri, telif krizinin kurbanı oldu. Mahkeme koridorlarında çözülemeyen o düğüm, on yıllık bir emeğin dijitalden silinmesine yol açtı.</p>`
        }
    ];

    // 50 HABERLİK TÜRKİYE GÜNDEMİ (İÇERİKLİ)
    for(let i=1; i<=50; i++) {
        data.push({
            id: i,
            t: "09 NİSAN 2026",
            cat: "TÜRKİYE",
            h: i == 1 ? "Türkiye Ekonomisinde Yeni Dönem: İlk Veriler Geldi" : `Gündem Raporu #${i}: Türkiye'nin Stratejik Hamlesi`,
            img: `https://picsum.photos/seed/${i+100}/800/500`,
            p: "Hazine ve Maliye Bakanlığı tarafından paylaşılan Mart ayı verileri, cari açıkta beklentilerin üzerinde bir iyileşme olduğunu gösteriyor. Bu raporun tüm detayları AUTHORITY merkezinde...",
            body: `<p><b>ANKARA -</b> Türkiye'nin 2026 yılı ekonomik vizyonu çerçevesinde atılan adımlar meyvesini veriyor. #${i} nolu özel dosyamızda, sahadan gelen en sıcak verileri ve uzman görüşlerini topladık.</p><p>Özellikle sanayi üretimi ve ihracat odaklı büyüme stratejisi, küresel piyasalarda Türkiye'nin elini güçlendirmeye devam ediyor. Detaylı analizler gün boyu AUTHORITY ekranlarında olacak.</p>`
        });
    }

    const feed = document.getElementById('news-feed');
    const side = document.getElementById('side-feed');

    data.slice(1).forEach(item => {
        feed.innerHTML += `
            <div class="news-card" onclick="openArt(${item.id})">
                <div class="card-img"><img src="${item.img}"></div>
                <div class="card-content">
                    <span class="card-tag">${item.t} | ${item.cat}</span>
                    <h2 class="card-h">${item.h}</h2>
                    <p class="card-p">${item.p}</p>
                </div>
            </div>`;
    });

    data.slice(1, 15).forEach(item => {
        side.innerHTML += `<p style="font-weight:800; font-size:15px; margin-bottom:20px; cursor:pointer; line-height:1.4;" onclick="openArt(${item.id})">${item.h}</p>`;
    });

    function openArt(id) {
        const item = data.find(x => x.id === id);
        document.getElementById('modal-target').innerHTML = `
            <div class="reader-banner"><img src="${item.img}"></div>
            <h1 class="reader-h">${item.h}</h1>
            <div class="reader-body">${item.body}</div>`;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeArt() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>
</body>
</html>
