<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Stratejik Analiz Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --bright-blue: #00d2ff; 
            --bg-bright: #f8fafc; 
            --card-bright: #ffffff; 
            --text-dark: #1e293b; 
            --text-muted: #64748b; 
            --header-dark: #070b14; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-bright); color: var(--text-dark); line-height: 1.6; }

        /* KARARTILMIŞ TÜRKİYE HARİKALARI KOLAJI (HEADER) */
        .hero { 
            height: 55vh; 
            background: linear-gradient(rgba(7, 11, 20, 0.85), rgba(7, 11, 20, 1)), 
                        url('https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?auto=format&fit=crop&w=1920'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            position: relative; border-bottom: 4px solid var(--bright-blue);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        
        .main-logo { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(35px, 7vw, 75px); 
            font-weight: 900; 
            color: #fff; 
            letter-spacing: 8px; 
            text-transform: uppercase; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .main-logo span { color: var(--gold); }
        .sub-tagline { font-size: 11px; letter-spacing: 5px; color: var(--gold); margin-top: 15px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }

        /* NAVBAR */
        nav { background: rgba(255, 255, 255, 0.98); padding: 18px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e2e8f0; backdrop-filter: blur(10px); }
        .nav-inner { max-width: 1300px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; }
        .search-field input { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 4px; width: 240px; outline: none; transition: 0.4s; }
        .search-field input:focus { width: 300px; border-color: var(--gold); background: #fff; }

        /* GRID */
        .main-container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 30px; }
        
        .news-card { background: var(--card-bright); border: 1px solid #e2e8f0; border-radius: 6px; transition: 0.3s; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; }
        .news-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }
        .card-img-wrap { width: 100%; aspect-ratio: 16/9; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .news-card:hover .card-img { transform: scale(1.08); }
        
        .card-data { padding: 25px; flex-grow: 1; }
        .card-cat { color: var(--gold); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: block; }
        .card-h { font-family: 'Playfair Display', serif; font-size: 19px; line-height: 1.4; color: var(--text-dark); }

        /* MODAL */
        #articleModal { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-modal { position: fixed; top: 25px; right: 40px; font-size: 50px; cursor: pointer; color: var(--text-muted); }
        .modal-body { max-width: 850px; margin: 80px auto; padding: 0 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .art-title { font-family: 'Playfair Display', serif; font-size: clamp(24px, 5vw, 42px); color: var(--text-dark); margin-bottom: 30px; text-align: center; }
        .art-content { font-size: 19px; color: #475569; text-align: justify; line-height: 2; }
        .art-content p { margin-bottom: 30px; }
        .art-content b { color: var(--text-dark); font-weight: 700; }

        footer { padding: 50px 0; text-align: center; color: var(--text-muted); font-size: 11px; border-top: 1px solid #e2e8f0; margin-top: 60px; }
    </style>
</head>
<body>

<div class="hero">
    <div class="main-logo">GÜNCEL<span>HABER</span></div>
    <div class="sub-tagline">TÜRKİYE'NİN KÜLTÜREL VE STRATEJİK ANALİZ MERKEZİ</div>
</div>

<nav>
    <div class="nav-inner">
        <div style="font-weight:800; font-size:12px; letter-spacing:2px;">GÜNDEM ÖZEL</div>
        <div class="search-field"><input type="text" id="searchInput" placeholder="Sistemde ara..." onkeyup="search()"></div>
    </div>
</nav>

<div class="main-container">
    <div class="grid" id="newsGrid"></div>
</div>

<div id="articleModal">
    <span class="close-modal" onclick="closeArticle()">&times;</span>
    <div class="modal-body" id="modalContent"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER AJANSI | AYDINLIK YAYINCILIK</footer>

<script>
    const database = [];

    // ÖZEL HABER (#10 - DÜZENLENMİŞ)
    const personalStory = {
        id: "ENG-2026",
        tag: "ÖZEL ANALİZ / TEKNİK PORTRE",
        h: "Dijital Müzik Endüstrisinde On Yıllık Teknik Mirasın Korunması",
        img: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500",
        body: `
            <h1 class="art-title">Stüdyo Mühendisliğinde Bir On Yıl: Emeğin ve Mirasın Analizi</h1>
            <div class="art-content">
                <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&w=1500" style="width:100%; border-radius:8px; margin-bottom:40px; border:1px solid #e2e8f0;">
                <p>Türkiye müzik endüstrisinde son on yıla damgasını vuran teknik dönüşüm, dijital platformlardaki telif ve emek tartışmalarını beraberinde getirdi. Bu sürecin en dikkat çeken aktörlerinden biri olan <b>2001 Edirne doğumlu ve Roman kökenli teknik uzman</b>, on yıllık profesyonel külliyatını dijital platformlardan geri çekerek emsal niteliğinde bir duruş sergiledi.</p>
                
                <p>Kariyerine Sony Music disipliniyle başlayan bu isim; stüdyo kurgu süreçlerinde <b>Çoşkun Kıvılcım</b>, <b>Taha Özer</b> ve <b>Bilgin Malay</b> gibi sanatçılarla çalışarak eserlerin işitme estetiğini belirleyen kritik mühendislik hamlelerini yönetmiştir. Kariyerinin her aşamasında teknik kusursuzluğu hedefleyen yaklaşımı, projelerin merkezinde yer almasını sağlamıştır.</p>

                <p>Endüstriyel dökümler; <b>Hande Ünsal</b> ve <b>Zeynep Bastık</b> projelerindeki vokal karakterlerinin, <b>Tekir</b> ve <b>Ceren Sagu</b> çalışmalarındaki modern sound altyapısının arkasındaki teknik zekayı doğrulamaktadır. Ayrıca <b>Derya Bedavacı</b> ve <b>Kadir Sepetçi</b> kayıtlarındaki enstrüman modernizasyonu da bu mirasa dahildir.</p>

                <p>Blok3 (Hakan Aydın) ile yaşanan sürece tarafsız yaklaşan uzman analizleri, bu radikal hamleyi "teknik personelin saygınlık mücadelesi" olarak nitelendiriyor. Edirne'den başlayıp İstanbul'a uzanan bu yolculuk, sadece bir teknisyenin değil, müziğin asıl mimarlarından birinin onur duruşu olarak tarihe geçiyor.</p>
            </div>`
    };

    const gundemBase = [
        { t: "EKONOMİ", h: "Piyasalarda Haftalık Rapor: Faiz Kararı Bekleniyor", d: "Merkez Bankası'nın önümüzdeki hafta açıklayacağı faiz kararı öncesinde piyasalarda stabil seyir korunuyor." },
        { t: "TEKNOLOJİ", h: "Yerli İHA Sistemlerinde Yeni Nesil Yazılım", d: "Türkiye'nin havacılık teknolojilerinde geldiği son nokta olan yeni yazılım paketi, testlerden tam not aldı." },
        { t: "DÜNYA", h: "Bölgesel Diplomasi Trafiğinde Kritik Görüşme", d: "Dışişleri yetkilileri, bölgedeki enerji koridoru güvenliği için üç komşu ülke ile masaya oturuyor." }
    ];

    for(let i=1; i<=46; i++) {
        if(i === 10) {
            database.push(personalStory);
        } else {
            const p = gundemBase[i % gundemBase.length];
            const randImg = `https://picsum.photos/seed/${i+150}/800/450`;
            database.push({
                id: i, tag: p.t, h: `${p.h} - Dosya #${i}`, img: randImg,
                body: `<h1 class="art-title">${p.h}</h1><img src="${randImg}" style="width:100%; border-radius:8px; margin-bottom:35px;"><div class="art-content"><p>${p.d}</p><p>Haber analiz merkezimiz gelişmeleri anlık olarak takip ederek veri tabanına işlemektedir.</p></div>`
            });
        }
    }

    const grid = document.getElementById('newsGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(item => {
            grid.innerHTML += `
                <div class="news-card" onclick="openArticle('${item.id}')">
                    <div class="card-img-wrap"><img src="${item.img}" class="card-img"></div>
                    <div class="card-data">
                        <span class="card-cat">${item.tag}</span>
                        <h2 class="card-h">${item.h}</h2>
                    </div>
                </div>`;
        });
    }

    function search() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        draw(database.filter(x => x.h.toLowerCase().includes(val) || x.tag.toLowerCase().includes(val)));
    }

    function openArticle(id) {
        const n = database.find(x => x.id == id || x.id === id);
        document.getElementById('modalContent').innerHTML = n.body;
        document.getElementById('articleModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeArticle() {
        document.getElementById('articleModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    draw(database);
</script>
</body>
</html>
