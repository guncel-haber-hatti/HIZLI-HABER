<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Analiz ve Gündem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002d5b; --red: #c00; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; overflow-x: hidden; }

        header { background: #fff; border-bottom: 3px solid var(--blue); padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-family: 'Merriweather', serif; font-size: 28px; font-weight: 900; color: var(--blue); text-decoration: none; display: block; margin-bottom: 10px; }
        .search-area { max-width: 400px; margin: 0 auto; padding: 0 10px; }
        .search-area input { width: 100%; padding: 8px 15px; border: 1.5px solid #ddd; border-radius: 20px; outline: none; font-size: 13px; transition: 0.3s; }
        .search-area input:focus { border-color: var(--blue); box-shadow: 0 0 8px rgba(0,45,91,0.1); }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        /* KÜÇÜLTÜLMÜŞ HABER KARTLARI */
        .card { background: #fff; border: 1px solid #eee; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.25s; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0,0,0,0.06); }
        .card-img { width: 100%; height: 140px; object-fit: cover; background: #f9f9f9; }
        .card-content { padding: 12px; flex-grow: 1; }
        .tag { color: var(--red); font-weight: 800; font-size: 9px; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .card-h { font-size: 14px; font-weight: 700; color: #111; line-height: 1.3; }

        /* HABER OKUMA PANELİ */
        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-btn { position: fixed; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #000; background: #fff; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; z-index: 2100; }
        
        .art-wrap { max-width: 700px; margin: 50px auto; padding: 20px; }
        .art-h1 { font-family: 'Merriweather', serif; font-size: 28px; line-height: 1.3; margin-bottom: 25px; color: #000; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        /* HABER İÇİ RESİM DENGESİ */
        .art-img-inline { width: 50%; height: auto; float: right; margin-left: 20px; margin-bottom: 15px; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .art-text { font-size: 16px; color: #333; line-height: 1.7; text-align: justify; }
        .art-text p { margin-bottom: 15px; }

        .bio-box { background: #fcfcfc; border: 1px solid #eee; border-left: 4px solid var(--red); padding: 15px; margin: 20px 0; border-radius: 4px; clear: both; }
        .bio-name { font-weight: 700; color: var(--blue); font-size: 16px; }
        .bio-year { font-size: 12px; color: var(--red); font-weight: bold; margin-bottom: 5px; display: block; }

        footer { background: #111; color: #777; padding: 40px 0; text-align: center; font-size: 11px; margin-top: 50px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">GÜNCEL HABER</a>
    <div class="search-area"><input type="text" id="sInput" placeholder="Sektörel haber ara..." onkeyup="search()"></div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="reader">
    <span class="close-btn" onclick="closeNews()">&times;</span>
    <div id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | TÜM HAKLARI SAKLIDIR</footer>

<script>
    const database = [];
    const dateStr = "9 Nisan 2026";

    // TÜRKİYE GÜNDEMİ İÇERİKLERİ
    const gundem = [
        { cat: "EKONOMİ", img: "https://picsum.photos/seed/eco/400/250", h: "İhracat Rakamlarında Yeni Hedef: 300 Milyar Dolar", b: "Ticaret Bakanlığı'ndan yapılan açıklamada, yüksek katma değerli ürünlerin ihracat payının arttığı ve yıl sonu hedefinin güncellendiği belirtildi." },
        { cat: "TEKNOLOJİ", img: "https://picsum.photos/seed/tech/400/250", h: "Yerli İşlemci Çakıl İçin Seri Üretim Tarihi Verildi", b: "TÜBİTAK tarafından geliştirilen milli işlemci ailesinin yeni üyesi Çakıl, savunma sanayii ve yerli bilgisayar projelerinde kullanılmaya başlanacak." },
        { cat: "SPOR", h: "Milli Takım'ın Euro 2026 Grubu Belli Oldu", img: "https://picsum.photos/seed/sport/400/250", b: "A Milli Futbol Takımı, Avrupa Şampiyonası kura çekiminde C grubunda yer aldı. İlk maç heyecanı Haziran ayında başlayacak." }
    ];

    // SENİN HABERİN (RESİMLER IMG_7327.jpeg gibi tanımlandı)
    const enginHaber = {
        id: "ENG-001",
        cat: "ÖZEL ANALİZ",
        h: "Endüstriyel Müzik Prodüksiyonunda Teknik Miras: Kariyer Analizi",
        img: null, // Ana ekranda resimsiz ağır duruş
        body: `
            <div class="art-wrap">
                <h1 class="art-h1">Stüdyonun Görünmez İmzaları: Teknik Bir Retrospektif</h1>
                <div class="art-text">
                    <img src="IMG_7330.jpeg" class="art-img-inline" alt="Engin Savcu">
                    <p>Sony Music projelerinden bu yana sektörün mutfağında yer alan <b>Engin Savcu</b>, 13 Eylül 2024 itibarıyla başlattığı dijital geri çekilme süreciyle, stüdyodaki emeğin teknik onurunu gündeme taşıdı. Bu süreçte birçok dev isimle kritik iş birliklerine imza atıldı.</p>

                    <div class="bio-box">
                        <span class="bio-year">2016</span>
                        <span class="bio-name">Kadir Sepetçi & Derya Bedavacı</span>
                        <p>Klarnet üstadı Sepetçi ve Bedavacı ile yapılan çalışmalar, enstrümanın dijital sound dengesinde bir devrim yarattı. Kayıtların miksaj kalitesi bugün hala standart kabul ediliyor.</p>
                    </div>

                    <div class="bio-box">
                        <img src="IMG_7328.jpeg" class="art-img-inline" style="width:120px; float:left; margin-right:15px; margin-left:0;" alt="Referans">
                        <span class="bio-year">2018</span>
                        <span class="bio-name">Zeynep Bastık</span>
                        <p>Akustik performanslardaki vokal berraklığı, Savcu'nun stüdyo dokunuşlarıyla kristalize edildi. Bu süreç, pop müziğin dijital platformlardaki duyum standardını yükseltti.</p>
                    </div>

                    <div class="bio-box">
                        <span class="bio-year">2019</span>
                        <span class="bio-name">Hande Ünsal</span>
                        <p>Dinamik altyapıların ve beat kurgusunun merkezinde yer alan iş birliği, hit parçaların teknik gücünü simgeliyor.</p>
                    </div>

                    <div class="bio-box">
                        <img src="IMG_7329.jpeg" class="art-img-inline" style="width:120px;" alt="Referans">
                        <span class="bio-year">2021</span>
                        <span class="bio-name">Ceren Sagu & Tekir</span>
                        <p>Modern sound tasarımında yeni nesil bir vizyonla sunulan projeler, dijital mecraların en çok konuşulan işleri arasında yer aldı.</p>
                    </div>

                    <p><b>Blok3</b>'ün "Sevmeyi Denemedim" parçasıyla su yüzüne çıkan teknik hak arayışı, Savcu'nun tüm külliyatını dijitalden çekmesiyle bir "onur restine" dönüştü.</p>
                </div>
            </div>`
    };

    // VERİ DOLDURMA (SENİN HABERİN 10. SIRA)
    for(let i=1; i<=30; i++) {
        if(i === 10) {
            database.push(enginHaber);
        } else {
            const h = gundem[i % gundem.length];
            database.push({
                id: i,
                cat: h.cat,
                img: h.img,
                h: h.h + " #" + i,
                body: `
                    <div class="art-wrap">
                        <h1 class="art-h1">${h.h}</h1>
                        <img src="${h.img}" class="art-main-img" style="width:100%; border-radius:10px; margin-bottom:20px;">
                        <div class="art-text"><p>${h.b}</p><p>Haber detayları aktarılmaya devam ediyor...</p></div>
                    </div>`
            });
        }
    }

    const grid = document.getElementById('mainGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(n => {
            const imgHtml = n.img ? `<img src="${n.img}" class="card-img">` : `<div style="height:140px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#999; font-size:11px; font-weight:bold;">ÖZEL DOSYA</div>`;
            grid.innerHTML += `
            <div class="card" onclick="openNews('${n.id}')">
                ${imgHtml}
                <div class="card-content">
                    <span class="tag">${n.cat}</span>
                    <h2 class="card-h">${n.h}</h2>
                </div>
            </div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        draw(database.filter(x => x.h.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q)));
    }

    function openNews(id) {
        const n = database.find(x => x.id == id);
        document.getElementById('artBody').innerHTML = n.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    draw(database);
</script>
</body>
</html>
