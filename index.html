<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABER TÜRKİYE | Son Dakika Haberler</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #cc0000; --black: #111; --border: #eee; --bg: #fcfcfc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; }

        header { background: #fff; padding: 20px 0; border-bottom: 4px solid var(--red); text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 45px; color: var(--black); text-decoration: none; font-weight: 900; letter-spacing: -2px; }
        
        nav { background: var(--black); color: #fff; position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1100px; margin: auto; display: flex; gap: 20px; padding: 12px 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; overflow-x: auto; white-space: nowrap; }

        .container { max-width: 1100px; margin: 30px auto; display: grid; grid-template-columns: 1fr 300px; gap: 30px; padding: 0 20px; }

        .news-card { background: #fff; border: 1px solid var(--border); display: grid; grid-template-columns: 200px 1fr; gap: 20px; padding: 15px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .news-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .news-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 2px; }
        .news-info b { color: var(--red); font-size: 10px; text-transform: uppercase; }
        .news-info h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-top: 5px; line-height: 1.2; }

        #reader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; overflow-y: auto; }
        .reader-inner { max-width: 750px; margin: 60px auto; padding: 0 25px; }
        .close-btn { background: #000; color: #fff; border: none; padding: 12px 25px; cursor: pointer; margin-bottom: 40px; font-weight: 800; border-radius: 4px; }
        .article-body { font-size: 19px; line-height: 1.9; color: #1a1a1a; text-align: justify; }
        .article-body p { margin-bottom: 25px; }

        @media (max-width: 800px) { .container, .news-card { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header><a href="#" class="logo">HABER TÜRKİYE</a></header>
<nav><div class="nav-inner"><span>Gündem</span><span>Ekonomi</span><span>Spor</span><span>Teknoloji</span><span>Yaşam</span><span>Dünya</span></div></nav>

<div class="container">
    <main id="haber-listesi">
        </main>

    <aside>
        <div style="background:#fff; padding:20px; border:1px solid #eee; border-top:5px solid var(--red); position: sticky; top: 80px;">
            <h3 style="font-family:'Playfair Display'; margin-bottom:15px;">TÜRKİYE GÜNDEMİ</h3>
            <p style="font-size:13px; margin-bottom:10px;">• İstanbul Finans Merkezi'nde yeni dönem.</p>
            <p style="font-size:13px; margin-bottom:10px;">• Milli Muharip Uçak KAAN test uçuşunda.</p>
            <p style="font-size:13px; margin-bottom:10px;">• Ege'de turizm sezonu erken açıldı.</p>
        </div>
    </aside>
</div>

<div id="reader">
    <div class="reader-inner">
        <button class="close-btn" onclick="closeNav()">← ANA SAYFAYA DÖN</button>
        <h1 id="title" style="font-family:'Playfair Display'; font-size:42px; margin-bottom:20px;"></h1>
        <div id="meta" style="font-size:13px; color:#888; margin-bottom:30px; font-weight:bold; border-bottom:1px solid #eee; padding-bottom:15px;"></div>
        <div id="body" class="article-body"></div>
    </div>
</div>

<script>
    const haberVerileri = [
        { t: "Merkez Bankası Faiz Kararını Açıkladı", c: "EKONOMİ", i: "https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=500" },
        { t: "KAAN Gökyüzüyle Yeniden Buluştu", c: "SAVUNMA", i: "https://images.unsplash.com/photo-1517976487492-5750f3195933?w=500" },
        { t: "İstanbul'da Ulaşım Düzenlemesi", c: "GÜNDEM", i: "https://images.unsplash.com/photo-1527838832702-585f23df5bb2?w=500" },
        { t: "Süper Lig'de Şampiyonluk Yarışı Kızışıyor", c: "SPOR", i: "https://images.unsplash.com/photo-1574629810360-7efbbe195018?w=500" },
        { t: "Yerli Elektrikli Otomobilde Yeni Model", c: "TEKNOLOJİ", i: "https://images.unsplash.com/photo-1593941707882-a5bba14938c7?w=500" },
        { t: "Ege ve Akdeniz'de Rekor Turist Beklentisi", c: "TURİZM", i: "https://images.unsplash.com/photo-1540202404-a2f290328291?w=500" }
    ];

    const data = {};
    const liste = document.getElementById('haber-listesi');

    // 50 ADET HABER ÜRETME
    for(let i = 1; i <= 52; i++) {
        const h = haberVerileri[i % haberVerileri.length];
        const haberBaslik = `${h.t} #${i}`;
        
        data[i] = {
            title: haberBaslik,
            meta: `9 NİSAN 2026 | ${h.c} | RESMİ HABER AJANSI`,
            body: `
                <p>Türkiye'nin başkenti Ankara ve finans merkezi İstanbul başta olmak üzere tüm yurtta bu gelişme konuşuluyor. Yapılan resmi açıklamaya göre, <b>${haberBaslik}</b> konusuyla ilgili beklenen adımlar nihayet atıldı.</p>
                <p>Konuyla ilgili görüş bildiren uzmanlar, bu durumun Türkiye'nin önümüzdeki 5 yıllık stratejik planlamasında kilit bir rol oynayacağını belirtiyor. Özellikle yerli ve milli imkanların seferber edilmesiyle birlikte, dışa bağımlılığın azalması ve istihdamın artırılması hedefleniyor. Bakanlık yetkilileri, projeye dair bütçenin ayrıldığını ve takvimin aksamadan ilerleyeceğini teyit etti.</p>
                <p>Vatandaşların büyük ilgi gösterdiği bu gelişme, sosyal medyada da en çok konuşulan başlıklar arasına girdi. Haber merkezimize ulaşan son bilgilere göre, ilgili kurumlar yarın sabah saatlerinde teknik bir sunum yaparak sürecin detaylarını basınla paylaşacak. Gelişmeleri anlık olarak aktarmaya devam edeceğiz.</p>
                <p>Haberin diğer detaylarında ise bölgesel etkiler göze çarpıyor. Doğu ve Güneydoğu Anadolu bölgelerindeki kalkınma ajansları da bu süreçte aktif rol alacak. Ülke genelinde yayılan bu pozitif dalga, ekonomik göstergelere de olumlu yansımaya başladı.</p>
            `
        };

        liste.innerHTML += `
            <div class="news-card" onclick="openNav(${i})">
                <img src="${h.i}">
                <div class="news-info">
                    <b>${h.c}</b>
                    <h3>${haberBaslik}</h3>
                </div>
            </div>`;
    }

    function openNav(id) {
        const h = data[id];
        document.getElementById('title').innerText = h.title;
        document.getElementById('meta').innerText = h.meta;
        document.getElementById('body').innerHTML = h.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
        window.scrollTo(0,0);
    }

    function closeNav() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
