<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Son Dakika</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #c00; --dark: #111; --text: #333; --border: #eee; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: var(--text); -webkit-font-smoothing: antialiased; line-height: 1.5; }

        /* LOGO & NAV - Kompakt Tasarım */
        header { border-bottom: 3px solid var(--red); padding: 12px 0; text-align: center; background: #fff; }
        .logo { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; text-decoration: none; color: #000; letter-spacing: -1px; cursor: pointer; }
        .logo span { color: var(--red); }
        
        nav { background: var(--dark); position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 900px; margin: auto; display: flex; overflow-x: auto; scrollbar-width: none; }
        nav a { color: #fff; text-decoration: none; padding: 12px 18px; font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

        /* CONTAINER */
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        
        /* MANŞET - Ekrana Sığan Boyut */
        .main-hero { cursor: pointer; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .main-hero img { width: 100%; height: 350px; object-fit: cover; border-radius: 4px; }
        .main-hero h1 { font-family: 'Playfair Display', serif; font-size: 26px; margin: 12px 0 6px; line-height: 1.2; font-weight: 900; }
        .tag { color: var(--red); font-weight: 700; font-size: 10px; text-transform: uppercase; border: 1px solid var(--red); padding: 1px 5px; border-radius: 2px; }

        /* DİĞER HABERLER GRİDİ */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .news-card { cursor: pointer; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .news-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 3px; margin-bottom: 10px; }
        .news-card h3 { font-size: 15px; font-weight: 700; line-height: 1.4; color: #222; }

        /* HABER DETAYI - Okunaklı ve Sığan Yazı Boyutu */
        #articleView { display: none; max-width: 750px; margin: auto; animation: fadeIn 0.3s; }
        .btn-back { display: inline-block; margin-bottom: 15px; color: #888; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .article-title { font-family: 'Playfair Display', serif; font-size: 32px; line-height: 1.1; margin-bottom: 15px; color: #000; font-weight: 900; }
        .meta { color: #999; font-size: 11px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
        .article-img { width: 100%; height: auto; margin-bottom: 20px; border-radius: 4px; }
        .article-content { font-size: 15px; line-height: 1.7; color: #333; text-align: justify; }
        .article-content p { margin-bottom: 12px; }
        .article-content b { color: #000; }
        .sub-header { font-family: 'Playfair Display', serif; font-size: 20px; margin: 25px 0 10px; color: #000; border-left: 4px solid var(--red); padding-left: 10px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        footer { text-align: center; padding: 40px; color: #ccc; font-size: 11px; border-top: 1px solid var(--border); margin-top: 40px; }

        @media (max-width: 600px) {
            .main-hero img { height: 220px; }
            .article-title { font-size: 24px; }
        }
    </style>
</head>
<body>

<header>
    <a class="logo" onclick="goHome()">GÜNCEL<span>HABER</span></a>
</header>

<nav>
    <div class="nav-inner">
        <a onclick="goHome()">ASAYİŞ</a>
        <a onclick="goHome()">GÜNDEM</a>
        <a onclick="goHome()">EKONOMİ</a>
        <a onclick="goHome()">DÜNYA</a>
        <a onclick="goHome()">SPOR</a>
        <a onclick="goHome()">MAGAZİN</a>
    </div>
</nav>

<div class="container">
    <div id="homePage">
        <div class="main-hero" onclick="openNews(0)">
            <img src="https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg">
            <div style="margin-top:10px;">
                <span class="tag">SON DAKİKA</span>
                <h1>Kapaklı’da Dehşet Gecesi: Sokak Ortası Savaş Alanına Döndü!</h1>
            </div>
        </div>

        <div style="font-weight: 900; border-bottom: 2px solid #000; padding-bottom: 5px; margin: 30px 0 15px; font-size: 14px;">GÜNCEL HABER AKIŞI</div>
        <div class="news-grid" id="newsGrid"></div>
    </div>

    <div id="articleView"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER PORTALI | TÜM HAKLARI SAKLIDIR</footer>

<script>
    const newsDB = [
        {
            title: "Kapaklı’da Dehşet Gecesi: Sokak Ortası Savaş Alanına Döndü!",
            img: "https://raw.githubusercontent.com/guncel-haber-hatti/HIZLI-HABER/main/71DA2E6F-5915-420E-B581-9A12F1940F1C.jpeg",
            content: `<b>KAPAKLI</b> – Tekirdağ'ın Kapaklı ilçesinde dün gece saatlerinde meydana gelen silahlı çatışma, mahalle sakinlerine korku dolu anlar yaşattı. Edinilen bilgilere göre, aralarında geçmişe dayalı bir husumet bulunan iki grup, cadde üzerinde karşı karşıya geldi. Sözlü tartışmanın bir anda alevlenmesiyle taraflar arasında çıkan arbede, yerini silahlı hesaplaşmaya bıraktı.<br><br>
                Sokağın adeta savaş alanına döndüğü olayda kurşunların hedefi olan <b>1 kişi hayatını kaybederken</b>, çatışma sırasında seken kör kurşunların isabet ettiği bir sivil ile birlikte toplam 2 kişi ağır yaralandı.<br>
                
                <h3 class="sub-header">VATANDAŞLAR YARALI SİVİLİN YARDIMINA KOŞTU</h3>
                Olayın en trajik noktası, husumetli grupların birbirine rastgele ateş açtığı sırada bölgeden geçmekte olan masum bir vatandaşın kurşunların hedefi olması oldu. Vücuduna isabet eden mermilerle kanlar içinde yere yığılan talihsiz sivilin yardımına, silah seslerinin kesilmesiyle birlikte çevredeki vatandaşlar koştu. Mahalle sakinlerinin ceketleriyle tampon yaparak hayatta tutmaya çalıştığı yaralı sivil, olay yerine sevk edilen sağlık ekiplerince hastaneye kaldırılarak yoğun bakıma alındı.<br>

                <h3 class="sub-header">ZANLININ 24 AYRI SUÇ DOSYASI ORTAYA ÇIKTI</h3>
                Emniyet güçlerinin yaptığı titiz çalışma ve güvenlik kamerası incelemeleri sonucunda, tetiği çeken şüpheli şahsın <b>E.S.</b> (25) olduğu tespit edildi. Olay yerinden kaçan zanlı hakkında <b>"Kasten Adam Öldürme"</b> ve <b>"Kasten Adam Öldürmeye Teşebbüs"</b> suçlarından geniş çaplı tahkikat başlatıldı.<br><br>
                Zanlının geçmişine yönelik yapılan araştırmada ise çarpıcı bir suç kaydıyla karşılaşıldı. E.S.'nin; <b>kaçakçılık, yağma, ruhsatsız silah bulundurma</b> ve <b>kasten yaralama</b> gibi suçlar başta olmak üzere toplam <b>24 ayrı suç dosyasının</b> bulunduğu saptandı. Özellikle kaçakçılık dosyalarıyla dikkat çeken zanlının yakalanması için asayiş ekipleri operasyonlarını derinleştirdi.`
        }
    ];

    // 30 Tane Dolgu Haber
    const dummyTitles = ["Altın Fiyatlarında Tarihi Rekor", "İstanbul Havalimanı Yolcu Rekoru Kırdı", "Milli Takım Aday Kadrosu Açıklandı", "Yeni Asgari Ücret Beklentileri", "Meteoroloji'den Fırtına Uyarısı", "Borsada Hareketli Dakikalar", "Teknoloji Devi Yeni Modelini Tanıttı", "Şampiyonlar Ligi'nde Final Heyecanı"];
    for(let i=1; i<=30; i++) {
        newsDB.push({
            title: dummyTitles[i % dummyTitles.length] + " - Son Gelişmeler " + i,
            img: `https://picsum.photos/800/600?sig=${i}`,
            content: "Bu haberin detayları editörlerimiz tarafından hazırlanmaktadır. En güncel bilgiler için sayfayı takip etmeye devam edin."
        });
    }

    function renderGrid() {
        let html = "";
        newsDB.slice(1).forEach((news, idx) => {
            html += `<div class="news-card" onclick="openNews(${idx + 1})"><img src="${news.img}"><h3>${news.title}</h3></div>`;
        });
        document.getElementById('newsGrid').innerHTML = html;
    }

    function openNews(idx) {
        const item = newsDB[idx];
        document.getElementById('homePage').style.display = 'none';
        const view = document.getElementById('articleView');
        view.style.display = 'block';
        view.innerHTML = `
            <span class="btn-back" onclick="goHome()">← ANA SAYFAYA DÖN</span>
            <h1 class="article-title">${item.title}</h1>
            <div class="meta">GÜNCELLENME: 06 NİSAN 2026 | 14:14</div>
            <img class="article-img" src="${item.img}">
            <div class="article-content">${item.content}</div>
        `;
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('articleView').style.display = 'none';
        document.getElementById('homePage').style.display = 'block';
    }

    renderGrid();
</script>
</body>
</html>
