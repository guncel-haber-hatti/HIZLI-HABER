<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNCEL HABER | Analiz ve Gündem Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #002d5b; --red: #c00; --bg: #fdfdfd; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #222; overflow-x: hidden; line-height: 1.7; }

        header { background: #fff; border-bottom: 3px solid var(--blue); padding: 15px 0; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Merriweather', serif; font-size: 28px; font-weight: 900; color: var(--blue); text-decoration: none; display: inline-block; margin-bottom: 10px; }
        
        .search-area { max-width: 400px; margin: 0 auto; padding: 0 10px; }
        .search-area input { width: 100%; padding: 10px 18px; border: 1.5px solid #ddd; border-radius: 25px; outline: none; font-size: 13px; text-align: center; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
        
        .card { background: #fff; border: 1px solid #eee; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; height: 100%; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }
        .img-h { width: 100%; height: 150px; object-fit: cover; background: #f0f0f0; }
        
        .card-content { padding: 12px; flex-grow: 1; }
        .tag { color: var(--red); font-weight: 800; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .card-h { font-size: 14px; font-weight: 700; color: #111; line-height: 1.3; }

        #reader { display: none; position: fixed; inset: 0; background: #fff; z-index: 2000; overflow-y: auto; }
        .close-btn { position: fixed; top: 15px; right: 20px; font-size: 35px; cursor: pointer; color: #aaa; background: #fff; width: 45px; height: 45px; border-radius: 50%; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; z-index: 2100; }
        
        .art-wrap { max-width: 700px; margin: 40px auto; padding: 20px; }
        .art-h1 { font-family: 'Merriweather', serif; font-size: 28px; line-height: 1.2; margin-bottom: 25px; color: #000; text-align: center; }
        
        /* ANALİST PROFİLİ - SENİN FOTONUN YENİ YERİ */
        .analyst-profile { display: flex; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 30px; border: 1px solid #eee; }
        .analyst-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-right: 15px; border: 2px solid var(--blue); }
        .analyst-info h4 { font-size: 16px; color: var(--blue); }
        .analyst-info p { font-size: 13px; color: #666; margin: 0; }

        .art-text { font-size: 17px; color: #333; line-height: 1.8; text-align: justify; }
        .art-text p { margin-bottom: 15px; }

        .bio-box { background: #fff; border: 1px solid #eee; padding: 15px; margin: 20px 0; border-radius: 8px; display: flex; gap: 15px; align-items: center; }
        .bio-img { width: 100px; height: 100px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .bio-content { flex-grow: 1; }
        .bio-name { font-weight: 700; color: var(--blue); font-size: 16px; display: block; }
        .bio-role { font-size: 12px; color: var(--red); font-weight: bold; text-transform: uppercase; }

        footer { background: #111; color: #555; padding: 40px 0; text-align: center; margin-top: 60px; font-size: 11px; }

        @media (max-width: 600px) {
            .bio-box { flex-direction: column; text-align: center; }
            .bio-img { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">GÜNCEL HABER</a>
    <div class="search-area"><input type="text" id="sInput" placeholder="Haberlerde ara..." onkeyup="search()"></div>
</header>

<div class="container"><div class="grid" id="mainGrid"></div></div>

<div id="reader">
    <span class="close-btn" onclick="closeNews()">&times;</span>
    <div id="artBody"></div>
</div>

<footer>&copy; 2026 GÜNCEL HABER | TÜRKİYE'NİN ANALİZ MERKEZİ</footer>

<script>
    const database = [];

    const enginHaber = {
        id: "ENG-X",
        cat: "ÖZEL DOSYA",
        h: "Endüstriyel Müzik Prodüksiyonunda Teknik Miras: Kariyer Analizi",
        img: null,
        body: `
            <div class="art-wrap">
                <h1 class="art-h1">Stüdyonun Görünmez Kahramanları ve Dijital Rest Süreci</h1>
                
                <div class="analyst-profile">
                    <img src="IMG_7330.jpeg" class="analyst-img">
                    <div class="analyst-info">
                        <h4>Engin Savcu</h4>
                        <p>Kıdemli Müzik Teknolojileri Analisti & Prodüktör</p>
                    </div>
                </div>

                <div class="art-text">
                    <p>Müzik sektöründe 13 Eylül 2024 itibarıyla başlayan büyük dijital geri çekilme süreci, mutfaktaki emeğin yasal ve onursal temsilini yeniden tartışmaya açtı. <b>Engin Savcu</b>, on yıllık kariyer birikimini koruma kararıyla sektörde bir dönüm noktası oluşturdu.</p>

                    <div class="bio-box">
                        <img src="IMG_7023.png" class="bio-img">
                        <div class="bio-content">
                            <span class="bio-name">Derya Bedavacı & Kadir Sepetçi</span>
                            <span class="bio-role">Teknik İş Birliği</span>
                            <p style="font-size:14px; margin-top:5px;">Modern arabesk sound'unun teknik mimarisi ve klarnet kayıtlarındaki derinlik üzerine yapılan çalışmalar.</p>
                        </div>
                    </div>

                    <div class="bio-box">
                        <img src="IMG_7327.jpeg" class="bio-img">
                        <div class="bio-content">
                            <span class="bio-name">Hande Ünsal & Zeynep Bastık</span>
                            <span class="bio-role">Vokal Mühendisliği</span>
                            <p style="font-size:14px; margin-top:5px;">Akustik pop projelerinde vokal berraklığı ve dijital platformlar için ses optimizasyonu.</p>
                        </div>
                    </div>

                    <div class="bio-box">
                        <img src="IMG_7328.jpeg" class="bio-img">
                        <div class="bio-content">
                            <span class="bio-name">Tekir & Ceren Sagu</span>
                            <span class="bio-role">Sound Tasarımı</span>
                            <p style="font-size:14px; margin-top:5px;">Yenilikçi altyapı çalışmaları ve final miksaj süreçlerindeki teknik dokunuşlar.</p>
                        </div>
                    </div>

                    <p>Bu eserlerin dijitalden çekilmesi, stüdyo personelinin eser üzerindeki görünmez imzasını tescilleme adına atılmış en radikal adımdır.</p>
                </div>
            </div>`
    };

    // Türkiye Gündemi (İnternet Veri Tabanı Bazlı)
    const gundemData = [
        { cat: "EKONOMİ", img: "https://picsum.photos/seed/money/400/250", h: "Piyasalarda Bahar Havası: Endekslerde Yükseliş Bekleniyor" },
        { cat: "TEKNOLOJİ", img: "https://picsum.photos/seed/tech/400/250", h: "Yerli Yazılım Devinden Yeni Yapay Zeka Hamlesi" },
        { cat: "YAŞAM", img: "https://picsum.photos/seed/nature/400/250", h: "İstanbul Boğazı'nda Bahar Temizliği Başlatıldı" }
    ];

    for(let i=1; i<=30; i++) {
        if(i === 10) {
            database.push(enginHaber);
        } else {
            const h = gundemData[i % gundemData.length];
            database.push({
                id: i,
                cat: h.cat,
                img: h.img,
                h: h.h + " #" + i,
                body: `<div class="art-wrap"><h1 class="art-h1">${h.h}</h1><img src="${h.img}" style="width:100%; border-radius:10px; margin-bottom:20px;"><p class="art-text">Haberin detaylı içeriği güncellenmektedir. Türkiye gündemindeki sıcak gelişmeler anlık olarak burada yer alacak.</p></div>`
            });
        }
    }

    const grid = document.getElementById('mainGrid');
    function draw(list) {
        grid.innerHTML = '';
        list.forEach(n => {
            const imgHtml = n.img ? `<img src="${n.img}" class="img-h">` : `<div style="height:150px; background:#eee; display:flex; align-items:center; justify-content:center; color:#999; font-weight:bold; font-size:12px;">ÖZEL ANALİZ</div>`;
            grid.innerHTML += `<div class="card" onclick="openNews('${n.id}')">${imgHtml}<div class="card-content"><span class="tag">${n.cat}</span><h2 class="card-h">${n.h}</h2></div></div>`;
        });
    }

    function search() {
        const q = document.getElementById('sInput').value.toLowerCase();
        draw(database.filter(x => x.h.toLowerCase().includes(q) || x.cat.toLowerCase().includes(q)));
    }

    function openNews(id) {
        const n = database.find(x => x.id == id);
        document.getElementById('artBody').innerHTML = n.body;
        document.getElementById('reader').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeNews() {
        document.getElementById('reader').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    draw(database);
</script>
</body>
</html>
